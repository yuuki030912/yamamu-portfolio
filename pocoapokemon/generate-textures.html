<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Texture Generator - ぽこポケ</title>
<style>
body { background:#1a1a2e; color:#fff; font-family:monospace; padding:20px; }
.grid { display:flex; flex-wrap:wrap; gap:8px; }
.tex-item { text-align:center; font-size:10px; }
canvas { border:1px solid #333; display:block; image-rendering:pixelated; width:96px; height:96px; }
#status { color:#0f0; margin:16px 0; font-size:14px; }
a { color:#4fc3f7; }
button { background:#667eea;color:#fff;padding:12px 24px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:16px 4px; }
button:hover { background:#5a6fd6; }
.filter-bar { margin:12px 0; }
.filter-bar button { padding:6px 12px; font-size:12px; margin:2px; }
.filter-bar button.active { background:#ff6b6b; }
</style>
</head><body>
<h2>ぽこポケ テクスチャ生成ツール v2</h2>
<p id="status">生成中...</p>
<div class="filter-bar" id="filterBar"></div>
<div class="grid" id="grid"></div>
<script src="building-sim-data.js"></script>

<script>
var SIZE = 64;
var textures = {};

// ============================
// UTILITY FUNCTIONS
// ============================
function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r:r, g:g, b:b};
}
function rgbStr(r,g,b,a) { return 'rgba('+Math.max(0,Math.min(255,r|0))+','+Math.max(0,Math.min(255,g|0))+','+Math.max(0,Math.min(255,b|0))+','+(a!=null?a:1)+')'; }
function makeCanvas() {
  var c = document.createElement('canvas');
  c.width = SIZE; c.height = SIZE;
  return c;
}
function noise(ctx, r, g, b, density, alpha) {
  for (var i = 0; i < density; i++) {
    ctx.fillStyle = rgbStr(r, g, b, alpha * Math.random());
    ctx.fillRect(Math.random()*SIZE|0, Math.random()*SIZE|0, 1, 1);
  }
}
function mixColor(hex, r2, g2, b2, t) {
  var c = hexToRgb(hex);
  return rgbStr(c.r+(r2-c.r)*t, c.g+(g2-c.g)*t, c.b+(b2-c.b)*t);
}
function lerpHex(hex, amt) {
  // positive = lighten, negative = darken
  var c = hexToRgb(hex);
  if (amt > 0) return rgbStr(c.r+(255-c.r)*amt, c.g+(255-c.g)*amt, c.b+(255-c.b)*amt);
  return rgbStr(c.r*(1+amt), c.g*(1+amt), c.b*(1+amt));
}

// ============================
// INDIVIDUAL TEXTURE GENERATORS
// Corrected to match actual game icons
// ============================

// --- WALL: 木のカベ (wall-wood) ---
// Golden-brown wood with horizontal planks + DARK RED/MAROON vertical band in middle
function gen_wall_wood() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // Warm golden-brown base
  ctx.fillStyle = '#c49a6c';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Horizontal plank lines
  var plankH = 10;
  for (var y = 0; y < SIZE; y += plankH) {
    // Slight color variation per plank
    var v = (Math.random()-0.5)*15|0;
    ctx.fillStyle = rgbStr(196+v, 154+v, 108+v);
    ctx.fillRect(0, y, SIZE, plankH-1);
    // Plank gap line
    ctx.fillStyle = rgbStr(140, 100, 60, 0.6);
    ctx.fillRect(0, y+plankH-1, SIZE, 1);
    // Wood grain
    for (var gx = 0; gx < SIZE; gx += 3) {
      ctx.fillStyle = rgbStr(160+Math.random()*20|0, 120+Math.random()*15|0, 70+Math.random()*15|0, 0.15);
      ctx.fillRect(gx, y, 2, plankH-1);
    }
  }
  // DARK RED/MAROON vertical band in the middle
  var bandW = 10;
  var bandX = (SIZE - bandW) / 2;
  ctx.fillStyle = rgbStr(120, 30, 30, 0.85);
  ctx.fillRect(bandX, 0, bandW, SIZE);
  // Band edge highlights
  ctx.fillStyle = rgbStr(160, 50, 40, 0.4);
  ctx.fillRect(bandX, 0, 1, SIZE);
  ctx.fillRect(bandX+bandW-1, 0, 1, SIZE);
  // Replicate plank gaps over band
  for (var y = 0; y < SIZE; y += plankH) {
    ctx.fillStyle = rgbStr(80, 20, 20, 0.5);
    ctx.fillRect(bandX, y+plankH-1, bandW, 1);
  }
  noise(ctx, 0,0,0, 60, 0.04);
  return c;
}

// --- WALL: 木のカベ・ライト (wall-wood-light) ---
// Light YELLOW-ORANGE wood with horizontal planks
function gen_wall_wood_light() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#f0d090';
  ctx.fillRect(0,0,SIZE,SIZE);
  var plankH = 10;
  for (var y = 0; y < SIZE; y += plankH) {
    var v = (Math.random()-0.5)*10|0;
    ctx.fillStyle = rgbStr(240+v, 208+v, 144+v);
    ctx.fillRect(0, y, SIZE, plankH-1);
    ctx.fillStyle = rgbStr(200, 170, 100, 0.5);
    ctx.fillRect(0, y+plankH-1, SIZE, 1);
    // grain
    for (var gx = 0; gx < SIZE; gx += 4) {
      ctx.fillStyle = rgbStr(220, 190, 120, 0.12);
      ctx.fillRect(gx, y, 2, plankH-1);
    }
  }
  noise(ctx, 200,180,100, 40, 0.05);
  return c;
}

// --- WALL: ペンキぬりのカベ (wall-painted) ---
// PINK-BEIGE horizontal striped boards
function gen_wall_painted() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // More PINK-beige tone (game is distinctly pink)
  ctx.fillStyle = '#f2c8c0';
  ctx.fillRect(0,0,SIZE,SIZE);
  var plankH = 8;
  for (var y = 0; y < SIZE; y += plankH) {
    var v = (Math.random()-0.5)*8|0;
    ctx.fillStyle = rgbStr(242+v, 195+v, 185+v);
    ctx.fillRect(0, y, SIZE, plankH-1);
    ctx.fillStyle = rgbStr(210, 160, 150, 0.5);
    ctx.fillRect(0, y+plankH-1, SIZE, 1);
  }
  noise(ctx, 220,180,175, 40, 0.03);
  return c;
}

// --- WALL: しっくいのカベ (wall-plaster) ---
// Very WHITE/CREAM
function gen_wall_plaster() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#f8f6f2';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Subtle edge shading
  var grad = ctx.createLinearGradient(0,0,0,SIZE);
  grad.addColorStop(0, 'rgba(0,0,0,0.02)');
  grad.addColorStop(0.15, 'rgba(0,0,0,0)');
  grad.addColorStop(0.85, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.03)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,SIZE,SIZE);
  noise(ctx, 180,175,170, 100, 0.02);
  noise(ctx, 255,255,255, 50, 0.02);
  return c;
}

// --- WALL: ぬののカベ (wall-cloth) ---
// WHITE cloth with soft horizontal fold lines
function gen_wall_cloth() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // PURE WHITE like game
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Very soft horizontal folds
  for (var y = 8; y < SIZE; y += 10) {
    ctx.fillStyle = rgbStr(230, 230, 230, 0.25);
    ctx.fillRect(0, y, SIZE, 1);
    ctx.fillStyle = rgbStr(255, 255, 255, 0.5);
    ctx.fillRect(0, y+1, SIZE, 1);
  }
  // Very subtle weave
  for (var x = 0; x < SIZE; x += 2) {
    for (var y = 0; y < SIZE; y += 2) {
      if ((x/2+y/2)%2===0) {
        ctx.fillStyle = rgbStr(0,0,0,0.008);
        ctx.fillRect(x,y,2,2);
      }
    }
  }
  return c;
}

// --- WALL: きゃくしつのカベ (wall-guestroom) ---
// WHITE/MINT with colored horizontal stripes (green/teal accent)
function gen_wall_guestroom() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // WHITE base with mint/teal horizontal stripes (game: white background, 2 thin teal stripes)
  ctx.fillStyle = '#f5f9f7';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Two thin teal accent stripes
  ctx.fillStyle = '#70c8b8';
  ctx.fillRect(0, SIZE*0.35, SIZE, 3);
  ctx.fillStyle = '#80d4c4';
  ctx.fillRect(0, SIZE*0.62, SIZE, 3);
  // Subtle panel line
  ctx.fillStyle = rgbStr(200,215,210, 0.2);
  ctx.fillRect(0, SIZE*0.15, SIZE, 1);
  ctx.fillRect(0, SIZE*0.85, SIZE, 1);
  noise(ctx, 0,0,0, 20, 0.01);
  return c;
}

// --- WALL: ほしぞらのカベ (wall-starry) ---
// DARK BLUE/NAVY with COLORFUL stars
function gen_wall_starry() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  var grad = ctx.createLinearGradient(0,0,0,SIZE);
  grad.addColorStop(0, '#0d1040');
  grad.addColorStop(0.5, '#151860');
  grad.addColorStop(1, '#0d1040');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,SIZE,SIZE);
  // Colorful stars
  var starColors = ['#ff6b6b','#ffd93d','#6bcbff','#ff8fd8','#fff','#ffa06b','#a0ff6b','#fff'];
  for (var i = 0; i < 35; i++) {
    var sx = Math.random()*SIZE, sy = Math.random()*SIZE;
    var s = 0.6 + Math.random()*1.8;
    var col = starColors[Math.random()*starColors.length|0];
    var rgb = hexToRgb(col);
    ctx.fillStyle = rgbStr(rgb.r, rgb.g, rgb.b, 0.6+Math.random()*0.4);
    ctx.beginPath(); ctx.arc(sx, sy, s, 0, Math.PI*2); ctx.fill();
    // Glow
    if (s > 1) {
      ctx.fillStyle = rgbStr(rgb.r, rgb.g, rgb.b, 0.15);
      ctx.beginPath(); ctx.arc(sx, sy, s*2.5, 0, Math.PI*2); ctx.fill();
    }
  }
  return c;
}

// --- WALL: レザーのカベ (wall-leather) ---
// BRIGHT RED/CRIMSON quilted diamond pattern with button dots
function gen_wall_leather() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#cc2233';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Diamond quilt pattern
  var dSize = 16;
  ctx.strokeStyle = rgbStr(160, 20, 30, 0.5);
  ctx.lineWidth = 1;
  // Diagonal lines one direction
  for (var i = -SIZE; i < SIZE*2; i += dSize) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i+SIZE, SIZE); ctx.stroke();
  }
  // Diagonal lines other direction
  for (var i = -SIZE; i < SIZE*2; i += dSize) {
    ctx.beginPath(); ctx.moveTo(i, SIZE); ctx.lineTo(i+SIZE, 0); ctx.stroke();
  }
  // Button dots at diamond intersections
  for (var x = 0; x < SIZE; x += dSize) {
    for (var y = 0; y < SIZE; y += dSize) {
      ctx.fillStyle = rgbStr(180, 40, 50, 0.7);
      ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = rgbStr(255, 100, 110, 0.4);
      ctx.beginPath(); ctx.arc(x-0.5, y-0.5, 1, 0, Math.PI*2); ctx.fill();
    }
  }
  // Subtle shine on each diamond
  for (var x = dSize/2; x < SIZE; x += dSize) {
    for (var y = dSize/2; y < SIZE; y += dSize) {
      var grad = ctx.createRadialGradient(x-2, y-2, 0, x, y, dSize/2);
      grad.addColorStop(0, 'rgba(255,100,100,0.15)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x-dSize/2, y-dSize/2, dSize, dSize);
    }
  }
  return c;
}

// --- WALL: モダンなカベ (wall-modern) ---
// WARM ORANGE-BEIGE geometric stone tiles
function gen_wall_modern() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // Warm orange-beige IRREGULAR stone mosaic (game has random-shaped tiles)
  ctx.fillStyle = '#c8a070';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Generate irregular stone tiles with varying sizes
  var stones = [];
  for (var i = 0; i < 25; i++) {
    stones.push({
      x: Math.random()*SIZE, y: Math.random()*SIZE,
      w: 6+Math.random()*14, h: 5+Math.random()*10,
      v: (Math.random()-0.5)*30|0
    });
  }
  // Mortar (darker) background
  ctx.fillStyle = '#a08050';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Draw each irregular stone
  stones.forEach(function(s) {
    ctx.fillStyle = rgbStr(200+s.v, 165+s.v, 115+s.v);
    // Slightly rounded rectangles
    var r = 2;
    ctx.beginPath();
    ctx.moveTo(s.x+r, s.y);
    ctx.lineTo(s.x+s.w-r, s.y);
    ctx.quadraticCurveTo(s.x+s.w, s.y, s.x+s.w, s.y+r);
    ctx.lineTo(s.x+s.w, s.y+s.h-r);
    ctx.quadraticCurveTo(s.x+s.w, s.y+s.h, s.x+s.w-r, s.y+s.h);
    ctx.lineTo(s.x+r, s.y+s.h);
    ctx.quadraticCurveTo(s.x, s.y+s.h, s.x, s.y+s.h-r);
    ctx.lineTo(s.x, s.y+r);
    ctx.quadraticCurveTo(s.x, s.y, s.x+r, s.y);
    ctx.closePath(); ctx.fill();
  });
  noise(ctx, 0,0,0, 40, 0.03);
  return c;
}

// --- WALL: いしづみのカベ (wall-cobblestone / wall-broken-tile) ---
// GRAY rounded cobblestones of various sizes
function gen_wall_cobblestone() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // Mortar background (darker)
  ctx.fillStyle = '#605850';
  ctx.fillRect(0,0,SIZE,SIZE);
  // More stones, densely packed, varying sizes (game has tight-packed round stones)
  var stones = [];
  for (var i = 0; i < 35; i++) {
    stones.push({
      x: (i%7)*9.5 + (Math.floor(i/7)%2)*4.5 + Math.random()*3,
      y: Math.floor(i/7)*9.5 + Math.random()*3,
      rx: 3.5+Math.random()*3, ry: 3+Math.random()*2.5,
      v: (Math.random()-0.5)*35|0
    });
  }
  stones.forEach(function(s) {
    // Stone body
    ctx.fillStyle = rgbStr(145+s.v, 140+s.v, 135+s.v);
    ctx.beginPath(); ctx.ellipse(s.x, s.y, s.rx, s.ry, 0, 0, Math.PI*2); ctx.fill();
    // Top highlight
    ctx.fillStyle = rgbStr(185+s.v, 180+s.v, 175+s.v, 0.4);
    ctx.beginPath(); ctx.ellipse(s.x-0.5, s.y-0.8, s.rx*0.5, s.ry*0.4, 0, 0, Math.PI*2); ctx.fill();
    // Bottom shadow
    ctx.fillStyle = rgbStr(90+s.v, 85+s.v, 80+s.v, 0.2);
    ctx.beginPath(); ctx.ellipse(s.x+0.3, s.y+0.8, s.rx*0.7, s.ry*0.3, 0, 0, Math.PI*2); ctx.fill();
  });
  noise(ctx, 0,0,0, 60, 0.03);
  return c;
}

// --- WALL: レンガのカベ (wall-brick) ---
// BRIGHT ORANGE-RED bricks with white/cream mortar
function gen_wall_brick() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // WHITE mortar base (game has very light mortar)
  ctx.fillStyle = '#f0e8e0';
  ctx.fillRect(0,0,SIZE,SIZE);
  var bh = 8, bw = 16;
  for (var row = 0; row < SIZE/bh+1; row++) {
    var y = row * bh;
    var offset = (row % 2) * bw/2;
    for (var x = -bw+offset; x < SIZE+bw; x += bw) {
      var v = (Math.random()-0.5)*15|0;
      // BRIGHTER orange-red (game is very vivid orange)
      ctx.fillStyle = rgbStr(235+Math.min(v,20), 120+v, 50+v);
      ctx.fillRect(x+1, y+1, bw-2, bh-2);
    }
  }
  noise(ctx, 0,0,0, 40, 0.02);
  return c;
}

// --- WALL: いしレンガのカベ (wall-stonebrick) ---
// Gray rectangular stone bricks, evenly laid
function gen_wall_stonebrick() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#c0bbb5';
  ctx.fillRect(0,0,SIZE,SIZE);
  var bh = 10, bw = 20;
  for (var row = 0; row < SIZE/bh+1; row++) {
    var y = row * bh;
    var offset = (row % 2) * bw/2;
    for (var x = -bw+offset; x < SIZE+bw; x += bw) {
      var v = (Math.random()-0.5)*15|0;
      ctx.fillStyle = rgbStr(175+v, 170+v, 165+v);
      ctx.fillRect(x+1, y+1, bw-2, bh-2);
    }
  }
  noise(ctx, 0,0,0, 50, 0.03);
  return c;
}

// --- WALL: ふるびたいしカベ (wall-aged-stone) ---
// Dark brownish-gray aged stone with cracks
function gen_wall_aged_stone() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#8a8070';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Random stone blocks
  var bh = 12, bw = 18;
  for (var row = 0; row < SIZE/bh+1; row++) {
    var y = row * bh;
    var offset = (row % 2) * bw/3;
    for (var x = -bw+offset; x < SIZE+bw; x += bw) {
      var v = (Math.random()-0.5)*20|0;
      ctx.fillStyle = rgbStr(120+v, 110+v, 95+v);
      ctx.fillRect(x+1, y+1, bw-2, bh-2);
    }
  }
  // Cracks
  ctx.strokeStyle = rgbStr(60, 55, 45, 0.4);
  ctx.lineWidth = 0.5;
  for (var i = 0; i < 5; i++) {
    ctx.beginPath();
    var cx = Math.random()*SIZE, cy = Math.random()*SIZE;
    ctx.moveTo(cx, cy);
    for (var j = 0; j < 4; j++) {
      cx += (Math.random()-0.5)*15;
      cy += (Math.random()-0.5)*10;
      ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }
  noise(ctx, 0,0,0, 100, 0.05);
  return c;
}

// --- WALL: うちっぱなしのカベ (wall-concrete) ---
// Light gray concrete with subtle tie-hole dots
function gen_wall_concrete() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#d8d8d8';
  ctx.fillRect(0,0,SIZE,SIZE);
  noise(ctx, 0,0,0, 200, 0.03);
  noise(ctx, 255,255,255, 80, 0.02);
  // Tie-hole dots
  for (var x = 16; x < SIZE; x += 24) {
    for (var y = 16; y < SIZE; y += 24) {
      ctx.fillStyle = rgbStr(160,160,160, 0.5);
      ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2); ctx.fill();
    }
  }
  return c;
}

// --- WALL: おうごんのカベ (wall-gold) ---
// RICH GOLD metallic, like actual gold bars
function gen_wall_gold() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // DARKER gold (game is rich dark gold, not bright yellow)
  var grad = ctx.createLinearGradient(0,0,SIZE,SIZE);
  grad.addColorStop(0, '#b8860b');
  grad.addColorStop(0.15, '#d4a020');
  grad.addColorStop(0.35, '#c89818');
  grad.addColorStop(0.5, '#daa830');
  grad.addColorStop(0.65, '#c09010');
  grad.addColorStop(0.85, '#b88808');
  grad.addColorStop(1, '#a07808');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,SIZE,SIZE);
  // Gold bar grooves
  for (var y = 16; y < SIZE; y += 16) {
    ctx.fillStyle = rgbStr(140, 105, 15, 0.35);
    ctx.fillRect(0, y, SIZE, 1);
  }
  // Small shine highlight
  ctx.fillStyle = 'rgba(255,240,160,0.15)';
  ctx.fillRect(6, 4, 14, 6);
  noise(ctx, 200,170,50, 30, 0.04);
  return c;
}

// --- WALL: クリスタルのカベ (wall-crystal) ---
// LIGHT BLUE/CYAN with TRIANGULAR geometric facet patterns
function gen_wall_crystal() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  // Brighter cyan base (game is vivid cyan-blue)
  ctx.fillStyle = '#60d0f0';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Dense triangular facets (game has tight diamond/triangle grid)
  var fSize = 10;
  for (var row = 0; row < SIZE/fSize+1; row++) {
    for (var col = 0; col < SIZE/(fSize)+1; col++) {
      var x = col * fSize + ((row%2) ? fSize/2 : 0);
      var y = row * fSize;
      var v = Math.random()*40|0;
      // Upper triangle (lighter)
      ctx.fillStyle = rgbStr(80+v, 200+Math.min(v,55), 240+Math.min(v,15), 0.6);
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x+fSize, y); ctx.lineTo(x+fSize/2, y+fSize);
      ctx.closePath(); ctx.fill();
      // Inverted triangle (darker)
      ctx.fillStyle = rgbStr(50+v, 180+Math.min(v,55), 230+Math.min(v,25), 0.5);
      ctx.beginPath();
      ctx.moveTo(x, y+fSize); ctx.lineTo(x+fSize, y+fSize); ctx.lineTo(x+fSize/2, y);
      ctx.closePath(); ctx.fill();
    }
  }
  // Facet edges (white, more visible)
  ctx.strokeStyle = rgbStr(220, 250, 255, 0.6);
  ctx.lineWidth = 0.7;
  for (var row = 0; row < SIZE/fSize+1; row++) {
    for (var col = 0; col < SIZE/fSize+1; col++) {
      var x = col * fSize + ((row%2) ? fSize/2 : 0);
      var y = row * fSize;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+fSize/2, y+fSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+fSize, y); ctx.lineTo(x+fSize/2, y+fSize); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+fSize, y); ctx.stroke();
    }
  }
  // Bright sparkles
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  for (var i = 0; i < 12; i++) {
    var sx = Math.random()*SIZE, sy = Math.random()*SIZE;
    ctx.beginPath(); ctx.arc(sx, sy, 0.8+Math.random()*0.5, 0, Math.PI*2); ctx.fill();
  }
  return c;
}

// --- PRINT: はなもよう (print-flower) ---
// PINK background with cherry blossom flower pattern
function gen_print_flower() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#f48fb1';
  ctx.fillRect(0,0,SIZE,SIZE);
  // Cherry blossom flowers
  function drawFlower(cx, cy, size) {
    for (var i = 0; i < 5; i++) {
      var angle = (i/5)*Math.PI*2 - Math.PI/2;
      var px = cx + Math.cos(angle)*size;
      var py = cy + Math.sin(angle)*size;
      ctx.fillStyle = rgbStr(255, 220, 230, 0.8);
      ctx.beginPath(); ctx.arc(px, py, size*0.7, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#ffd54f';
    ctx.beginPath(); ctx.arc(cx, cy, size*0.3, 0, Math.PI*2); ctx.fill();
  }
  drawFlower(12, 12, 5);
  drawFlower(44, 16, 4);
  drawFlower(28, 40, 5);
  drawFlower(8, 52, 3);
  drawFlower(52, 48, 4);
  return c;
}

  ctx.fillStyle = grad;
  ctx.fillRect(0,0,SIZE,SIZE);
  for (var i = 0; i < 5; i++) {
    ctx.strokeStyle = rgbStr(255,255,255, 0.06);
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(Math.random()*SIZE, Math.random()*SIZE);
    ctx.lineTo(Math.random()*SIZE, Math.random()*SIZE);
    ctx.stroke();
  }
  return c;
}

function genCarpet(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  var bg = hexToRgb(baseColor);
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  for (var i = 0; i < 500; i++) {
    var v = (Math.random()-0.5)*20|0;
    ctx.fillStyle = rgbStr(bg.r+v, bg.g+v, bg.b+v, 0.12);
    ctx.fillRect(Math.random()*SIZE|0, Math.random()*SIZE|0, 1, 1+Math.random()*2|0);
  }
  return c;
}

function genTile(baseColor, tw, th) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  tw = tw || 16; th = th || 16;
  var bg = hexToRgb(baseColor);
  ctx.fillStyle = rgbStr(bg.r-10,bg.g-10,bg.b-10);
  ctx.fillRect(0,0,SIZE,SIZE);
  for (var x = 0; x < SIZE; x += tw) {
    for (var y = 0; y < SIZE; y += th) {
      var v = (Math.random()-0.5)*10|0;
      ctx.fillStyle = rgbStr(bg.r+v, bg.g+v, bg.b+v);
      ctx.fillRect(x+1, y+1, tw-2, th-2);
    }
  }
  noise(ctx, 0,0,0, 30, 0.02);
  return c;
}

function genPlaster(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  noise(ctx, 0,0,0, 150, 0.025);
  noise(ctx, 255,255,255, 80, 0.02);
  return c;
}

function genConcrete(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  noise(ctx, 0,0,0, 200, 0.03);
  noise(ctx, 255,255,255, 60, 0.02);
  for (var i = 0; i < 4; i++) {
    var bg = hexToRgb(baseColor);
    ctx.fillStyle = rgbStr(bg.r-20, bg.g-20, bg.b-20, 0.3);
    ctx.beginPath();
    ctx.arc(Math.random()*SIZE, Math.random()*SIZE, 1+Math.random()*1.5, 0, Math.PI*2);
    ctx.fill();
  }
  return c;
}

function genSolid(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  noise(ctx, 0,0,0, 30, 0.02);
  noise(ctx, 255,255,255, 15, 0.02);
  return c;
}

function genGlass(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  var bg = hexToRgb(baseColor);
  ctx.fillStyle = rgbStr(bg.r, bg.g, bg.b, 0.45);
  ctx.fillRect(0,0,SIZE,SIZE);
  var grad = ctx.createLinearGradient(0,0,SIZE*0.6,SIZE*0.6);
  grad.addColorStop(0, 'rgba(255,255,255,0.35)');
  grad.addColorStop(0.4, 'rgba(255,255,255,0.05)');
  grad.addColorStop(1, 'rgba(255,255,255,0.12)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,SIZE,SIZE);
  return c;
}

function genMarble(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  var bg = hexToRgb(baseColor);
  for (var i = 0; i < 4; i++) {
    ctx.strokeStyle = rgbStr(bg.r-40, bg.g-40, bg.b-30, 0.1+Math.random()*0.08);
    ctx.lineWidth = 0.5+Math.random();
    ctx.beginPath();
    var sx = Math.random()*SIZE, sy = Math.random()*SIZE;
    ctx.moveTo(sx, sy);
    for (var j = 0; j < 6; j++) { sx+=(Math.random()-0.5)*20; sy+=(Math.random()-0.5)*20; ctx.lineTo(sx,sy); }
    ctx.stroke();
  }
  noise(ctx, bg.r, bg.g, bg.b, 30, 0.03);
  return c;
}

function genRoofTile(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  var bg = hexToRgb(baseColor);
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  var rh = 10;
  for (var row = 0; row < SIZE/rh+1; row++) {
    var y = row * rh;
    var off = (row%2) * 10;
    for (var x = -10+off; x < SIZE+10; x += 20) {
      var v = (Math.random()-0.5)*15|0;
      ctx.fillStyle = rgbStr(bg.r+v, bg.g+v, bg.b+v);
      ctx.beginPath(); ctx.arc(x+10, y+rh, 12, Math.PI, 0); ctx.fill();
      ctx.strokeStyle = rgbStr(bg.r-30, bg.g-30, bg.b-30, 0.3);
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
  return c;
}

function genTent(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  var bg = hexToRgb(baseColor);
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  for (var i = 0; i < SIZE*2; i += 12) {
    ctx.fillStyle = rgbStr(bg.r-20, bg.g-20, bg.b-10, 0.3);
    ctx.beginPath();
    ctx.moveTo(i,0); ctx.lineTo(i+4,0); ctx.lineTo(i+4-SIZE,SIZE); ctx.lineTo(i-SIZE,SIZE);
    ctx.fill();
  }
  return c;
}

function genDoor(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  var bg = hexToRgb(baseColor);
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  ctx.strokeStyle = rgbStr(bg.r-30, bg.g-30, bg.b-30, 0.6);
  ctx.lineWidth = 2;
  ctx.strokeRect(4,2,SIZE-8,SIZE-4);
  ctx.lineWidth = 1;
  ctx.strokeRect(8,6,SIZE-16,24);
  ctx.strokeRect(8,34,SIZE-16,24);
  ctx.fillStyle = '#ffd54f';
  ctx.beginPath(); ctx.arc(SIZE-14, SIZE/2, 3, 0, Math.PI*2); ctx.fill();
  return c;
}

function genWindow(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  var bg = hexToRgb(baseColor);
  ctx.fillStyle = rgbStr(bg.r, bg.g, bg.b, 0.5);
  ctx.fillRect(0,0,SIZE,SIZE);
  ctx.strokeStyle = '#8d6e63';
  ctx.lineWidth = 3;
  ctx.strokeRect(2,2,SIZE-4,SIZE-4);
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(SIZE/2,2); ctx.lineTo(SIZE/2,SIZE-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,SIZE/2); ctx.lineTo(SIZE-2,SIZE/2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(5,5,SIZE/2-5,SIZE/2-5);
  return c;
}

function genStripe(baseColor, vertical) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,SIZE,SIZE);
  var bg = hexToRgb(baseColor);
  for (var i = 0; i < SIZE; i += 8) {
    ctx.fillStyle = rgbStr(bg.r, bg.g, bg.b, 0.7);
    if (vertical) ctx.fillRect(i,0,4,SIZE);
    else ctx.fillRect(0,i,SIZE,4);
  }
  return c;
}

function genCheck(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,SIZE,SIZE);
  var bg = hexToRgb(baseColor);
  for (var x = 0; x < SIZE; x += 8) {
    for (var y = 0; y < SIZE; y += 8) {
      if ((x/8+y/8)%2===0) {
        ctx.fillStyle = rgbStr(bg.r, bg.g, bg.b, 0.6);
        ctx.fillRect(x,y,8,8);
      }
    }
  }
  return c;
}

function genHay() {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = '#dbc280';
  ctx.fillRect(0,0,SIZE,SIZE);
  for (var i = 0; i < 80; i++) {
    ctx.strokeStyle = rgbStr(180+Math.random()*40|0, 160+Math.random()*40|0, 60+Math.random()*40|0, 0.4);
    ctx.lineWidth = 0.5;
    var x = Math.random()*SIZE, y = Math.random()*SIZE;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+(Math.random()-0.5)*12, y+(Math.random()-0.5)*3); ctx.stroke();
  }
  return c;
}

function genGrass(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  var bg = hexToRgb(baseColor);
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  for (var i = 0; i < 200; i++) {
    var v = (Math.random()-0.5)*30|0;
    ctx.strokeStyle = rgbStr(bg.r+v, bg.g+v+10, bg.b+v, 0.4);
    ctx.lineWidth = 0.5;
    var x = Math.random()*SIZE, y = Math.random()*SIZE;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+(Math.random()-0.5)*3, y-2-Math.random()*4); ctx.stroke();
  }
  return c;
}

function genCloth(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  for (var x = 0; x < SIZE; x += 4) {
    for (var y = 0; y < SIZE; y += 4) {
      if ((x/4+y/4)%2===0) {
        ctx.fillStyle = 'rgba(0,0,0,0.03)';
        ctx.fillRect(x,y,4,4);
      }
    }
  }
  noise(ctx, 0,0,0, 60, 0.02);
  return c;
}

function genRoad(baseColor) {
  var c = makeCanvas(), ctx = c.getContext('2d');
  ctx.fillStyle = baseColor;
  ctx.fillRect(0,0,SIZE,SIZE);
  noise(ctx, 0,0,0, 200, 0.04);
  noise(ctx, 255,255,255, 60, 0.02);
  return c;
}

// ============================
// MASTER DISPATCH: map block IDs to generators
// ============================
function generateForBlock(id, baseColor) {
  // === WALLS (specifically corrected) ===
  if (id === 'wall-wood') return gen_wall_wood();
  if (id === 'wall-wood-light') return gen_wall_wood_light();
  if (id === 'wall-painted') return gen_wall_painted();
  if (id === 'wall-plaster') return gen_wall_plaster();
  if (id === 'wall-cloth') return gen_wall_cloth();
  if (id === 'wall-guestroom') return gen_wall_guestroom();
  if (id === 'wall-starry') return gen_wall_starry();
  if (id === 'wall-leather') return gen_wall_leather();
  if (id === 'wall-modern') return gen_wall_modern();
  if (id === 'wall-broken-tile' || id === 'wall-cobblestone') return gen_wall_cobblestone();
  if (id === 'wall-brick') return gen_wall_brick();
  if (id === 'wall-stonebrick') return gen_wall_stonebrick();
  if (id === 'wall-aged-stone' || id === 'wall-aged-stone-pat') return gen_wall_aged_stone();
  if (id === 'wall-concrete') return gen_wall_concrete();
  if (id === 'wall-rough') return genPlaster(baseColor);
  if (id === 'wall-striped') return gen_wall_bronze(baseColor);
  if (id === 'wall-bronze' || id === 'wall-bronze-stylish') return gen_wall_bronze(baseColor);
  if (id === 'wall-iron' || id === 'wall-iron-stylish') return gen_wall_iron();
  if (id === 'wall-gold' || id === 'wall-gold-stylish') return gen_wall_gold();
  if (id === 'wall-crystal') return gen_wall_crystal();
  if (id === 'wall-pokeball') return gen_wall_pokeball();
  if (id === 'wall-warning') return gen_wall_warning();

  // === DECO WALLS ===
  if (id.indexOf('deco-brick') === 0) return genBrick(baseColor);
  if (id.indexOf('deco-stone') === 0) return genStone(baseColor);
  if (id.indexOf('deco-wood') === 0) return genWoodPlanks(baseColor, true);
  if (id.indexOf('deco-stylish') === 0) return genWoodPlanks(baseColor, true);
  if (id.indexOf('deco-antique-light') === 0) return genWoodPlanks(baseColor, true);
  if (id.indexOf('deco-antique') === 0) return genWoodPlanks(baseColor, true);
  if (id.indexOf('deco-pop') === 0 || id.indexOf('deco-sweets') === 0 || id.indexOf('deco-pokecenter') === 0) return genSolid(baseColor);

  // === FLOORS (specifically corrected) ===
  if (id === 'floor-wood') return gen_floor_wood();
  if (id === 'floor-wood-diag') return gen_floor_wood_diag();
  if (id === 'floor-wood-cross') return genWoodPlanks('#9a7855', false);
  if (id === 'floor-hardwood') return genWoodPlanks(baseColor, false);
  if (id === 'floor-modern-carpet') return gen_floor_modern_carpet();
  if (id === 'floor-fluffy') return gen_floor_fluffy();
  if (id === 'floor-extravagant') return gen_floor_extravagant();
  if (id === 'floor-tatami') return gen_floor_tatami();
  if (id === 'floor-grass') return gen_floor_grass();
  if (id === 'floor-marble') return gen_floor_marble();
  if (id === 'floor-marble-light') return gen_floor_marble();
  if (id === 'floor-marble-dark') return genMarble(baseColor);
  if (id === 'floor-brick') return gen_floor_brick();
  if (id === 'floor-neon') return gen_floor_neon();
  if (id === 'floor-cyber') return gen_floor_cyber();
  if (id === 'floor-woven-carpet' || id === 'floor-soft-carpet' || id === 'floor-felt') return genCarpet(baseColor);
  if (id === 'floor-simple') return genTile(baseColor, 32, 32);
  if (id.indexOf('floor-stone') === 0 || id === 'floor-lined-stone' || id === 'floor-aged-stone') return genStone(baseColor);
  if (id === 'floor-triangle-pat') return genTile(baseColor, 8, 8);
  if (id === 'floor-ironplate' || id === 'floor-iron-tile') return genMetal(baseColor);
  if (id.indexOf('floor-') === 0 && id.indexOf('tile') !== -1) return genTile(baseColor);
  if (id === 'floor-mosaic') return genTile(baseColor, 8, 8);
  if (id === 'floor-fishscale') return genTile(baseColor, 10, 10);

  // === ROADS ===
  if (id === 'road-lined-h') {
    var rc = genRoad(baseColor);
    var rctx = rc.getContext('2d');
    rctx.strokeStyle = '#fff';
    rctx.lineWidth = 2;
    rctx.setLineDash([8,6]);
    rctx.beginPath(); rctx.moveTo(0, SIZE/2); rctx.lineTo(SIZE, SIZE/2); rctx.stroke();
    rctx.setLineDash([]);
    return rc;
  }
  if (id === 'road-lined-v') {
    var rc = genRoad(baseColor);
    var rctx = rc.getContext('2d');
    rctx.strokeStyle = '#fff';
    rctx.lineWidth = 2;
    rctx.setLineDash([8,6]);
    rctx.beginPath(); rctx.moveTo(SIZE/2, 0); rctx.lineTo(SIZE/2, SIZE); rctx.stroke();
    rctx.setLineDash([]);
    return rc;
  }
  if (id.indexOf('road-') === 0) return genRoad(baseColor);

  // === ROOFS ===
  if (id.indexOf('roof-tile') === 0) return genRoofTile(baseColor);
  if (id.indexOf('roof-stone') === 0) return genStone(baseColor);
  if (id.indexOf('roof-brick') === 0) return genBrick(baseColor);
  if (id.indexOf('roof-tent') === 0) return genTent(baseColor);
  if (id === 'roof-fan') return genMetal(baseColor);
  if (id === 'roof-support') return genWoodPlanks(baseColor, true);

  // === DOORS ===
  if (id.indexOf('door-') === 0) return genDoor(baseColor);

  // === WINDOWS ===
  if (id.indexOf('window-stained') === 0) return genGlass(baseColor);
  if (id.indexOf('window-') === 0 || id.indexOf('curtain-') === 0) return genWindow(baseColor);

  // === PRINTS (specifically corrected) ===
  if (id === 'print-polkadot') return gen_print_polkadot();
  if (id === 'print-gingham') return gen_print_gingham();
  if (id === 'print-flower') return gen_print_flower();
  if (id === 'print-pokeball' || id === 'print-pokeball-stylish') return gen_print_pokeball_pat();
  if (id === 'print-vstripe') return genStripe(baseColor, true);
  if (id === 'print-hstripe') return genStripe(baseColor, false);
  if (id === 'print-tartan' || id === 'print-argyle') return genCheck(baseColor);
  if (id === 'print-star') return gen_wall_starry();
  if (id === 'print-zigzag') return gen_wall_warning();

  // Remaining prints use pattern generators
  if (id === 'print-berry') return genSolid('#a5d6a7');
  if (id === 'print-bubble') return genGlass('#b3e5fc');
  if (id === 'print-houndstooth') return genCheck('#212121');
  if (id === 'print-vine') return genGrass('#2e7d32');
  if (id === 'print-swirl') {
    var sc = makeCanvas(), sctx = sc.getContext('2d');
    sctx.fillStyle = '#7e57c2'; sctx.fillRect(0,0,SIZE,SIZE);
    for (var i = 0; i < 4; i++) {
      sctx.strokeStyle = rgbStr(160,120,220, 0.3);
      sctx.lineWidth = 2;
      sctx.beginPath();
      var cx=16+Math.random()*32, cy=16+Math.random()*32;
      for (var t = 0; t < 12; t++) {
        sctx.lineTo(cx+Math.cos(t*0.8)*t*1.5, cy+Math.sin(t*0.8)*t*1.5);
      }
      sctx.stroke();
    }
    return sc;
  }
  if (id === 'print-winter') {
    var wc = makeCanvas(), wctx = wc.getContext('2d');
    wctx.fillStyle = '#e3f2fd'; wctx.fillRect(0,0,SIZE,SIZE);
    wctx.fillStyle = '#fff';
    for (var i = 0; i < 15; i++) {
      var sx=Math.random()*SIZE, sy=Math.random()*SIZE, ss=1+Math.random()*2;
      wctx.beginPath(); wctx.arc(sx,sy,ss,0,Math.PI*2); wctx.fill();
    }
    return wc;
  }
  if (id === 'print-leaf') return genGrass('#81c784');
  if (id === 'print-curry') {
    var cc = makeCanvas(), cctx = cc.getContext('2d');
    cctx.fillStyle = '#ff8f00'; cctx.fillRect(0,0,SIZE,SIZE);
    noise(cctx, 200,120,0, 80, 0.1);
    noise(cctx, 255,200,100, 40, 0.08);
    return cc;
  }

  // === MISC ===
  if (id === 'misc-hay') return genHay();
  if (id === 'misc-ironplate') return genMetal(baseColor);
  if (id === 'misc-cubelight') return genGlass('#fff9c4');
  if (id === 'misc-foundation' || id === 'misc-levee') return genConcrete(baseColor);
  if (id === 'misc-scrap') return genStone(baseColor);

  // === PAINT ===
  if (id.indexOf('paint-') === 0) return genSolid(baseColor);

  // === FALLBACK ===
  return genSolid(baseColor);
}


// ============================
// GENERATE ALL + UI
// ============================
var grid = document.getElementById('grid');
var status = document.getElementById('status');
var filterBar = document.getElementById('filterBar');
var blocks = [];

// building-sim-data.js is already loaded via script tag in HTML
// Use setTimeout to ensure DOM and scripts are ready
setTimeout(function() {
  if (typeof BUILDING_SIM_BLOCKS !== 'undefined') {
    blocks = BUILDING_SIM_BLOCKS;
    generateAll();
  } else {
    var s = document.createElement('script');
    s.src = 'building-sim-data.js?v=' + Date.now();
    s.onload = function() { blocks = BUILDING_SIM_BLOCKS; generateAll(); };
    document.body.appendChild(s);
  }
}, 100);

function generateAll() {
  grid.innerHTML = '';
  var count = 0;
  var categories = {};

  blocks.forEach(function(block) {
    var canvas = generateForBlock(block.id, block.colorTop);
    var div = document.createElement('div');
    div.className = 'tex-item';
    div.dataset.cat = block.id.split('-')[0];
    div.appendChild(canvas);
    var label = document.createElement('div');
    label.textContent = (block.name || block.id);
    div.appendChild(label);
    var idLabel = document.createElement('div');
    idLabel.style.color = '#888';
    idLabel.textContent = block.id;
    div.appendChild(idLabel);

    grid.appendChild(div);
    textures[block.id] = canvas;
    count++;

    var cat = block.id.split('-')[0];
    categories[cat] = (categories[cat]||0) + 1;
  });

  status.textContent = count + '個のテクスチャを生成しました。';

  // Filter buttons
  filterBar.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.textContent = 'ALL (' + count + ')';
  allBtn.className = 'active';
  allBtn.onclick = function() { filterCategory('all'); };
  filterBar.appendChild(allBtn);
  Object.keys(categories).forEach(function(cat) {
    var btn = document.createElement('button');
    btn.textContent = cat + ' (' + categories[cat] + ')';
    btn.onclick = function() { filterCategory(cat); };
    filterBar.appendChild(btn);
  });

  // Download buttons
  var dlBtn = document.createElement('button');
  dlBtn.textContent = '一括ダウンロード（個別PNG）';
  dlBtn.onclick = function() {
    var keys = Object.keys(textures);
    var i = 0;
    function next() {
      if (i >= keys.length) { status.textContent = '完了！ ' + keys.length + '個保存しました。'; return; }
      var a = document.createElement('a');
      a.download = keys[i] + '.png';
      a.href = textures[keys[i]].toDataURL('image/png');
      a.click();
      status.textContent = (i+1) + '/' + keys.length + ' 保存中...';
      i++;
      setTimeout(next, 100);
    }
    next();
  };
  status.parentNode.insertBefore(dlBtn, status.nextSibling);
}

function filterCategory(cat) {
  var items = grid.querySelectorAll('.tex-item');
  items.forEach(function(item) {
    if (cat === 'all' || item.dataset.cat === cat) {
      item.style.display = '';
    } else {
      item.style.display = 'none';
    }
  });
  var btns = filterBar.querySelectorAll('button');
  btns.forEach(function(btn) {
    btn.className = btn.textContent.toLowerCase().indexOf(cat) !== -1 || (cat==='all' && btn.textContent.indexOf('ALL')===0) ? 'active' : '';
  });
}
