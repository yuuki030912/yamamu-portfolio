name: New video → article draft

# 新着YouTube動画を検知して「記事の下書き」をPRで用意する（承認あり運用）。
# 対応ゲームは下書きHTML＋カード＋sitemapを作り、字幕から詳しい本文まで生成。
# 全ゲームを drafts/pending-videos.md に追記する。下書きは noindex なので、
# 本人が確認して公開操作をするまでは検索に出ない（安全）。

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/new-video-article-draft.yml"
      - "scripts/new-video-article-draft.mjs"
      - "scripts/enrich-video-article.mjs"
      - "scripts/refresh-article-sources.mjs"
      - "prompts/video-article-system.md"
      - "tests/article-enrichment.test.mjs"
  schedule:
    - cron: "17,47 * * * *"  # 30分おき。新着がなければ重い処理はスキップ
  workflow_dispatch:          # 手動実行も可
    inputs:
      since:
        description: "この日付(YYYY-MM-DD)以降の動画を対象にする（テスト用。空なら既定の2026-07-22以降）"
        required: false
        default: ""
      rebuild_existing:
        description: "公開済みのポケポケ／パルワールド記事も字幕・説明文から再生成する"
        required: false
        type: boolean
        default: false
      only_video:
        description: "特定のYouTube動画IDだけを再生成する（空なら全対象）"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  models: read

concurrency:
  group: new-video-article-draft
  # 定期実行と手動・push実行が重なっても、生成途中の記事を破棄しない。
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate drafts for new videos
        id: gen
        env:
          PROCESS_SINCE: ${{ inputs.since }}
        run: node scripts/new-video-article-draft.mjs
      - name: Install YouTube caption extractor
        if: steps.gen.outputs.has_changes == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --disable-pip-version-check yt-dlp bgutil-ytdlp-pot-provider==1.3.1
          docker run --rm --detach --init --name bgutil-provider -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider:1.3.1
          sleep 3
          docker ps --filter name=bgutil-provider
      - name: Turn captions into detailed article drafts
        id: enrich
        if: steps.gen.outputs.has_changes == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_MODELS_TOKEN: ${{ github.token }}
          ARTICLE_MODEL: openai/gpt-4.1
          ALLOW_DESCRIPTION_FALLBACK: "1"
          REBUILD_EXISTING: ${{ (github.event_name == 'push' || inputs.rebuild_existing) && '1' || '0' }}
          ONLY_VIDEO: ${{ inputs.only_video }}
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
        run: node scripts/enrich-video-article.mjs
      - name: Test the article quality gate
        run: node --test tests/article-enrichment.test.mjs
      - name: Open PR if drafts were created or enriched
        if: steps.gen.outputs.has_changes == 'true' || steps.enrich.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/new-video-drafts
          delete-branch: true
          title: "🎬 新着動画を内容の濃い攻略記事へ変換"
          commit-message: "draft: 字幕から詳しい動画記事を生成"
          body: |
            ## 🎬 字幕をもとにした動画記事の下書き

            新着動画を検知し、字幕と動画説明文を一次情報として、内容の濃い攻略記事を用意しました。
            本文はAIによる事実校閲と品質ゲート（字幕あり2,800文字以上／説明文のみ2,000文字以上・4見出し以上・FAQ 3件以上・弱点の明記）を通過したものだけ追加しています。

            ### レビュー手順
            - [ ] 数値・固有名詞・勝敗を動画と照合
            - [ ] 本人の意図と違う言い回しがないか確認
            - [ ] 「正直な弱点」「向く人・向かない人」が実体験と合っているか確認
            - [ ] 可能なら重要場面のスクリーンショットを追加
            - [ ] 完成したら各記事の `noindex` メタと「🚧下書き」バナーを削除（非表示の一次情報ブロックは残す）
            - [ ] `drafts/pending-videos.md` で対応済みの動画にチェック

            > **記事は自動公開されません。** `noindex` のままPRに出るため、本人が確認してから公開できます。
            > 字幕が取得できない場合は、250文字以上かつ3チャプター以上の詳しい説明文がある動画だけを記事化します。このフォールバックは定期実行でも有効です。材料不足の動画は、事実を作らないため従来の下書きのまま残します。
