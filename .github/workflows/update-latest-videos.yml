name: Update latest YouTube videos

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-latest-youtube-videos
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh the latest videos
        run: node scripts/update-latest-videos.mjs
      - name: Commit when videos changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No new videos."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: update latest YouTube videos"
          git push
