<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ORBIT DASH</title>
<style>
  html,body{margin:0;padding:0;background:#05060f;overflow:hidden;height:100%;touch-action:none;user-select:none;-webkit-user-select:none}
  canvas{display:block;width:100vw;height:100vh;cursor:pointer}
</style>

<body>
<canvas id="cv"></canvas>
<script>
'use strict';
/* =========================================================
   ORBIT DASH — one-button orbit action
   Space / Click / Tap : 回転方向を反転
   ========================================================= */

// ---------- canvas ----------
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1,CX=0,CY=0,R=0;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX = W/2; CY = H/2;
  R = Math.min(W,H)*0.30;
}
addEventListener('resize', resize); resize();

// ---------- utils ----------
const TAU = Math.PI*2;
// シード可能RNG（デイリーチャレンジ用）。通常時はMath.random
function mulberry32(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
let rng=Math.random;
function dayStamp(){ const d=new Date(); return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); }
const rnd = (a,b)=>a+rng()*(b-a);
const clamp = (v,a,b)=>v<a?a:(v>b?b:v);
const lerp = (a,b,t)=>a+(b-a)*t;
// signed shortest angular difference a-b in (-PI, PI]
const adiff = (a,b)=>Math.atan2(Math.sin(a-b),Math.cos(a-b));
const px = a=>CX+Math.cos(a)*R;
const py = a=>CY+Math.sin(a)*R;

// ---------- audio (WebAudio synth, no external assets) ----------
let AC=null, master=null;
let muted=!!localStorage.getItem('od_mute');
function toggleMute(){
  muted=!muted;
  localStorage.setItem('od_mute',muted?'1':'');
  if(master) master.gain.value=muted?0:0.45;
}
function initAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value=muted?0:0.45; master.connect(AC.destination);
    startBGM();
  }catch(e){ AC=null; }
}
function tone(freq,dur,type,vol,slideTo){
  if(!AC) return;
  const t0=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine';
  o.frequency.setValueAtTime(freq,t0);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo),t0+dur);
  g.gain.setValueAtTime(vol||0.2,t0);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0+dur+0.05);
}
function noiseHit(dur,vol,cutoff){
  if(!AC) return;
  const len=Math.floor(AC.sampleRate*dur), buf=AC.createBuffer(1,len,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const s=AC.createBufferSource(); s.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cutoff||900;
  const g=AC.createGain(); g.gain.value=vol||0.3;
  s.connect(f); f.connect(g); g.connect(master);
  s.start();
}
const PENTA=[261.6,293.7,329.6,392.0,440.0,523.3,587.3,659.3,784.0,880.0];
function sfxGem(combo){
  const f=PENTA[Math.min(PENTA.length-1, combo%PENTA.length)];
  tone(f,0.12,'sine',0.22); tone(f*2,0.08,'triangle',0.10);
}
function sfxFlip(){ tone(200,0.05,'square',0.07,150); }
function sfxDeath(){
  noiseHit(0.5,0.5,500);
  tone(160,0.5,'sawtooth',0.25,40);
  tone(80,0.7,'sine',0.3,30);
}
function sfxFever(){
  [0,1,2,3].forEach(i=>setTimeout(()=>tone(PENTA[4+i]||880,0.15,'square',0.12),i*70));
}
function sfxWarn(){ tone(880,0.07,'square',0.05,840); }
function sfxClose(){ tone(1200,0.1,'sine',0.12,1800); }
function sfxStart(){ tone(330,0.1,'triangle',0.15); setTimeout(()=>tone(660,0.15,'triangle',0.15),90); }
function sfxMilestone(){ tone(523,0.1,'square',0.12); setTimeout(()=>tone(784,0.12,'square',0.12),80); setTimeout(()=>tone(1046,0.18,'triangle',0.12),160); }
function sfxShield(){ tone(330,0.2,'sine',0.2); tone(440,0.25,'sine',0.15); }
function sfxShieldBreak(){ noiseHit(0.3,0.4,1200); tone(220,0.3,'square',0.2,80); }
function sfxSlow(){ tone(880,0.3,'sine',0.15,220); }
function sfxBoost(){ tone(220,0.25,'sawtooth',0.12,880); }
function sfxGold(){ tone(880,0.1,'sine',0.2); setTimeout(()=>tone(1175,0.15,'sine',0.18),70); setTimeout(()=>tone(1760,0.2,'triangle',0.15),140); }

// タブ非表示中はオーディオも止める（裏でBGMが鳴り続けるのを防止）
document.addEventListener('visibilitychange',()=>{
  if(!AC) return;
  if(document.hidden) AC.suspend(); else AC.resume();
});

// ---- BGM: Am→F→C→G の32ステップ・ループ（パッド＋メロディ＋ドラム＋ベース）----
let bgmStep=0, bgmNext=0;
const CHORDS=[                       // 8ステップごとにコードチェンジ
  [220.00,261.63,329.63],            // Am
  [174.61,220.00,261.63],            // F
  [261.63,329.63,392.00],            // C
  [196.00,246.94,293.66],            // G
];
const BROOT =[55.00,43.65,65.41,49.00];   // ベース ルート
const BFIFTH=[82.41,65.41,98.00,73.42];   // ベース 5度
const MEL=(()=>{ const m=new Array(32).fill(0);  // Amペンタのリードフレーズ
  m[0]=659.25; m[2]=587.33; m[3]=523.25; m[6]=440.00;
  m[8]=523.25; m[10]=587.33; m[11]=659.25; m[14]=587.33;
  m[16]=523.25; m[18]=440.00; m[19]=392.00; m[22]=440.00;
  m[24]=587.33; m[26]=659.25; m[27]=783.99; m[30]=659.25; m[31]=587.33;
  return m; })();
function note(freq,t0,dur,type,vol,attack){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type; o.frequency.value=freq;
  const a=attack||0.005;
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.linearRampToValueAtTime(vol,t0+a);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(master);
  o.start(t0); o.stop(t0+dur+0.05);
}
function drumNoise(t0,dur,vol,filterType,freq){
  const len=Math.floor(AC.sampleRate*dur),b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
  const src=AC.createBufferSource();src.buffer=b;
  const f=AC.createBiquadFilter();f.type=filterType;f.frequency.value=freq;
  const g=AC.createGain();g.gain.value=vol;
  src.connect(f);f.connect(g);g.connect(master);src.start(t0);
}
function startBGM(){
  if(!AC) return;
  bgmNext=AC.currentTime+0.1;
  (function loop(){
    if(!AC) return;
    const inFever=(state==='play'&&fever>0);
    const stepDur=inFever?0.115:0.14;
    while(bgmNext<AC.currentTime+0.15){
      const t0=bgmNext, S=bgmStep%32, s8=S%8, ci=(S/8)|0;
      const vol= state==='play'?1:0.4;
      // パッド（タイトル中も静かに鳴るコード）
      if(s8===0){
        for(const f of CHORDS[ci]) note(f,t0,stepDur*8,'triangle',0.035*vol,0.08);
      }
      // メロディ（コンボ5以上でオクターブ上が重なる）
      if(MEL[S]){
        note(MEL[S]*(inFever?2:1),t0,stepDur*1.9,'square',0.05*vol,0.01);
        if(state==='play'&&combo>=5) note(MEL[S]*2*(inFever?2:1),t0,stepDur*1.6,'triangle',0.028*vol,0.01);
      }
      if(state==='play'){
        // kick（4つ打ち）
        if(s8%4===0){ const o=AC.createOscillator(),g=AC.createGain();
          o.type='sine';o.frequency.setValueAtTime(140,t0);o.frequency.exponentialRampToValueAtTime(45,t0+0.12);
          g.gain.setValueAtTime(0.30,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+0.13);
          o.connect(g);g.connect(master);o.start(t0);o.stop(t0+0.15); }
        // snare（バックビート）
        if(s8===4) drumNoise(t0,0.1,0.10,'bandpass',1800);
        // hat（コンボ12以上は16分連打でドライブ感UP）
        if(s8%2===1||combo>=12) drumNoise(t0,0.03,0.045,'highpass',6000);
        // bass（ルート刻み、小節末は5度）
        if(s8%2===0){
          const f=(s8===6)?BFIFTH[ci]:BROOT[ci];
          note(f*(inFever?2:1),t0,stepDur*0.95,'triangle',0.11,0.005);
        }
      }
      bgmNext+=stepDur; bgmStep++;
    }
    setTimeout(loop,60);
  })();
}

// ---------- skins & achievements ----------
const SKINS=[
  {id:'cobalt',  name:'コバルト',   c1:'#9cf', c2:'#fff', trail:'120,170,255'},
  {id:'sakura',  name:'サクラ',     c1:'#f9c', c2:'#fff', trail:'255,150,200', need:'スコア1000',            test:s=>s.score>=1000},
  {id:'gold',    name:'ゴールド',   c1:'#fd5', c2:'#fff', trail:'255,210,80',  need:'スコア5000',            test:s=>s.score>=5000},
  {id:'emerald', name:'エメラルド', c1:'#5fa', c2:'#efe', trail:'80,255,170',  need:'WAVE 5到達',            test:s=>s.wave>=5},
  {id:'amethyst',name:'アメジスト', c1:'#b7f', c2:'#fef', trail:'180,120,255', need:'30コンボ',              test:s=>s.maxCombo>=30},
  {id:'blaze',   name:'ブレイズ',   c1:'#f80', c2:'#ffd', trail:'255,140,40',  need:'1プレイでGRAZE 10回',   test:s=>s.grazeN>=10},
  {id:'phantom', name:'ファントム', c1:'#eee', c2:'#fff', trail:'230,230,230', need:'1プレイでCLOSE! 3回',   test:s=>s.closeN>=3},
  {id:'bolt',    name:'ボルト',     c1:'#ff6', c2:'#fff', trail:'255,255,100', need:'1プレイでNICE FLIP 5回',test:s=>s.flipN>=5},
  {id:'shadow',  name:'シャドウ',   c1:'#88a', c2:'#ccf', trail:'110,110,160', need:'15秒ノーフリップ生存',  test:s=>s.noFlip>=15},
  {id:'neon',    name:'ネオン',     c1:'#0ff', c2:'#cff', trail:'0,255,255',   need:'Lv.5到達',  lvNeed:5},
  {id:'crimson', name:'クリムゾン', c1:'#f44', c2:'#fdd', trail:'255,68,68',   need:'Lv.10到達', lvNeed:10},
  {id:'prism',   name:'プリズム',   c1:'#fff', c2:'#fff', trail:'255,255,255', need:'Lv.15到達', lvNeed:15},
];
let unlockedSkins={cobalt:true};
try{ unlockedSkins=Object.assign({cobalt:true}, JSON.parse(localStorage.getItem('od_skins')||'{}')); }catch(e){}
let skinIdx=Math.max(0, SKINS.findIndex(s=>s.id===localStorage.getItem('od_skinsel')));
function equippedSkin(){ const s=SKINS[skinIdx]; return unlockedSkins[s.id]?s:SKINS[0]; }
function cycleSkin(d){ skinIdx=(skinIdx+d+SKINS.length)%SKINS.length; localStorage.setItem('od_skinsel',SKINS[skinIdx].id); sfxFlip(); }
// プリズムスキンは虹色に変化（titlePulseで色相が回る）
function skinC1(sk){ return sk.id==='prism' ? 'hsl('+(((titlePulse*140)|0)%360)+',100%,72%)' : sk.c1; }
function skinTrailCol(sk,a){ return sk.id==='prism' ? 'hsla('+(((titlePulse*140)|0)%360)+',100%,72%,'+a+')' : 'rgba('+sk.trail+','+a+')'; }

// ---------- XP・称号レベル ----------
const TITLES=['ルーキー','フリッパー','スターダスト','コメットハンター','リングマスター','グレイザー','オービットエース','軌道の神'];
let totalXp=+(localStorage.getItem('od_xp')||0);
function lvlOf(xp){ let lv=1, need=150; while(xp>=need){ xp-=need; lv++; need=150+(lv-1)*50; } return {lv, into:xp, need}; }
function titleOf(lv){ return TITLES[Math.min(TITLES.length-1,((lv-1)/2)|0)]; }
function checkRankSkins(lv){
  for(const sk of SKINS){
    if(sk.lvNeed && !unlockedSkins[sk.id] && lv>=sk.lvNeed){
      unlockedSkins[sk.id]=true;
      localStorage.setItem('od_skins',JSON.stringify(unlockedSkins));
      toast('スキン「'+sk.name+'」解放！ — '+sk.need);
    }
  }
}
function awardXp(n){
  const beforeLv=lvlOf(totalXp).lv;
  totalXp+=n;
  localStorage.setItem('od_xp',totalXp);
  const afterLv=lvlOf(totalXp).lv;
  if(afterLv>beforeLv){
    toast('レベルアップ！ Lv.'+afterLv+'「'+titleOf(afterLv)+'」');
    sfxFever();
    checkRankSkins(afterLv);
  }
}

// ---------- デイリーミッション（日付シードで全員共通の3本）----------
const MISSIONS=[
  {d:'スコア800を出す',            test:rs=>rs.score>=800},
  {d:'30秒生存する',               test:rs=>rs.time>=30},
  {d:'GRAZEを12回決める',          test:rs=>rs.grazeN>=12},
  {d:'CLOSE!を2回決める',          test:rs=>rs.closeN>=2},
  {d:'NICE FLIPを4回決める',       test:rs=>rs.flipN>=4},
  {d:'20コンボを達成する',         test:rs=>rs.maxCombo>=20},
  {d:'WAVE 3に到達する',           test:rs=>rs.wave>=3},
  {d:'フィーバーを2回発動する',    test:rs=>rs.feverN>=2},
  {d:'ジェムを35個集める',         test:rs=>rs.gemN>=35},
  {d:'10秒ノーフリップで生存する', test:rs=>rs.noFlip>=10},
];
let missionsDay=0, missionIdx=[0,1,2], missionDone=[false,false,false];
function todayMissions(){
  const r=mulberry32(dayStamp()*7+3); const idx=[];
  while(idx.length<3){ const i=(r()*MISSIONS.length)|0; if(!idx.includes(i)) idx.push(i); }
  return idx;
}
function refreshMissions(){
  const ds=dayStamp();
  if(ds===missionsDay) return;
  missionsDay=ds;
  missionIdx=todayMissions();
  missionDone=[false,false,false];
  try{ const sv=JSON.parse(localStorage.getItem('od_md_'+ds)||'null'); if(Array.isArray(sv)) missionDone=sv; }catch(e){}
}
function checkMissions(){
  refreshMissions();
  const rs={score, time:t, wave:waveNum+1, maxCombo, grazeN:stat.grazeN, closeN:stat.closeN, flipN:stat.flipN, noFlip:noFlipT, feverN:stat.feverN, gemN:stat.gemN};
  for(let i=0;i<3;i++){
    if(missionDone[i]) continue;
    if(MISSIONS[missionIdx[i]].test(rs)){
      missionDone[i]=true;
      localStorage.setItem('od_md_'+missionsDay, JSON.stringify(missionDone));
      toast('ミッション達成！「'+MISSIONS[missionIdx[i]].d+'」 +200XP');
      awardXp(200);
    }
  }
}
let toasts=[];
function toast(msg){ toasts.push({msg,life:3.5}); }
function checkAch(){
  const rs={score, wave:waveNum+1, maxCombo, grazeN:stat.grazeN, closeN:stat.closeN, flipN:stat.flipN, noFlip:noFlipT};
  for(const sk of SKINS){
    if(!sk.test || unlockedSkins[sk.id]) continue;
    if(sk.test(rs)){
      unlockedSkins[sk.id]=true;
      localStorage.setItem('od_skins',JSON.stringify(unlockedSkins));
      toast('実績解除！ スキン「'+sk.name+'」GET — '+sk.need);
      sfxFever();
    }
  }
}
let ui={}; // タイトル/リザルトのクリック領域（drawで毎フレーム更新）
function inRect(p,r){ return r && p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }

// ---------- game state ----------
let state='title';          // title | play | dead
let score=0, best=+(localStorage.getItem('od_best')||0), newBest=false;
let t=0;                    // run time (sec)
let angle=-Math.PI/2, dir=1, spd=1.8;
let combo=0, comboTimer=0, maxCombo=0;
let fever=0, nextFeverAt=12;
let gems=[], spikes=[], comets=[], lasers=[], parts=[], texts=[];
let shake=0, hitstop=0, flash=0, deathT=0, titlePulse=0, flipBoost=0;
let gemT=0, spikeT=0, cometT=0, laserT=0;
let deathInfo=null;
let waveClock=0, waveNum=-1, eventFired=false, pending=[];
let stat={gem:0,graze:0,close:0,flip:0,grazeN:0,closeN:0,flipN:0,gemN:0,feverN:0};
let firstPlay=!localStorage.getItem('od_played');
let mode='endless', noFlipT=0, dailyNewBest=false;
let ghost=null, ghostRec=[], ghostPtr=0, ghostBeaten=false;
let lastXpGain=0;
let items=[], itemT=0, shieldOn=false, slowT=0, boostT=0, invulnT=0;
let trail=[];
let stars=[];
for(let i=0;i<70;i++) stars.push({x:Math.random(),y:Math.random(),s:rnd(0.5,1.8),tw:rnd(0,TAU)});

function multOf(){ return (1+Math.floor(combo/5)) * (fever>0?2:1) * (boostT>0?2:1); }

function reset(m){
  mode=m||'endless';
  rng = mode==='daily' ? mulberry32(dayStamp()) : Math.random;
  dailyNewBest=false; noFlipT=0;
  ghostRec=[]; ghostPtr=0; ghostBeaten=false;
  items=[]; itemT=rnd(6,10); shieldOn=false; slowT=0; boostT=0; invulnT=0;
  try{ ghost=JSON.parse(localStorage.getItem(mode==='daily'?('od_ghost_d'+dayStamp()):'od_ghost')||'null'); }catch(e){ ghost=null; }
  refreshMissions();
  score=0; t=0; angle=-Math.PI/2; dir=1; spd=1.8;
  combo=0; comboTimer=0; maxCombo=0; fever=0; nextFeverAt=12; newBest=false;
  gems=[]; spikes=[]; comets=[]; lasers=[]; parts=[]; texts=[]; trail=[];
  shake=0; hitstop=0; flash=0; flipBoost=0;
  gemT=0; spikeT=1.5; cometT=0; laserT=0;
  deathInfo=null; waveClock=0; waveNum=-1; eventFired=false; pending=[];
  stat={gem:0,graze:0,close:0,flip:0,grazeN:0,closeN:0,flipN:0,gemN:0,feverN:0};
  spawnGem();
}

// ---------- spawning ----------
function freeAngle(minFromPlayer){
  for(let i=0;i<24;i++){
    const a=rnd(0,TAU);
    if(Math.abs(adiff(a,angle))<minFromPlayer) continue;
    let ok=true;
    for(const s of spikes) if(Math.abs(adiff(a,s.a))<0.45){ok=false;break;}
    for(const g of gems)  if(Math.abs(adiff(a,g.a))<0.35){ok=false;break;}
    if(ok) return a;
  }
  return rnd(0,TAU);
}
function spawnGem(){ gems.push({a:freeAngle(0.5), rot:rnd(0,TAU), born:t}); }
function spawnSpike(){
  spikes.push({a:freeAngle(1.0), st:'warn', timer:0.9, life:rnd(4.5,7.5)});
  sfxWarn();
}
function spawnComet(){
  // telegraphed line crossing near the ring
  const a0=rnd(0,TAU);
  const offset=rnd(-R*0.6,R*0.6);
  const dx=Math.cos(a0), dy=Math.sin(a0);
  const nx=-dy, ny=dx;
  const cx=CX+nx*offset, cy=CY+ny*offset;
  const D=Math.max(W,H);
  comets.push({
    x:cx-dx*D, y:cy-dy*D, vx:dx, vy:dy,
    spd: rnd(330,430)+t*1.5, warn:0.9, r:9, minD:1e9, scored:false
  });
  sfxWarn();
}
function spawnLaser(){
  lasers.push({a:rnd(0,TAU), st:'warn', timer:1.1});
  sfxWarn();
}
function spawnItem(){
  const r=rng();
  const type = r<0.18?'shield' : r<0.45?'slow' : r<0.73?'boost' : 'gold';
  // 「取るか見送るか」を生むため、出現中のトゲの近くを優先して湧く
  let a=null;
  const on=spikes.filter(s=>s.st==='on');
  if(on.length && rng()<0.7){
    const s=on[(rng()*on.length)|0];
    a=s.a + (rng()<0.5?1:-1)*rnd(0.5,0.8);
    if(Math.abs(adiff(a,angle))<0.4) a=null;
  }
  if(a===null) a=freeAngle(0.6);
  items.push({a, type, life:5});
}
function collectItem(it){
  const x=px(it.a), y=py(it.a);
  if(it.type==='shield'){
    if(shieldOn){ const pts=30*multOf(); score+=pts; addText(x,y-20,'+'+pts,'#8cf',15); }
    else { shieldOn=true; addText(x,y-20,'シールド！','#8cf',17); }
    sfxShield(); burst(x,y,'#8cf',14,180);
  } else if(it.type==='slow'){
    slowT=4;
    addText(x,y-20,'スロー！','#6df',17); sfxSlow(); burst(x,y,'#6df',14,180);
  } else if(it.type==='boost'){
    boostT=5;
    addText(x,y-20,'ブースト x2！','#ff6',17); sfxBoost(); burst(x,y,'#ff6',14,180);
  } else {
    const pts=50*multOf(); score+=pts; stat.gem+=pts;
    addText(x,y-20,'+'+pts+'!','#fd5',20); sfxGold(); burst(x,y,'#fd5',20,240);
  }
}

// ---------- particles / texts ----------
function burst(x,y,col,n,sp){
  for(let i=0;i<n;i++){
    const a=rnd(0,TAU), v=rnd(sp*0.3,sp);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:rnd(0.3,0.7),max:0.7,col,r:rnd(1.5,3.5)});
  }
}
function addText(x,y,str,col,size){
  texts.push({x,y,str,col,size:size||18,life:0.9,max:0.9});
}

// ---------- input ----------
function press(opt){
  opt=opt||{};
  initAudio();
  if(AC && AC.state==='suspended') AC.resume();
  if(opt.x!==undefined && inRect(opt,ui.mute)){ toggleMute(); return; }
  if(state==='title'){
    if(opt.x!==undefined){
      if(inRect(opt,ui.skinL)){ cycleSkin(-1); return; }
      if(inRect(opt,ui.skinR)){ cycleSkin(1); return; }
    }
    const m=(opt.key==='KeyD'||(opt.x!==undefined&&inRect(opt,ui.daily)))?'daily':'endless';
    reset(m); state='play'; sfxStart(); return;
  }
  if(state==='dead'){
    if(opt.key==='KeyT'||(opt.x!==undefined&&inRect(opt,ui.toTitle))){ state='title'; return; }
    if(deathT>0.55){ reset(mode); state='play'; sfxStart(); }
    return;
  }
  // play: flip!
  dir*=-1;
  flipBoost=0.3;
  noFlipT=0;
  sfxFlip();
  const x=px(angle), y=py(angle);
  burst(x,y,'#8af',6,120);
  // NICE FLIP: 直前まで進んでいた方向のすぐ先に出現中のトゲ → 紙一重ボーナス
  for(const s of spikes){
    if(s.st!=='on') continue;
    const d=adiff(s.a,angle);
    if(Math.sign(d)===-dir && Math.abs(d)<0.30){
      const pts=20*multOf();
      score+=pts; stat.flip+=pts; stat.flipN++;
      addText(x,y-34,'NICE FLIP! +'+pts,'#aff',17);
      sfxClose();
      break;
    }
  }
}
addEventListener('keydown',e=>{
  if(e.repeat) return;
  if(e.code==='KeyM'){ toggleMute(); return; }
  if(state==='title'&&e.code==='ArrowLeft'){ cycleSkin(-1); return; }
  if(state==='title'&&e.code==='ArrowRight'){ cycleSkin(1); return; }
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyZ'||e.code==='Enter'){ e.preventDefault(); press({key:e.code}); return; }
  if(e.code==='KeyD'&&state==='title'){ press({key:'KeyD'}); return; }
  if(e.code==='KeyT'&&state==='dead'){ press({key:'KeyT'}); return; }
});
addEventListener('pointerdown',e=>{ e.preventDefault(); press({x:e.clientX,y:e.clientY}); });

// ---------- death ----------
function die(cause,hx,hy){
  if(state!=='play') return;
  if(invulnT>0) return;
  // シールド: 1回だけ死を無効化（直後1.2秒は無敵）
  if(shieldOn){
    shieldOn=false; invulnT=1.2;
    flash=0.5; shake=12;
    sfxShieldBreak();
    burst(px(angle),py(angle),'#8cf',30,300);
    addText(px(angle),py(angle)-30,'シールドで防いだ！','#8cf',18);
    return;
  }
  state='dead'; deathT=0;
  deathInfo={label:cause, x:hx, y:hy};
  firstPlay=false; localStorage.setItem('od_played','1');
  hitstop=0.05; shake=18; flash=1;
  sfxDeath();
  const x=px(angle), y=py(angle);
  burst(x,y,'#fff',30,420);
  burst(x,y,'#f55',40,300);
  burst(x,y,'#fa0',25,200);
  checkAch();
  if(mode==='daily'){
    const k='od_daily_'+dayStamp();
    if(score>+(localStorage.getItem(k)||0)){ dailyNewBest=true; localStorage.setItem(k,score); }
  } else if(score>best){ best=score; newBest=true; localStorage.setItem('od_best',best); }
  // ベスト更新時はゴースト（軌道）を保存
  if(mode==='daily'?dailyNewBest:newBest){
    try{ localStorage.setItem(mode==='daily'?('od_ghost_d'+dayStamp()):'od_ghost', JSON.stringify(ghostRec)); }catch(e){}
  }
  // 通算統計 & XP付与（スコアの1/10）
  localStorage.setItem('od_plays',(+localStorage.getItem('od_plays')||0)+1);
  localStorage.setItem('od_time',Math.round((+localStorage.getItem('od_time')||0)+t));
  lastXpGain=Math.max(1,Math.round(score/10));
  awardXp(lastXpGain);
}

// ---------- update ----------
function update(dt){
  titlePulse+=dt;
  // particles & texts always run
  for(const p of parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.96; p.vy*=0.96; p.life-=dt; }
  parts=parts.filter(p=>p.life>0);
  for(const tx of texts){ tx.y-=40*dt; tx.life-=dt; }
  texts=texts.filter(tx=>tx.life>0);
  shake=Math.max(0,shake-60*dt);
  flash=Math.max(0,flash-3*dt);
  for(const o of toasts) o.life-=dt;
  toasts=toasts.filter(o=>o.life>0);

  if(state==='dead'){
    deathT+=dt;
    // 死亡直後はスローモーションで世界が流れる（死因の状況が見える）
    if(deathT<0.8){
      const sdt=dt*0.12;
      for(const c of comets){ if(c.warn<=0){ c.x+=c.vx*c.spd*sdt; c.y+=c.vy*c.spd*sdt; } }
      for(const g of gems) g.rot+=3*sdt;
    }
    return;
  }
  if(state!=='play') return;
  if(hitstop>0){ hitstop-=dt; return; }

  t+=dt;
  const lv=t/12;
  noFlipT+=dt;
  // パワーアップ効果タイマー（hdt=ハザード用時間。スロー中はハザードだけ0.45倍速）
  slowT=Math.max(0,slowT-dt);
  boostT=Math.max(0,boostT-dt);
  invulnT=Math.max(0,invulnT-dt);
  const hdt = dt*(slowT>0?0.45:1);
  checkAch();
  checkMissions();

  // player
  flipBoost=Math.max(0,flipBoost-dt);
  spd = (1.8 + Math.min(1.6, t*0.022)) * (1+flipBoost*0.9) * (boostT>0?1.5:1);
  const prev=angle;
  angle += dir*spd*dt;
  trail.push({a:angle,life:0.35});
  // ゴースト記録（0.1秒間隔）
  if(ghostRec.length===0 || t-ghostRec[ghostRec.length-1][0]>=0.1)
    ghostRec.push([Math.round(t*100)/100, Math.round(angle*1000)/1000]);
  for(const tr of trail) tr.life-=dt;
  trail=trail.filter(tr=>tr.life>0);

  // combo decay
  if(combo>0){ comboTimer-=dt; if(comboTimer<=0){ combo=0; } }
  if(fever>0){ fever-=dt; if(fever<=0) nextFeverAt=combo+12; }

  // ----- wave director（16秒周期: 通常→ピーク→小休止）-----
  const CYC=16;
  waveClock+=dt;
  const phase=waveClock%CYC;
  const cycleIdx=Math.floor(waveClock/CYC);
  if(cycleIdx!==waveNum){
    waveNum=cycleIdx; eventFired=false;
    addText(CX,CY-R-40,'WAVE '+(waveNum+1),'#8af',24);
    if(waveNum>0) sfxStart();
  }
  const peak = phase>11 && phase<=14;
  const lull = phase>14;
  const im = peak?0.55:1; // ピーク中は出現間隔を圧縮

  // イベント波（WAVE2以降のピークで発動）
  if(!eventFired && peak && cycleIdx>=1){
    eventFired=true;
    if(t>35 && cycleIdx%2===0){
      addText(CX,CY-R-70,'!! LASER STORM !!','#f6a',22); sfxWarn();
      pending.push({d:0,k:'laser'},{d:0.8,k:'laser'},{d:1.6,k:'laser'});
    } else if(t>13){
      addText(CX,CY-R-70,'!! COMET VOLLEY !!','#fa0',22); sfxWarn();
      pending.push({d:0,k:'comet'},{d:0.35,k:'comet'},{d:0.7,k:'comet'},{d:1.05,k:'comet'});
    }
  }
  for(const ev of pending){ ev.d-=dt; if(ev.d<=0 && !ev.done){ ev.done=true; (ev.k==='laser'?spawnLaser:spawnComet)(); } }
  pending=pending.filter(ev=>!ev.done);

  gemT-=dt;
  const gemMax = fever>0?3:2;
  if(gems.length<gemMax && gemT<=0){ spawnGem(); gemT = (fever>0?0.5:rnd(0.8,1.6))*(lull?0.6:1); }

  if(!lull){
    spikeT-=dt;
    const spikeMax = Math.min(6, 1+Math.floor(t/9));
    if(spikes.length<spikeMax && spikeT<=0){ spawnSpike(); spikeT=rnd(1.2,2.4)*Math.max(0.5,1-lv*0.06)*im; }
    if(t>14){ cometT-=dt; if(cometT<=0){ spawnComet(); cometT=rnd(2.5,4.5)*Math.max(0.45,1-lv*0.07)*im; } }
    if(t>38){ laserT-=dt; if(laserT<=0){ spawnLaser(); laserT=rnd(5,8)*Math.max(0.5,1-lv*0.05)*im; } }
  }

  // パワーアップ出現（フィールド最大1個・12〜18秒間隔・5秒で消滅）
  itemT-=dt;
  if(items.length<1 && itemT<=0 && t>6){ spawnItem(); itemT=rnd(12,18); }

  const moved = dir*spd*dt; // signed sweep this frame

  // ----- gems -----
  for(let i=gems.length-1;i>=0;i--){
    const g=gems[i]; g.rot+=3*dt;
    const to = adiff(g.a, prev);
    const swept = (Math.sign(to)===Math.sign(moved) && Math.abs(to)<=Math.abs(moved)+0.001);
    if(swept || Math.abs(adiff(g.a,angle))<0.11){
      gems.splice(i,1);
      combo++; comboTimer=4; maxCombo=Math.max(maxCombo,combo);
      const m=multOf();
      const pts=10*m;
      score+=pts; stat.gem+=pts; stat.gemN++;
      const x=px(g.a), y=py(g.a);
      burst(x,y, fever>0?'#fd5':'#5ef', 12, 180);
      addText(x,y-18, '+'+pts, fever>0?'#fd5':'#8ff', 16+Math.min(10,m*2));
      sfxGem(combo);
      shake=Math.max(shake, 2);
      // コンボマイルストーン（10刻みで演出）
      if(combo%10===0){
        flash=Math.max(flash,0.25); shake=Math.max(shake,6);
        addText(CX,CY+R*0.45,'COMBO '+combo+'!!','#9ff',30);
        burst(x,y,'#9ff',18,260);
        sfxMilestone();
      }
      if(combo>=nextFeverAt && fever<=0){
        fever=6; nextFeverAt=combo+14; stat.feverN++;
        sfxFever(); flash=0.5;
        addText(CX,CY-R*0.55,'FEVER!!','#fd5',34);
        burst(CX,CY,'#fd5',40,300);
      }
    }
  }

  // ----- items（パワーアップ回収）-----
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.life-=dt;
    if(it.life<=0){ items.splice(i,1); continue; }
    const to=adiff(it.a,prev);
    const swept=(Math.sign(to)===Math.sign(moved) && Math.abs(to)<=Math.abs(moved)+0.001);
    if(swept || Math.abs(adiff(it.a,angle))<0.12){
      items.splice(i,1);
      collectItem(it);
    }
  }

  // ----- spikes -----
  for(let i=spikes.length-1;i>=0;i--){
    const s=spikes[i];
    s.timer-=hdt;
    if(s.st==='warn' && s.timer<=0){ s.st='on'; s.timer=s.life; }
    else if(s.st==='on' && s.timer<=0){ spikes.splice(i,1); continue; }
    if(s.st==='on'){
      const to=adiff(s.a,prev);
      const swept=(Math.sign(to)===Math.sign(moved) && Math.abs(to)<=Math.abs(moved)+0.001);
      if(swept || Math.abs(adiff(s.a,angle))<0.085){ die('トゲに激突', px(s.a), py(s.a)); return; }
    }
  }

  // ----- graze（トゲのそばに留まるほど加点。1トゲにつき5回まで）-----
  for(const s of spikes){
    if(s.st!=='on') continue;
    const d=Math.abs(adiff(s.a,angle));
    if(d<0.40 && d>0.10){
      s.graze=(s.graze||0)+dt;
      if(s.graze>0.12 && (s.grazeN||0)<5){
        s.graze=0; s.grazeN=(s.grazeN||0)+1;
        const pts=3*multOf();
        score+=pts; stat.graze+=pts; stat.grazeN++;
        const ma=angle+adiff(s.a,angle)*0.5;
        burst(px(ma),py(ma),'#ffa',3,90);
        addText(px(angle),py(angle)-26,'GRAZE +'+pts,'#ffa',12);
        tone(1500,0.04,'sine',0.05);
      }
    } else {
      s.graze=0;
    }
  }

  // ----- comets -----
  const pxx=px(angle), pyy=py(angle);
  for(let i=comets.length-1;i>=0;i--){
    const c=comets[i];
    if(c.warn>0){ c.warn-=hdt; continue; }
    c.x+=c.vx*c.spd*hdt; c.y+=c.vy*c.spd*hdt;
    const d=Math.hypot(c.x-pxx,c.y-pyy);
    c.minD=Math.min(c.minD,d);
    if(d < c.r+11){ die('コメットに撃墜', c.x, c.y); return; }
    // trail
    if(Math.random()<0.6) parts.push({x:c.x,y:c.y,vx:rnd(-20,20),vy:rnd(-20,20),life:0.3,max:0.3,col:'#fa0',r:2});
    const out = (c.x<-80||c.x>W+80||c.y<-80||c.y>H+80);
    if(out){
      if(!c.scored && c.minD<46){ const pts=15*multOf(); score+=pts; stat.close+=pts; stat.closeN++; addText(pxx,pyy-30,'CLOSE! +'+pts,'#ff8',16); sfxClose(); }
      comets.splice(i,1);
    }
  }

  // ----- lasers -----
  for(let i=lasers.length-1;i>=0;i--){
    const L=lasers[i];
    L.timer-=hdt;
    if(L.st==='warn' && L.timer<=0){ L.st='on'; L.timer=0.45; noiseHit(0.3,0.25,2000); shake=Math.max(shake,6); }
    else if(L.st==='on'){
      // perpendicular distance from player to line through center at angle L.a
      const pd=Math.abs(Math.sin(adiff(angle,L.a)))*R;
      if(pd<14+8){ die('レーザーに焼かれた', px(angle), py(angle)); return; }
      if(L.timer<=0){ lasers.splice(i,1); }
    }
  }
}

// ---------- draw ----------
function glowCircle(x,y,r,col,blur){
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill(); ctx.restore();
}
function draw(){
  ui={};
  const SK=equippedSkin();
  // bg
  ctx.fillStyle='#05060f';
  ctx.fillRect(0,0,W,H);
  const bgGrad=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H)*0.7);
  if(fever>0 && state==='play'){ bgGrad.addColorStop(0,'#231a08'); bgGrad.addColorStop(1,'#05060f'); }
  else { bgGrad.addColorStop(0,'#0b1024'); bgGrad.addColorStop(1,'#05060f'); }
  ctx.fillStyle=bgGrad; ctx.fillRect(0,0,W,H);
  // stars
  for(const s of stars){
    const a=0.25+0.25*Math.sin(titlePulse*2+s.tw);
    ctx.fillStyle='rgba(150,180,255,'+a+')';
    ctx.fillRect(s.x*W, s.y*H, s.s, s.s);
  }

  ctx.save();
  if(shake>0) ctx.translate(rnd(-shake,shake), rnd(-shake,shake));

  // ring
  ctx.save();
  ctx.strokeStyle = fever>0&&state==='play' ? 'rgba(255,210,80,0.55)' : 'rgba(90,140,255,0.45)';
  ctx.lineWidth=2.5;
  ctx.shadowColor = fever>0&&state==='play' ? '#fd5' : '#58f';
  ctx.shadowBlur=14;
  ctx.beginPath(); ctx.arc(CX,CY,R,0,TAU); ctx.stroke();
  ctx.restore();

  // center core
  const corePulse = 1+0.06*Math.sin(titlePulse*4);
  glowCircle(CX,CY, 6*corePulse, fever>0&&state==='play'?'#fd5':'#69f', 18);

  if(state==='play'||state==='dead'){
    // lasers
    for(const L of lasers){
      ctx.save();
      ctx.translate(CX,CY); ctx.rotate(L.a);
      if(L.st==='warn'){
        const blink = (Math.sin(titlePulse*22)>0)?0.55:0.18;
        ctx.strokeStyle='rgba(255,80,120,'+blink+')';
        ctx.setLineDash([10,8]); ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-Math.max(W,H),0); ctx.lineTo(Math.max(W,H),0); ctx.stroke();
      } else {
        ctx.shadowColor='#f4a'; ctx.shadowBlur=24;
        const grd=ctx.createLinearGradient(0,-14,0,14);
        grd.addColorStop(0,'rgba(255,60,120,0)');
        grd.addColorStop(0.5,'rgba(255,230,240,0.95)');
        grd.addColorStop(1,'rgba(255,60,120,0)');
        ctx.fillStyle=grd;
        ctx.fillRect(-Math.max(W,H),-14,Math.max(W,H)*2,28);
      }
      ctx.restore();
    }

    // comet telegraphs & comets
    for(const c of comets){
      if(c.warn>0){
        const blink=(Math.sin(titlePulse*20)>0)?0.4:0.12;
        ctx.strokeStyle='rgba(255,170,60,'+blink+')';
        ctx.setLineDash([6,10]); ctx.lineWidth=1.5;
        ctx.beginPath();
        ctx.moveTo(c.x,c.y);
        ctx.lineTo(c.x+c.vx*Math.max(W,H)*2.2, c.y+c.vy*Math.max(W,H)*2.2);
        ctx.stroke(); ctx.setLineDash([]);
      } else {
        glowCircle(c.x,c.y,c.r,'#fa0',20);
        glowCircle(c.x,c.y,c.r*0.5,'#ffd',8);
      }
    }

    // spikes
    for(const s of spikes){
      const x=px(s.a), y=py(s.a);
      ctx.save();
      ctx.translate(x,y); ctx.rotate(s.a+Math.PI/2);
      if(s.st==='warn'){
        const k=(Math.sin(titlePulse*24)>0)?0.7:0.25;
        ctx.strokeStyle='rgba(255,80,80,'+k+')'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-11,4); ctx.lineTo(0,-20); ctx.lineTo(11,4); ctx.closePath(); ctx.stroke();
      } else {
        const fade = s.timer<0.6 ? s.timer/0.6 : 1;
        ctx.globalAlpha=fade;
        ctx.shadowColor='#f44'; ctx.shadowBlur=16;
        ctx.fillStyle='#f55';
        ctx.beginPath(); ctx.moveTo(-11,4); ctx.lineTo(0,-22); ctx.lineTo(11,4); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#fff'; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.moveTo(-4,1); ctx.lineTo(0,-12); ctx.lineTo(4,1); ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }

    // gems
    for(const g of gems){
      const x=px(g.a), y=py(g.a);
      const col = fever>0?'#fd5':'#5ef';
      ctx.save();
      ctx.translate(x,y); ctx.rotate(g.rot);
      ctx.shadowColor=col; ctx.shadowBlur=16;
      ctx.fillStyle=col;
      const r=8+Math.sin(titlePulse*5+g.rot)*1.5;
      ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(r*0.7,0); ctx.lineTo(0,r); ctx.lineTo(-r*0.7,0); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // パワーアップアイテム（残り1.5秒は点滅して消滅予告）
    for(const it of items){
      if(it.life<1.5 && Math.sin(titlePulse*16)>0) continue;
      const x=px(it.a), y=py(it.a);
      const col = it.type==='shield'?'#8cf' : it.type==='slow'?'#6df' : it.type==='boost'?'#ff6' : '#fd5';
      ctx.save();
      ctx.shadowColor=col; ctx.shadowBlur=14;
      ctx.fillStyle='rgba(10,16,40,0.85)';
      ctx.beginPath(); ctx.arc(x,y,12,0,TAU); ctx.fill();
      ctx.strokeStyle=col; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x,y,12,0,TAU); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font='13px system-ui,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(it.type==='shield'?'🛡':it.type==='slow'?'🐌':it.type==='boost'?'⚡':'💎', x, y+1);
      ctx.textBaseline='alphabetic';
      ctx.restore();
    }

    // trail
    for(const tr of trail){
      const k=tr.life/0.35;
      ctx.fillStyle = fever>0 ? 'rgba(255,210,80,'+(0.35*k)+')' : skinTrailCol(SK,0.35*k);
      ctx.beginPath(); ctx.arc(px(tr.a),py(tr.a), 9*k, 0, TAU); ctx.fill();
    }

    // ゴースト（自己ベストの軌道が並走）
    if(state==='play' && ghost && ghost.length>1){
      if(t<=ghost[ghost.length-1][0]){
        while(ghostPtr<ghost.length-2 && ghost[ghostPtr+1][0]<=t) ghostPtr++;
        const a=ghost[ghostPtr], b=ghost[ghostPtr+1];
        const k=clamp((t-a[0])/Math.max(0.001,b[0]-a[0]),0,1);
        const ga=a[1]+(b[1]-a[1])*k;
        ctx.globalAlpha=0.32;
        glowCircle(px(ga),py(ga),9,'#fff',12);
        ctx.globalAlpha=1;
      } else if(!ghostBeaten){
        ghostBeaten=true;
        addText(CX,CY+R*0.6,'ゴーストを超えた！','#cdf',24);
        sfxClose();
      }
    }

    // player
    if(state==='play'){
      const x=px(angle), y=py(angle);
      const blinking = invulnT>0 && Math.sin(titlePulse*30)>0;
      if(!blinking){
        if(boostT>0) glowCircle(x,y,15,'rgba(255,255,100,0.35)',22);
        glowCircle(x,y,11, fever>0?'#fd5':skinC1(SK), 26);
        glowCircle(x,y,5,SK.c2,10);
      }
      if(shieldOn){
        ctx.strokeStyle='rgba(140,200,255,'+(0.6+0.3*Math.sin(titlePulse*6))+')';
        ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(x,y,17,0,TAU); ctx.stroke();
      }
      // direction tick
      const ta=angle+dir*0.22;
      ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(px(ta),py(ta)); ctx.stroke();
    }

    // 死因ハイライト（何に当たったかを示すリング）
    if(state==='dead' && deathInfo){
      const k=0.5+0.5*Math.sin(titlePulse*8);
      ctx.strokeStyle='rgba(255,90,90,'+(0.45+0.4*k)+')';
      ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(deathInfo.x,deathInfo.y,24+8*k,0,TAU); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,'+(0.25+0.25*k)+')';
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(deathInfo.x,deathInfo.y,38+12*k,0,TAU); ctx.stroke();
    }
  }

  // particles
  for(const p of parts){
    ctx.globalAlpha=clamp(p.life/p.max,0,1);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,TAU); ctx.fill();
  }
  ctx.globalAlpha=1;

  // floating texts
  for(const tx of texts){
    ctx.globalAlpha=clamp(tx.life/tx.max,0,1);
    ctx.font='bold '+tx.size+'px system-ui,sans-serif';
    ctx.textAlign='center';
    ctx.fillStyle=tx.col;
    ctx.shadowColor=tx.col; ctx.shadowBlur=8;
    ctx.fillText(tx.str,tx.x,tx.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  ctx.restore(); // shake

  // スロー中は画面がうっすら青く（点滅なし・効果終了で自然にフェード）
  if(state==='play' && slowT>0){
    ctx.fillStyle='rgba(80,160,255,'+(0.05*Math.min(1,slowT))+')';
    ctx.fillRect(0,0,W,H);
  }

  // flash
  if(flash>0){ ctx.fillStyle='rgba(255,255,255,'+(flash*0.6)+')'; ctx.fillRect(0,0,W,H); }

  // ---------- HUD ----------
  ctx.textAlign='left';
  if(state==='play'){
    ctx.fillStyle='#fff';
    ctx.font='bold 30px system-ui,sans-serif';
    ctx.fillText(score, 20, 44);
    ctx.font='12px system-ui,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    if(mode==='daily'){
      const db=+(localStorage.getItem('od_daily_'+dayStamp())||0);
      ctx.fillText('今日のベスト '+db, 20, 64);
      ctx.fillStyle='#fc8';
      ctx.font='bold 12px system-ui,sans-serif';
      ctx.fillText('DAILY '+dayStamp(), 20, 82);
    } else {
      ctx.fillText('BEST '+best, 20, 64);
    }

    // combo
    if(combo>0){
      ctx.textAlign='center';
      const m=multOf();
      ctx.fillStyle = fever>0?'#fd5':'#8ff';
      ctx.font='bold '+(20+Math.min(14,combo))+'px system-ui,sans-serif';
      ctx.fillText(combo+' COMBO  x'+m, CX, CY+R+46);
      // combo timer bar
      const bw=120;
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.fillRect(CX-bw/2, CY+R+56, bw, 5);
      ctx.fillStyle=fever>0?'#fd5':'#5ef';
      ctx.fillRect(CX-bw/2, CY+R+56, bw*clamp(comboTimer/4,0,1), 5);
    }
    if(fever>0){
      ctx.textAlign='center';
      ctx.fillStyle='#fd5';
      ctx.font='bold 16px system-ui,sans-serif';
      ctx.fillText('FEVER x2  '+fever.toFixed(1), CX, 40);
    }
    // アクティブ効果インジケーター
    {
      const ex=[];
      if(shieldOn) ex.push('🛡 シールド');
      if(slowT>0) ex.push('🐌 スロー '+slowT.toFixed(1));
      if(boostT>0) ex.push('⚡ x2 '+boostT.toFixed(1));
      if(ex.length){
        ctx.textAlign='center';
        ctx.fillStyle='#cfe';
        ctx.font='bold 14px system-ui,sans-serif';
        ctx.fillText(ex.join('　'), CX, fever>0?62:40);
      }
    }
    // time
    ctx.textAlign='right';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.font='14px system-ui,sans-serif';
    ctx.fillText(t.toFixed(1)+'s', W-20, 36);

    // 初回プレイのみ操作ヒント
    if(firstPlay && t<8){
      const k=0.5+0.5*Math.sin(titlePulse*5);
      ctx.textAlign='center';
      ctx.fillStyle='rgba(180,220,255,'+(0.45+0.4*k)+')';
      ctx.font='bold 15px system-ui,sans-serif';
      ctx.fillText('SPACE / タップ で回転反転 — 赤いトゲが光ったら避けろ！', CX, CY+R*0.5);
    }
  }

  if(state==='title'){
    ctx.textAlign='center';
    ctx.save();
    ctx.shadowColor='#58f'; ctx.shadowBlur=30;
    ctx.fillStyle='#fff';
    ctx.font='900 '+Math.min(72,W*0.1)+'px system-ui,sans-serif';
    ctx.fillText('ORBIT DASH', CX, CY-R*0.62);
    ctx.restore();
    ctx.fillStyle='#8ff';
    ctx.font='bold 18px system-ui,sans-serif';
    ctx.fillText('ワンボタン回避アクション', CX, CY-R*0.62+34);

    // スキンセレクター
    {
      const rowY=CY-R*0.62+70;
      const sk=SKINS[skinIdx], owned=!!unlockedSkins[sk.id];
      ui.skinL={x:CX-160,y:rowY-24,w:50,h:34};
      ui.skinR={x:CX+110,y:rowY-24,w:50,h:34};
      ctx.font='bold 20px system-ui,sans-serif';
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillText('◀', CX-135, rowY);
      ctx.fillText('▶', CX+135, rowY);
      ctx.font='bold 15px system-ui,sans-serif';
      if(owned){
        ctx.fillStyle=skinC1(sk);
        ctx.fillText('スキン: '+sk.name, CX, rowY);
      } else {
        ctx.fillStyle='rgba(255,255,255,0.45)';
        ctx.fillText('🔒 '+sk.name+' — '+sk.need, CX, rowY);
      }
      ctx.fillStyle='rgba(255,255,255,0.35)';
      ctx.font='11px system-ui,sans-serif';
      ctx.fillText('← → で変更（解放数 '+Object.keys(unlockedSkins).length+'/'+SKINS.length+'）', CX, rowY+18);
    }

    const k=0.6+0.4*Math.sin(titlePulse*4);
    ctx.fillStyle='rgba(255,255,255,'+k+')';
    ctx.font='bold 22px system-ui,sans-serif';
    ctx.fillText('SPACE / タップ でスタート', CX, CY+R*0.75);

    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.font='14px system-ui,sans-serif';
    ctx.fillText('押すと回転が反転 ◀▶  ジェム回収でコンボ／トゲ・コメット・レーザーは即死', CX, CY+R*0.75+26);
    if(best>0){
      ctx.fillStyle='#fd5';
      ctx.font='bold 15px system-ui,sans-serif';
      ctx.fillText('BEST SCORE: '+best, CX, CY+R*0.75+48);
    }

    // デイリーチャレンジボタン
    {
      const bw=300,bh=38,bx=CX-bw/2,by=CY+R*0.75+62;
      ui.daily={x:bx,y:by,w:bw,h:bh};
      ctx.fillStyle='rgba(255,170,60,0.12)';
      ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle='rgba(255,190,90,0.7)';
      ctx.lineWidth=1.5;
      ctx.strokeRect(bx,by,bw,bh);
      ctx.fillStyle='#fc8';
      ctx.font='bold 16px system-ui,sans-serif';
      ctx.fillText('デイリーチャレンジ [D]', CX, by+25);
      const db=+(localStorage.getItem('od_daily_'+dayStamp())||0);
      ctx.fillStyle='rgba(255,200,120,0.8)';
      ctx.font='12px system-ui,sans-serif';
      ctx.fillText(db>0?('今日のベスト: '+db):'毎日同じ出現シードでスコア勝負！', CX, by+bh+16);
    }
    // demo orb on ring
    const da=-Math.PI/2+titlePulse*1.2;
    glowCircle(px(da),py(da),10,skinC1(SK),22);

    // ランク＆今日のミッション（リング中央）
    refreshMissions();
    {
      const L=lvlOf(totalXp);
      ctx.fillStyle='#cdf';
      ctx.font='bold 16px system-ui,sans-serif';
      ctx.fillText('Lv.'+L.lv+'「'+titleOf(L.lv)+'」', CX, CY-52);
      const bw=170;
      ctx.fillStyle='rgba(255,255,255,0.13)';
      ctx.fillRect(CX-bw/2, CY-42, bw, 6);
      ctx.fillStyle='#8af';
      ctx.fillRect(CX-bw/2, CY-42, bw*(L.into/L.need), 6);
      ctx.fillStyle='rgba(255,255,255,0.45)';
      ctx.font='11px system-ui,sans-serif';
      ctx.fillText('次のレベルまで '+(L.need-L.into)+' XP', CX, CY-25);

      ctx.fillStyle='#fc8';
      ctx.font='bold 13px system-ui,sans-serif';
      ctx.fillText('— 今日のミッション —', CX, CY+8);
      ctx.font='13px system-ui,sans-serif';
      for(let i=0;i<3;i++){
        const m=MISSIONS[missionIdx[i]];
        ctx.fillStyle=missionDone[i]?'rgba(120,255,170,0.9)':'rgba(255,255,255,0.65)';
        ctx.fillText((missionDone[i]?'✔ ':'□ ')+m.d+'（+200XP）', CX, CY+30+i*20);
      }
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.font='11px system-ui,sans-serif';
      ctx.fillText('通算 '+(+localStorage.getItem('od_plays')||0)+'プレイ ／ '+Math.round((+localStorage.getItem('od_time')||0)/60)+'分', CX, CY+96);
    }
  }

  if(state==='dead'){
    ctx.textAlign='center';
    ctx.fillStyle='rgba(5,6,15,'+clamp(deathT*1.5,0,0.6)+')';
    ctx.fillRect(0,0,W,H);
    if(deathT>0.25){
      if(mode==='daily'){
        ctx.fillStyle='#fc8';
        ctx.font='bold 15px system-ui,sans-serif';
        ctx.fillText('— DAILY CHALLENGE '+dayStamp()+' —', CX, CY-118);
      }
      ctx.fillStyle='#f66';
      ctx.font='900 '+Math.min(60,W*0.09)+'px system-ui,sans-serif';
      ctx.fillText('GAME OVER', CX, CY-82);
      ctx.fillStyle='#fff';
      ctx.font='bold 40px system-ui,sans-serif';
      ctx.fillText(score, CX, CY-34);
      ctx.font='15px system-ui,sans-serif';
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillText('生存 '+t.toFixed(1)+'s ／ 最大コンボ '+maxCombo, CX, CY-6);
      if(deathInfo){
        ctx.fillStyle='#f99';
        ctx.font='bold 16px system-ui,sans-serif';
        ctx.fillText('— '+deathInfo.label+' —', CX, CY+22);
      }
      // スコア内訳（次のリトライの作戦材料）
      ctx.fillStyle='rgba(160,220,255,0.85)';
      ctx.font='13px system-ui,sans-serif';
      ctx.fillText('ジェム '+stat.gem+' ／ GRAZE '+stat.graze+' ／ CLOSE! '+stat.close+' ／ NICE FLIP '+stat.flip, CX, CY+48);
      {
        const L=lvlOf(totalXp);
        ctx.fillStyle='#8af';
        ctx.font='bold 13px system-ui,sans-serif';
        ctx.fillText('+'+lastXpGain+' XP　Lv.'+L.lv+'「'+titleOf(L.lv)+'」（次まで '+(L.need-L.into)+' XP）', CX, CY+66);
      }
      const recNew = mode==='daily' ? dailyNewBest : newBest;
      if(recNew){
        const k=0.6+0.4*Math.sin(titlePulse*6);
        ctx.fillStyle='rgba(255,221,85,'+k+')';
        ctx.font='bold 24px system-ui,sans-serif';
        ctx.fillText(mode==='daily'?'★ 今日のベスト更新! ★':'★ NEW RECORD! ★', CX, CY+86);
      } else {
        ctx.fillStyle='#fd5';
        ctx.font='bold 17px system-ui,sans-serif';
        const rb = mode==='daily' ? ('今日のベスト '+(+(localStorage.getItem('od_daily_'+dayStamp())||0))) : ('BEST '+best);
        ctx.fillText(rb, CX, CY+82);
      }
      if(deathT>0.55){
        const k=0.6+0.4*Math.sin(titlePulse*4);
        ctx.fillStyle='rgba(255,255,255,'+k+')';
        ctx.font='bold 20px system-ui,sans-serif';
        ctx.fillText('SPACE / タップ でリトライ', CX, CY+124);
        ui.toTitle={x:CX-90,y:CY+142,w:180,h:26};
        ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.font='14px system-ui,sans-serif';
        ctx.fillText('[T] タイトルへ', CX, CY+160);
      }
    }
  }

  // ミュートアイコン（全画面共通・クリック/Mキーで切替）
  ui.mute={x:W-52,y:H-44,w:40,h:32};
  ctx.textAlign='center';
  ctx.globalAlpha=0.55;
  ctx.font='18px system-ui,sans-serif';
  ctx.fillStyle='#fff';
  ctx.fillText(muted?'🔇':'🔊', W-32, H-20);
  ctx.globalAlpha=1;

  // 実績解除トースト（最前面）
  if(toasts.length){
    ctx.textAlign='center';
    let ty=90;
    for(const o of toasts){
      ctx.globalAlpha=clamp(o.life/0.5,0,1);
      ctx.font='bold 15px system-ui,sans-serif';
      const tw=ctx.measureText(o.msg).width+40;
      ctx.fillStyle='rgba(20,28,55,0.92)';
      ctx.fillRect(CX-tw/2,ty-21,tw,30);
      ctx.strokeStyle='rgba(255,210,80,0.8)';
      ctx.lineWidth=1.5;
      ctx.strokeRect(CX-tw/2,ty-21,tw,30);
      ctx.fillStyle='#fd5';
      ctx.fillText(o.msg,CX,ty);
      ty+=38;
    }
    ctx.globalAlpha=1;
  }
}

// ---------- main loop ----------
let last=performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now;
  dt=Math.min(dt,1/30);
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
