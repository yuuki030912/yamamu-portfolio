<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>8192分の1の勇者</title>
<style>
  :root{--bg:#0a0a1a;--panel:#10122b;--panel2:#171a3a;--ink:#eef1ff;--sub:#9aa3d6;--line:#3a3f78;--gold:#ffd23f;--good:#46e8a0;--bad:#ff5c7a;--mag:#b06bff;--hp:#ff5c7a;--xp:#5ad1ff}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%,#1a1c45 0%,var(--bg) 60%);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","M PLUS Rounded 1c",system-ui,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;overflow:hidden}
  #app{max-width:540px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;padding:12px;gap:9px}
  .hud{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:14px;padding:9px 13px;box-shadow:0 6px 0 rgba(0,0,0,.35)}
  .hud-row{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800}
  .hud-cls{color:var(--gold)} .hud-lv{color:var(--xp)} .hud-sub{color:var(--sub);font-weight:700}
  .bar{flex:1;height:9px;border-radius:5px;background:#23264f;overflow:hidden;position:relative}
  .bar>i{position:absolute;left:0;top:0;bottom:0;border-radius:5px;transition:width .3s}
  .bar.hp>i{background:linear-gradient(90deg,#ff7a93,var(--hp))} .bar.xp>i{background:linear-gradient(90deg,#7ee0ff,var(--xp))}
  .hud-num{font-variant-numeric:tabular-nums;color:var(--ink);min-width:64px;text-align:right}
  .stage{flex:1;position:relative;display:flex;flex-direction:column;background:linear-gradient(180deg,#0e1030,#0a0b22);border:2px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 0 rgba(0,0,0,.35)}
  .stage.scroll{overflow-y:auto}
  .scene{flex:1;position:relative;min-height:130px;display:flex;align-items:center;justify-content:center;background:radial-gradient(80% 60% at 50% 30%,rgba(176,107,255,.16),transparent 70%)}
  .artfb{font-size:78px;filter:drop-shadow(0 8px 8px rgba(0,0,0,.5))}
  .art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .scene .grad{position:absolute;left:0;right:0;bottom:0;height:42%;z-index:2;background:linear-gradient(180deg,transparent,rgba(7,8,21,.9))}
  .acttag{position:absolute;top:10px;left:12px;z-index:3;background:rgba(0,0,0,.5);border:1.5px solid var(--mag);color:#dcc6ff;font-weight:800;font-size:11px;padding:5px 10px;border-radius:999px}
  .ebadge{position:absolute;top:10px;right:12px;z-index:3;background:rgba(0,0,0,.6);border:1.5px solid var(--bad);color:#ffd0da;font-weight:900;font-size:12px;padding:5px 10px;border-radius:999px}
  .efoe{position:relative;z-index:2;text-align:center}
  .efoe .em{font-size:72px;filter:drop-shadow(0 8px 8px rgba(0,0,0,.5));animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .efoe .ehp{margin:8px auto 0;width:180px}
  .efoe .ehp .bar{height:11px}
  .efoe .en{font-size:13px;font-weight:900;margin-top:4px}
  .hit{position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;opacity:0;color:#fff;text-shadow:0 0 10px #000}
  .hit.go{animation:hit .6s ease}
  @keyframes hit{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1.4)}}
  .shake{animation:shk .35s} @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .msg{background:#070815;border-top:2px solid var(--line);padding:12px 15px;min-height:82px;font-size:14.5px;line-height:1.7;position:relative}
  .msg .who{display:block;font-size:12px;color:var(--mag);font-weight:900;margin-bottom:3px}
  .msg b{color:var(--gold)} .msg .ok{color:var(--good);font-weight:900} .msg .ng{color:var(--bad);font-weight:900} .msg .dmg{color:#ffce5a;font-weight:900}
  .msg.tapnext{cursor:pointer} .msg .next-ind{position:absolute;right:12px;bottom:7px;font-size:12px;color:var(--mag);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.3}}
  .cmds{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cmds.one{grid-template-columns:1fr}
  button.cmd{font-family:inherit;font-size:14.5px;font-weight:800;color:var(--ink);background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:12px;padding:13px 11px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s,border-color .12s;-webkit-tap-highlight-color:transparent;text-align:center;line-height:1.3}
  button.cmd:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.4)}
  button.cmd:hover{border-color:var(--mag)} button.cmd.primary{background:linear-gradient(180deg,#3a2d00,#241c00);border-color:var(--gold);color:var(--gold)}
  button.cmd.locked{opacity:.5;border-style:dashed;cursor:not-allowed;color:var(--sub)} button.cmd.locked .req{display:block;font-size:10px;color:var(--bad);font-weight:800;margin-top:2px}
  button.cmd[disabled]:not(.locked){opacity:.5;pointer-events:none}
  button.cmd .sk{display:block;font-size:10px;color:var(--sub);font-weight:700;margin-top:2px}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;text-align:center;padding:18px}
  .title-h{font-size:25px;font-weight:900;line-height:1.25;background:linear-gradient(135deg,var(--gold),var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent}
  .title-num{font-size:46px;font-weight:900;color:var(--gold);text-shadow:0 0 22px rgba(255,210,63,.45)}
  .title-sub{font-size:13px;color:var(--sub);line-height:1.8;max-width:380px}
  .stat-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px}
  .stat{background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:7px 12px;min-width:84px}
  .stat .k{font-size:10px;color:var(--sub)} .stat .v{font-size:16px;font-weight:900;color:var(--ink)} .stat .v.gold{color:var(--gold)}
  .ending-tag{font-size:12px;font-weight:900;letter-spacing:.12em;color:var(--mag)}
  .clscard{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:13px;padding:12px;text-align:left;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.4)}
  .clscard:active{transform:translateY(2px)} .clscard:hover{border-color:var(--mag)}
  .clscard .ch{font-size:15px;font-weight:900;color:var(--gold)} .clscard .cd{font-size:11.5px;color:var(--sub);margin-top:3px;line-height:1.5}
  .clscard .cs{font-size:11px;color:var(--xp);margin-top:4px;font-weight:800}
  .mute{position:fixed;top:8px;right:10px;background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;z-index:5}
  .fade{animation:fade .3s ease} @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<button class="mute" id="mute">🔊</button>
<div id="app">
  <div class="hud" id="hud">
    <div class="hud-row"><span class="hud-cls" id="hcls">—</span><span class="hud-lv" id="hlv">Lv1</span>
      <span class="hud-sub">❤</span><div class="bar hp"><i id="hpbar" style="width:100%"></i></div><span class="hud-num" id="hpnum">—</span></div>
    <div class="hud-row" style="margin-top:6px"><span class="hud-sub">EXP</span><div class="bar xp"><i id="xpbar" style="width:0%"></i></div><span class="hud-num" id="locnum" style="min-width:auto;color:var(--sub)">始まりの村</span></div>
  </div>
  <div class="stage" id="stage"><div class="scene" id="scene"></div><div class="msg" id="msg"></div></div>
  <div class="cmds" id="cmds"></div>
</div>
<script>
'use strict';
/* =======================================================
   8192分の1の勇者 ── RPGアドベンチャー版
   村→職業選択→道中で戦闘(経験値/スキル習得/逃走)→寄り道で情報→
   習得スキルや得た情報で「先の選択肢が解放」(条件未達はグレー表示)→魔王戦。
   失敗はその場で発生（矛盾なし）。最後の魔王は準備で勝てる＝努力が報われる。
   伝説の「8192分の1」は"無策で挑んだ時の勝率"という位置づけ。
   ======================================================= */

// ---------- audio ----------
let AC=null,master=null,muted=!!localStorage.getItem('h8_mute');
function initAudio(){ if(AC)return; try{AC=new(window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=muted?0:0.4;master.connect(AC.destination);}catch(e){AC=null;} }
function tone(f,d,t,v,sl){ if(!AC)return; const t0=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(); o.type=t||'sine'; o.frequency.setValueAtTime(f,t0); if(sl)o.frequency.exponentialRampToValueAtTime(Math.max(20,sl),t0+d); g.gain.setValueAtTime(v||0.2,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+d); o.connect(g);g.connect(master);o.start(t0);o.stop(t0+d+0.05); }
function sfxBlip(){ tone(620,0.04,'square',0.05); }
function sfxHit(){ tone(180,0.12,'sawtooth',0.18,90); }
function sfxHurt(){ tone(140,0.18,'square',0.16,70); }
function sfxHeal(){ tone(640,0.12,'sine',0.14); setTimeout(()=>tone(880,0.14,'sine',0.12),80); }
function sfxWin(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'triangle',0.15),i*110)); }
function sfxLevel(){ [523,659,880].forEach((f,i)=>setTimeout(()=>tone(f,0.14,'square',0.13),i*80)); }
function sfxFail(){ tone(200,0.4,'sawtooth',0.22,50); tone(90,0.6,'sine',0.22,40); }
function sfxPick(){ tone(420,0.06,'square',0.10,520); }
function toggleMute(){ muted=!muted; localStorage.setItem('h8_mute',muted?'1':''); if(master)master.gain.value=muted?0:0.4; document.getElementById('mute').textContent=muted?'🔇':'🔊'; }

// ---------- data ----------
const SK={ // スキル定義
  slash:{id:'slash',name:'強斬り',kind:'力',pow:11},
  helm:{id:'helm',name:'兜割り',kind:'力',pow:16},
  might:{id:'might',name:'渾身斬り',kind:'力',pow:23},
  fire:{id:'fire',name:'火球',kind:'魔',pow:13,elem:'炎'},
  ice:{id:'ice',name:'氷槍',kind:'魔',pow:16},
  blaze:{id:'blaze',name:'業火',kind:'魔',pow:24,elem:'炎'},
  stab:{id:'stab',name:'急所突き',kind:'技',pow:10},
  poison:{id:'poison',name:'毒刃',kind:'技',pow:14},
  flurry:{id:'flurry',name:'乱れ突き',kind:'技',pow:21},
  holy:{id:'holy',name:'聖光',kind:'信',pow:10,elem:'光',heal:6},
  cure:{id:'cure',name:'癒し',kind:'信',pow:0,heal:18},
  judge:{id:'judge',name:'裁きの光',kind:'信',pow:20,elem:'光'}
};
const CLASSES=[
 {id:'warrior',name:'戦士',emoji:'⚔️',hp:42,stat:{力:3,魔:0,技:1,信:1},start:'slash',learn:{2:'helm',3:'might'},
  desc:'高いHPと腕力。壁を壊し、力でねじ伏せる。'},
 {id:'mage',name:'魔法使い',emoji:'🔮',hp:26,stat:{力:0,魔:3,技:1,信:1},start:'fire',learn:{2:'ice',3:'blaze'},
  desc:'火球で焼き払う。魔法の障害を突破する。'},
 {id:'thief',name:'盗賊',emoji:'🗡️',hp:30,stat:{力:1,魔:0,技:3,信:1},start:'stab',learn:{2:'poison',3:'flurry'},
  desc:'技で罠や鍵を見破る。逃げ足も速い。'},
 {id:'priest',name:'僧侶',emoji:'✨',hp:32,stat:{力:0,魔:1,技:1,信:3},start:'holy',learn:{2:'cure',3:'judge'},
  desc:'聖なる光で癒し、闇を浄化する。光は魔の弱点。'}
];
const XP_TABLE=[0,15,40,75,120]; // Lv1..5 の必要総XP

// 道中（journey）
const JOURNEY=[
 {type:'story',loc:'始まりの村',emoji:'🏘️',art:'art/village.png',lines:[
   {who:'',text:'ここは<b>始まりの村</b>。8192年に一度よみがえる魔王が、また目を覚ました。'},
   {who:'',text:'村に伝わる言い伝え——『無策で挑めば、勝てる確率は<b>8192分の1</b>』。'},
   {who:'ギルド長',text:'「だが、確率は覆せる。技を磨き、情報を集めろ。準備した者だけが、奇跡を手繰り寄せる」'},
   {who:'ギルド長',text:'「さあ、お前の職を選べ。それが冒険の始まりだ」'}
 ]},
 {type:'class'},
 {type:'story',loc:'冒険の начало',emoji:'📜',art:'',lines:[
   {who:'ギルド長',text:'「いい目だ。魔王城は遥か北。道中で力をつけ、必ず"何か"を持ち帰れ」'},
   {who:'',text:'※ 戦闘で<b>経験値</b>を得てレベルアップ、新しい<b>技</b>を覚える。'},
   {who:'',text:'※ <b>寄り道</b>で得た情報や習得した技で、先の<b>選択肢が解放</b>される（条件未達はグレー）。'}
 ]},
 {type:'battle',loc:'なだらかな平原',enemy:{name:'スライム',emoji:'🟢',hp:18,atk:5,xp:12},flee:true,
   intro:[{who:'',text:'平原で、ぷるぷるのスライムが道を塞ぐ。'}]},
 {type:'choice',loc:'茨の門',emoji:'🌿',art:'',prompt:[
   {who:'',text:'蔦に覆われた古い門。進むには、どうにかして開けねば。'}
 ],options:[
   {label:'力で押し開く',req:{stat:['力',3]},result:[{who:'',text:'渾身の力で門をこじ開けた！　奥に<b>宝箱</b>を見つけ、<b>聖なる雫</b>を手に入れた。'}],give:{item:'holywater'}},
   {label:'火で焼き払う',req:{stat:['魔',3]},result:[{who:'',text:'火球が蔦を焼き尽くす。焦げ跡の祠から<b>聖なる雫</b>を手に入れた。'}],give:{item:'holywater'}},
   {label:'鍵穴を開ける',req:{stat:['技',3]},result:[{who:'',text:'素早く錠前を外した。隠し棚に<b>聖なる雫</b>と小金。'}],give:{item:'holywater'}},
   {label:'迂回する（誰でも）',result:[{who:'',text:'遠回りして門を避けた。…宝は得られなかったが、先へ進める。'}]}
 ]},
 {type:'battle',loc:'ささやきの森',enemy:{name:'ゴブリン',emoji:'👺',hp:26,atk:8,xp:20},flee:true,
   intro:[{who:'',text:'森の奥から、棍棒を持ったゴブリンが躍り出た。'}]},
 {type:'choice',loc:'封印の祠',emoji:'⛩️',art:'',prompt:[
   {who:'',text:'淡く光る、封印された祠。中に何かが眠っている気配。'}
 ],options:[
   {label:'聖なる光で浄化する',req:{stat:['信',3]},result:[{who:'',text:'聖光が封印を解いた。石碑にこう刻まれていた——<b>「魔王の核は"光"を恐れる」</b>。'}],give:{info:'weak'}},
   {label:'古文書を読み解く',req:{stat:['技',2]},result:[{who:'',text:'古い文字を解読する。<b>「魔王の核は"光"を恐れる」</b>——重要な情報を得た。'}],give:{info:'weak'}},
   {label:'魔力で解析する',req:{stat:['魔',2]},result:[{who:'',text:'魔力で碑文を浮かび上がらせた。<b>「魔王の核は"光"を恐れる」</b>。'}],give:{info:'weak'}},
   {label:'立ち去る（誰でも）',result:[{who:'',text:'嫌な予感がして、祠には触れずに進んだ。'}]}
 ]},
 {type:'battle',loc:'凍えの洞窟',enemy:{name:'影オオカミ',emoji:'🐺',hp:34,atk:11,xp:24},flee:true,
   intro:[{who:'',text:'洞窟の闇から、影のようなオオカミが牙を剥く。…強い。逃げるのも手だ。'}]},
 {type:'choice',loc:'魔王城・城門',emoji:'🏰',art:'art/castle.png',prompt:[
   {who:'',text:'ついに魔王城。固く閉ざされた城門。入る方法は——'}
 ],options:[
   {label:'正面から打ち破る',req:{level:3},result:[{who:'',text:'鍛え抜いた一撃で門扉を破壊！　堂々と玉座へ向かう。'}]},
   {label:'隠し通路を抜ける',req:{stat:['技',3]},result:[{who:'',text:'壁の継ぎ目を見抜き、隠し通路から潜入した。'}]},
   {label:'門を爆破する',req:{stat:['魔',3]},result:[{who:'',text:'魔力を集束し、門を爆砕した。'}]},
   {label:'力ずくでよじ登る（誰でも）',result:[{who:'',text:'ボロボロになりながら城壁をよじ登った。…少し消耗した。'}],give:{dmg:6}}
 ]},
 {type:'boss',loc:'玉座の間',enemy:{name:'魔王 ザ・プロバビリティ',emoji:'👹',hp:60,atk:14,xp:0,weak:'光'},
   intro:[
     {who:'魔王',text:'「よくぞ来た、勇者。だが——勝率は8192分の1。運に祈るがいい」'},
     {who:'',text:'魔王の巨体が、玉座から立ち上がる。最後の戦いだ。'}
   ]}
];

// ---------- state ----------
let p=null;               // player
let jIndex=0, busy=false;
let lw={arr:[],idx:0,done:null};
let bt=null;              // battle state
let attempts=+(localStorage.getItem('h8_attempts')||0);
let clears=+(localStorage.getItem('h8_clears')||0);

// ---------- dom ----------
const $=id=>document.getElementById(id);
const stage=$('stage'),cmds=$('cmds');
function fmt(n){ return n.toLocaleString('en-US'); }
function ri(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function skill(id){ return SK[id]; }
function lvFromXp(xp){ let l=1; for(let i=0;i<XP_TABLE.length;i++){ if(xp>=XP_TABLE[i]) l=i+1; } return l; }
function renderHud(){
  if(!p){ $('hcls').textContent='—'; $('hlv').textContent='Lv1'; $('hpnum').textContent='—'; $('hpbar').style.width='100%'; $('xpbar').style.width='0%'; $('locnum').textContent=JOURNEY[jIndex]?JOURNEY[jIndex].loc||'':''; return; }
  $('hcls').textContent=p.cls.emoji+' '+p.cls.name; $('hlv').textContent='Lv'+p.lv;
  $('hpnum').textContent=p.hp+' / '+p.maxhp; $('hpbar').style.width=Math.max(0,p.hp/p.maxhp*100)+'%';
  const base=XP_TABLE[p.lv-1]||0, next=XP_TABLE[p.lv]!=null?XP_TABLE[p.lv]:base; const span=Math.max(1,next-base);
  $('xpbar').style.width=Math.min(100,(p.xp-base)/span*100)+'%';
  $('locnum').textContent=(JOURNEY[jIndex]&&JOURNEY[jIndex].loc)||'';
}
function setMsgHtml(html){ const m=$('msg'); if(m){ m.innerHTML=html; m.classList.remove('fade'); void m.offsetWidth; m.classList.add('fade'); } }
function setCmds(items,cls){ cmds.className='cmds'+(cls?(' '+cls):''); cmds.innerHTML=''; items.forEach(it=>{ const b=document.createElement('button'); b.className='cmd'+(it.primary?' primary':'')+(it.locked?' locked':''); b.innerHTML=it.html; if(it.dis||it.locked)b.disabled=true; if(!it.dis&&!it.locked) b.onclick=()=>{ initAudio(); if(AC&&AC.state==='suspended')AC.resume(); it.fn(); }; cmds.appendChild(b); }); }
function artHtml(f){ return (f.art?'<img class="art" src="'+f.art+'" alt="" onerror="this.remove()">':'')+'<div class="artfb">'+(f.emoji||'⚔️')+'</div><div class="grad"></div>'; }
function lineHtml(l){ return (l.who?'<span class="who">'+l.who+'</span>':'')+l.text; }
function walk(lines,onDone){ lw={arr:lines||[],idx:0,done:onDone}; showLW(); }
function showLW(){
  const m=$('msg'); if(!m){ if(lw.done)lw.done(); return; }
  if(lw.arr.length===0){ if(lw.done)lw.done(); return; }
  m.innerHTML=lineHtml(lw.arr[lw.idx]); m.classList.remove('fade'); void m.offsetWidth; m.classList.add('fade');
  const last=lw.idx>=lw.arr.length-1;
  if(!last){ m.classList.add('tapnext'); m.insertAdjacentHTML('beforeend','<span class="next-ind">▼ タップ</span>');
    m.onclick=()=>{ sfxBlip(); m.onclick=null; lw.idx++; showLW(); };
    setCmds([{html:'▼ つぎへ',fn:()=>{ sfxBlip(); lw.idx++; showLW(); }}],'one');
  } else { m.classList.remove('tapnext'); m.onclick=null; if(lw.done) lw.done(); }
}

// ---------- requirements ----------
function reqMet(req){
  if(!req) return true;
  if(req.level && p.lv<req.level) return false;
  if(req.stat && p.stat[req.stat[0]]<req.stat[1]) return false;
  if(req.skill && !p.skills.includes(req.skill)) return false;
  if(req.info && !p.info.includes(req.info)) return false;
  if(req.item && !p.items.includes(req.item)) return false;
  return true;
}
function reqText(req){
  if(!req) return '';
  if(req.level) return '要 Lv'+req.level;
  if(req.stat) return '要 '+req.stat[0]+req.stat[1];
  if(req.skill) return '要 '+SK[req.skill].name;
  if(req.info) return '要 情報';
  if(req.item) return '要 アイテム';
  return '';
}

// ---------- title ----------
function showTitle(){
  p=null; jIndex=0; busy=false; bt=null; stage.classList.remove('scroll'); renderHud();
  stage.innerHTML='<div class="scene" id="scene">'+artHtml({emoji:'🗡️',art:'art/title.png'})+'</div><div class="msg" id="msg"></div>';
  $('scene').insertAdjacentHTML('beforeend','<div style="position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;gap:6px">'
    +'<div class="title-h">8192分の1の</div><div class="title-num">勇者</div>'
    +'<div class="title-sub" style="color:#e7ebff">職を選び、技を磨き、情報を集めろ。<br>準備した者だけが、<b style="color:#ffd23f">確率を覆す</b>。</div></div>');
  $('msg').innerHTML='<div style="text-align:center"><div class="stat-row" style="justify-content:center">'
    +'<div class="stat"><div class="k">挑戦回数</div><div class="v">'+fmt(attempts)+'</div></div>'
    +'<div class="stat"><div class="k">魔王討伐</div><div class="v gold">'+fmt(clears)+'</div></div></div></div>';
  setCmds([{html:'⚔ 冒険を始める',primary:true,fn:startRun}],'one');
}
function startRun(){
  attempts++; localStorage.setItem('h8_attempts',attempts);
  p=null; jIndex=0; busy=false; bt=null; stage.classList.remove('scroll');
  runStep();
}

// ---------- step runner ----------
function runStep(){
  busy=false;
  if(jIndex>=JOURNEY.length){ return; }
  const st=JOURNEY[jIndex]; renderHud();
  if(st.type==='story') return enterStory(st);
  if(st.type==='class') return enterClassPick();
  if(st.type==='battle'||st.type==='boss') return enterBattle(st);
  if(st.type==='choice') return enterChoice(st);
}
function nextStep(){ jIndex++; runStep(); }

function sceneShell(st,extra){
  stage.innerHTML='<div class="scene" id="scene">'+artHtml(st)
    +'<div class="acttag">'+(st.loc||'')+'</div>'+(extra||'')
    +'</div><div class="msg" id="msg"></div>';
}
function enterStory(st){
  sceneShell(st);
  walk(st.lines, ()=> setCmds([{html:'▶ 進む',primary:true,fn:nextStep}],'one'));
}

// ---------- class pick ----------
function enterClassPick(){
  stage.innerHTML='<div class="scene" id="scene" style="min-height:90px">'+artHtml({emoji:'📜'})+'<div class="acttag">職業の選択</div></div>'
    +'<div class="msg" id="msg" style="overflow-y:auto"></div>';
  $('msg').innerHTML='<div style="display:flex;flex-direction:column;gap:8px">'
    + CLASSES.map((c,i)=>'<div class="clscard" data-i="'+i+'"><div class="ch">'+c.emoji+' '+c.name+'</div><div class="cd">'+c.desc+'</div>'
       +'<div class="cs">初期技: '+SK[c.start].name+'　ステ: 力'+c.stat.力+'/魔'+c.stat.魔+'/技'+c.stat.技+'/信'+c.stat.信+'</div></div>').join('')
    +'</div>';
  [...document.querySelectorAll('.clscard')].forEach(el=>el.onclick=()=>{ initAudio(); if(AC&&AC.state==='suspended')AC.resume(); chooseClass(+el.getAttribute('data-i')); });
  setCmds([{html:'↑ 職業をタップして選択',dis:true,fn:()=>{}}],'one');
}
function chooseClass(i){
  sfxPick();
  const c=CLASSES[i];
  p={cls:c, lv:1, xp:0, maxhp:c.hp, hp:c.hp, stat:Object.assign({},c.stat), skills:[c.start], info:[], items:[]};
  renderHud(); nextStep();
}

// ---------- level / xp ----------
function gainXp(amount, after){
  p.xp+=amount;
  const newLv=lvFromXp(p.xp);
  if(newLv>p.lv){
    let learned=[];
    while(p.lv<newLv){ p.lv++; p.maxhp+=8; p.hp=p.maxhp; const sid=p.cls.learn[p.lv]; if(sid && !p.skills.includes(sid)){ p.skills.push(sid); learned.push(SK[sid].name); } }
    renderHud(); sfxLevel();
    let t='<span class="ok">レベルアップ！ Lv'+p.lv+'</span>　HP全回復。';
    if(learned.length) t+='<br>新しい技を覚えた：<b>'+learned.join('、')+'</b>';
    setMsgHtml('+'+amount+' EXP　'+t);
    setCmds([{html:'▶ 進む',primary:true,fn:after}],'one');
  } else { renderHud(); setMsgHtml('<span class="ok">+'+amount+' EXP</span> を得た。'); setCmds([{html:'▶ 進む',primary:true,fn:after}],'one'); }
}

// ---------- battle ----------
function enemyBar(){ return '<div class="bar hp"><i id="ehpbar" style="width:'+Math.max(0,bt.enemy.hp/bt.enemy.max*100)+'%"></i></div>'; }
function renderEnemy(){
  const e=bt.enemy;
  $('scene').innerHTML='<div class="acttag">'+bt.st.loc+'</div><div class="ebadge">'+(bt.boss?'★ BOSS':'戦闘')+'</div>'
    +'<div class="efoe"><div class="em" id="efoe">'+e.emoji+'</div><div class="ehp">'+enemyBar()+'</div><div class="en">'+e.name+'　❤'+Math.max(0,e.hp)+'/'+e.max+'</div></div>'
    +'<div class="hit" id="hit"></div>';
}
function enterBattle(st){
  bt={st:st, enemy:Object.assign({},st.enemy), boss:st.type==='boss'};
  bt.enemy.max=bt.enemy.hp;
  sceneShell({loc:st.loc, emoji:st.enemy.emoji, art:st.art});
  // intro lines then battle menu
  walk(st.intro||[{who:'',text:bt.enemy.name+'が現れた！'}], ()=>{ renderEnemy(); battleMenu(); });
}
function statBonus(kind){ return (p.stat[kind]||0)*2; }
function battleMenu(){
  if(!$('efoe')) renderEnemy();
  setMsgHtml('<b>'+bt.enemy.name+'</b> との戦い。どうする？');
  const items=[];
  p.skills.forEach(sid=>{ const s=SK[sid]; items.push({html:s.name+'<span class="sk">'+(s.pow>0?('威力'+s.pow):'')+(s.heal?(' 回復'+s.heal):'')+'</span>', fn:()=>useSkill(sid)}); });
  if(p.items.includes('holywater')) items.push({html:'聖なる雫を使う<span class="sk">光の大ダメージ</span>',fn:()=>useHolyWater()});
  if(bt.st.flee) items.push({html:'逃げる<span class="sk">技で成功率UP</span>',fn:()=>tryFlee()});
  setCmds(items, items.length>2?'':'');
}
function flash(txt,cls){ const h=$('hit'); if(h){ h.textContent=txt; h.className='hit'+(cls?(' '+cls):'')+' go'; setTimeout(()=>{ if($('hit'))$('hit').className='hit'; },650); } }
function updEhp(){ if($('ehpbar'))$('ehpbar').style.width=Math.max(0,bt.enemy.hp/bt.enemy.max*100)+'%'; const en=document.querySelector('.en'); if(en)en.innerHTML=bt.enemy.name+'　❤'+Math.max(0,bt.enemy.hp)+'/'+bt.enemy.max; }
function useSkill(sid){
  if(busy)return; busy=true;
  const s=SK[sid]; let log='';
  if(s.heal){ p.hp=Math.min(p.maxhp,p.hp+s.heal); renderHud(); sfxHeal(); flash('+'+s.heal,''); log='<span class="ok">'+s.name+'！</span> HPを'+s.heal+'回復した。'; }
  if(s.pow>0){
    let dmg=s.pow+statBonus(s.kind)+ri(0,3);
    if(bt.enemy.weak && s.elem===bt.enemy.weak){ dmg=Math.floor(dmg*1.8); log+=(log?'<br>':'')+'<span class="ok">弱点を突いた！</span> '; }
    bt.enemy.hp-=dmg; sfxHit(); flash('-'+dmg,''); updEhp();
    log+='<span class="dmg">'+s.name+'　'+dmg+'のダメージ！</span>';
  }
  setMsgHtml(log);
  setTimeout(()=>{ if(bt.enemy.hp<=0){ battleWin(); } else { enemyTurn(); } }, 720);
}
function useHolyWater(){
  if(busy)return; busy=true;
  p.items=p.items.filter(x=>x!=='holywater'); p.usedHoly=true;
  let dmg=40+ri(0,8); if(bt.enemy.weak==='光') dmg=Math.floor(dmg*1.5);
  bt.enemy.hp-=dmg; sfxHeal(); flash('-'+dmg,''); updEhp();
  setMsgHtml('<span class="ok">聖なる雫が眩い光を放つ！</span> <span class="dmg">'+dmg+'の光ダメージ！</span>');
  setTimeout(()=>{ if(bt.enemy.hp<=0){ battleWin(); } else { enemyTurn(); } }, 760);
}
function tryFlee(){
  if(busy)return; busy=true;
  const chance=Math.min(0.85, 0.35 + (p.stat.技||0)*0.13);
  if(Math.random()<chance){ setMsgHtml('<span class="ok">うまく逃げ切った！</span>'); setCmds([{html:'▶ 進む',primary:true,fn:()=>{ busy=false; nextStep(); }}],'one'); }
  else { setMsgHtml('<span class="ng">逃げられなかった！</span>'); setTimeout(enemyTurn,650); }
}
function enemyTurn(){
  const e=bt.enemy; let dmg=Math.max(1, e.atk+ri(-2,3));
  p.hp-=dmg; renderHud(); sfxHurt();
  const sc=$('scene'); if(sc){ sc.classList.add('shake'); setTimeout(()=>sc.classList.remove('shake'),350); }
  setMsgHtml('<span class="ng">'+e.name+'の攻撃！</span> <span class="dmg">'+dmg+'のダメージを受けた。</span>');
  setTimeout(()=>{ if(p.hp<=0){ battleLose(); } else { busy=false; battleMenu(); } }, 760);
}
function battleWin(){
  const e=bt.enemy;
  if(bt.boss){ return bossWin(); }
  setMsgHtml('<span class="ok">'+e.name+'を倒した！</span>');
  setCmds([{html:'…',dis:true,fn:()=>{}}],'one'); // 連打での二重発火を防止
  setTimeout(()=> gainXp(e.xp, nextStep), 700);
}
function battleLose(){
  busy=false; sfxFail();
  const loc=bt.st.loc, name=bt.enemy.name, boss=bt.boss;
  setTimeout(()=>{
    stage.classList.add('scroll');
    const title = boss?'魔王に、敗れる':(loc+'で力尽きる');
    const text = boss?'魔王の一撃が勇者を貫いた。確率は、覆らなかった。…次こそ、万全の備えで挑め。'
                     :('勇者は '+name+' に敗れ、'+loc+' に倒れた。…もっと力をつけ、装備を整えてから挑もう。');
    stage.innerHTML='<div class="center fade"><div class="ending-tag">GAME OVER</div><div style="font-size:48px">💀</div>'
      +'<div style="font-size:20px;font-weight:900;color:#ff5c7a">'+title+'</div>'
      +'<div class="title-sub">'+text+'</div>'
      +'<div class="stat-row"><div class="stat"><div class="k">職業</div><div class="v">'+p.cls.emoji+p.cls.name+'</div></div>'
      +'<div class="stat"><div class="k">到達</div><div class="v">Lv'+p.lv+'</div></div>'
      +'<div class="stat"><div class="k">挑戦回数</div><div class="v gold">'+fmt(attempts)+'</div></div></div></div>';
    setCmds([{html:'⚔ もう一度（'+fmt(attempts+1)+'回目）',primary:true,fn:startRun},{html:'タイトルへ',fn:showTitle}]);
  },600);
}

// ---------- choice (conditional) ----------
function enterChoice(st){
  sceneShell(st);
  walk(st.prompt, ()=>{
    const items=st.options.map(o=>{
      const met=reqMet(o.req);
      if(met) return {html:o.label, fn:()=>resolveChoice(st,o)};
      return {html:o.label+'<span class="req">🔒 '+reqText(o.req)+'</span>', locked:true, fn:()=>{}};
    });
    setCmds(items, '');
  });
}
function resolveChoice(st,o){
  sfxPick();
  if(o.give){
    if(o.give.item && !p.items.includes(o.give.item)) p.items.push(o.give.item);
    if(o.give.info && !p.info.includes(o.give.info)) p.info.push(o.give.info);
    if(o.give.dmg){ p.hp=Math.max(1,p.hp-o.give.dmg); renderHud(); }
  }
  walk(o.result, ()=> setCmds([{html:'▶ 進む',primary:true,fn:nextStep}],'one'));
}

// ---------- boss win → endings ----------
function bossWin(){
  clears++; localStorage.setItem('h8_clears',clears); sfxWin();
  const usedPrep = p.info.includes('weak') || p.usedHoly; // 弱点情報 or 聖なる雫=準備の証
  stage.classList.add('scroll');
  let tag,story;
  if(usedPrep){
    tag='TRUE END ― 確率を覆した者';
    story='磨いた技と、集めた知識——"光"の弱点を突いた一撃が、魔王の核を撃ち砕いた。「馬鹿な…運では、ない、だと…？」。8192分の1は、もはやお前には関係ない。準備した者が、運命を超えたのだ。世界に朝が還った。';
  } else {
    tag='奇跡 ― 8192分の1';
    story='情報も足りぬまま、それでも勇者は喰らいついた。幾度も死にかけ、最後は祈るような一撃が——奇跡的に核を捉えた。まさに8192分の1。「…運の女神は、お前に微笑んだか」。辛くも、世界は救われた。';
  }
  stage.innerHTML='<div class="center fade"><div class="ending-tag" style="color:#ffd23f">'+tag+'</div>'
    +'<div style="font-size:52px">👑</div><div class="title-h">魔王、討伐！</div>'
    +'<div class="title-sub">'+story+'</div>'
    +'<div class="stat-row"><div class="stat"><div class="k">職業</div><div class="v">'+p.cls.emoji+p.cls.name+'</div></div>'
    +'<div class="stat"><div class="k">最終Lv</div><div class="v gold">Lv'+p.lv+'</div></div>'
    +'<div class="stat"><div class="k">挑戦回数</div><div class="v">'+fmt(attempts)+'回目</div></div></div>'
    +'<div style="font-size:13px;color:#ffd23f;font-weight:800;margin-top:6px">🎉 '+(usedPrep?'準備を制した、本物の勇者だ。':'引き当てた、8192分の1の奇跡！')+'</div></div>';
  const share='「8192分の1の勇者」で魔王討伐！🎉 '+p.cls.name+'/Lv'+p.lv+'、'+attempts+'回目の挑戦でクリア。あなたは何回で倒せる？ #8192分の1の勇者 #やまむー';
  setCmds([{html:'もう一度挑む',primary:true,fn:startRun},{html:'𝕏 で自慢する',fn:()=>{ window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(share),'_blank','noopener'); }}]);
}

// ---------- init ----------
document.getElementById('mute').textContent=muted?'🔇':'🔊';
document.getElementById('mute').onclick=()=>{ initAudio(); toggleMute(); };
showTitle();
</script>
