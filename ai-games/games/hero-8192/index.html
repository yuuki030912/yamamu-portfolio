<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>8192分の1の勇者</title>
<style>
  :root{--bg:#0a0a1a;--panel:#10122b;--panel2:#171a3a;--ink:#eef1ff;--sub:#9aa3d6;--line:#3a3f78;--gold:#ffd23f;--good:#46e8a0;--bad:#ff5c7a;--mag:#b06bff;--hp:#ff5c7a;--xp:#5ad1ff}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%,#1a1c45 0%,var(--bg) 60%);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","M PLUS Rounded 1c",system-ui,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;overflow:hidden}
  #app{max-width:540px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;padding:12px;gap:9px}
  .hud{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:14px;padding:9px 13px;box-shadow:0 6px 0 rgba(0,0,0,.35)}
  .hud-row{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800}
  .hud-cls{color:var(--gold)} .hud-lv{color:var(--xp)} .hud-sub{color:var(--sub);font-weight:700}
  .bar{flex:1;height:9px;border-radius:5px;background:#23264f;overflow:hidden;position:relative}
  .bar>i{position:absolute;left:0;top:0;bottom:0;border-radius:5px;transition:width .25s}
  .bar.hp>i{background:linear-gradient(90deg,#ff7a93,var(--hp))}
  .hud-num{font-variant-numeric:tabular-nums;color:var(--ink);min-width:64px;text-align:right}
  .gear{font-size:11px;color:var(--sub);margin-top:5px;font-weight:700}
  .gear b{color:var(--gold)}
  .stage{flex:1;position:relative;display:flex;flex-direction:column;background:linear-gradient(180deg,#0e1030,#0a0b22);border:2px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 0 rgba(0,0,0,.35)}
  .stage.scroll{overflow-y:auto}
  .scene{flex:1;position:relative;min-height:130px;display:flex;align-items:center;justify-content:center;background:radial-gradient(80% 60% at 50% 30%,rgba(176,107,255,.16),transparent 70%)}
  .artfb{font-size:74px;filter:drop-shadow(0 8px 8px rgba(0,0,0,.5))}
  .art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .scene .grad{position:absolute;left:0;right:0;bottom:0;height:42%;z-index:2;background:linear-gradient(180deg,transparent,rgba(7,8,21,.9))}
  .acttag{position:absolute;top:10px;left:12px;z-index:3;background:rgba(0,0,0,.5);border:1.5px solid var(--mag);color:#dcc6ff;font-weight:800;font-size:11px;padding:5px 10px;border-radius:999px}
  .ebadge{position:absolute;top:10px;right:12px;z-index:3;background:rgba(0,0,0,.6);border:1.5px solid var(--bad);color:#ffd0da;font-weight:900;font-size:12px;padding:5px 10px;border-radius:999px}
  .efoe{position:relative;z-index:2;text-align:center;width:100%}
  .efoe .em{font-size:66px;filter:drop-shadow(0 8px 8px rgba(0,0,0,.5));animation:bob 2.4s ease-in-out infinite}
  .efoe.boss .em{font-size:86px}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .efoe .ehp{margin:8px auto 0;width:78%} .efoe .ehp .bar{height:11px} .efoe .ehp .bar.hp>i{background:linear-gradient(90deg,#ff9a3c,var(--bad))}
  .efoe .en{font-size:13px;font-weight:900;margin-top:4px}
  .hit{position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;opacity:0;text-shadow:0 0 10px #000}
  .hit.go{animation:hit .55s ease} @keyframes hit{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1.15)}100%{opacity:0;transform:scale(1.35)}}
  .shake{animation:shk .3s} @keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .msg{background:#070815;border-top:2px solid var(--line);padding:11px 15px;min-height:64px;font-size:14px;line-height:1.65;position:relative}
  .msg .who{display:block;font-size:12px;color:var(--mag);font-weight:900;margin-bottom:3px}
  .msg b{color:var(--gold)} .msg .ok{color:var(--good);font-weight:900} .msg .ng{color:var(--bad);font-weight:900} .msg .dmg{color:#ffce5a;font-weight:900} .msg .crit{color:#ff7;font-weight:900}
  .msg.tapnext{cursor:pointer} .msg .next-ind{position:absolute;right:12px;bottom:6px;font-size:12px;color:var(--mag);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.3}}
  .cmds{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cmds.one{grid-template-columns:1fr}
  button.cmd{font-family:inherit;font-size:14.5px;font-weight:800;color:var(--ink);background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:12px;padding:12px 10px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s,border-color .12s;-webkit-tap-highlight-color:transparent;text-align:center;line-height:1.25}
  button.cmd:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.4)}
  button.cmd:hover{border-color:var(--mag)} button.cmd.primary{background:linear-gradient(180deg,#3a2d00,#241c00);border-color:var(--gold);color:var(--gold)}
  button.cmd[disabled]{opacity:.5;pointer-events:none}
  button.cmd .sub{display:block;font-size:10px;color:var(--sub);font-weight:700;margin-top:2px}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:18px}
  .title-h{font-size:25px;font-weight:900;line-height:1.25;background:linear-gradient(135deg,var(--gold),var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent}
  .title-num{font-size:46px;font-weight:900;color:var(--gold);text-shadow:0 0 22px rgba(255,210,63,.45)}
  .title-sub{font-size:13px;color:var(--sub);line-height:1.8;max-width:380px}
  .stat-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px}
  .stat{background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:7px 12px;min-width:82px}
  .stat .k{font-size:10px;color:var(--sub)} .stat .v{font-size:16px;font-weight:900;color:var(--ink)} .stat .v.gold{color:var(--gold)}
  .ending-tag{font-size:12px;font-weight:900;letter-spacing:.12em;color:var(--mag)}
  .clscard{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:13px;padding:10px 12px;text-align:left;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.4)}
  .clscard:active{transform:translateY(2px)} .clscard:hover{border-color:var(--mag)}
  .clscard .ch{font-size:14px;font-weight:900;color:var(--gold)} .clscard .cd{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.45}
  .mute{position:fixed;top:8px;right:10px;background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;z-index:5}
  .fade{animation:fade .28s ease} @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<button class="mute" id="mute">🔊</button>
<div id="app">
  <div class="hud" id="hud">
    <div class="hud-row"><span class="hud-cls" id="hcls">—</span><span class="hud-lv" id="hlv">Lv1</span>
      <span class="hud-sub">❤</span><div class="bar hp"><i id="hpbar" style="width:100%"></i></div><span class="hud-num" id="hpnum">—</span></div>
    <div class="gear" id="gear">—</div>
  </div>
  <div class="stage" id="stage"><div class="scene" id="scene"></div><div class="msg" id="msg"></div></div>
  <div class="cmds" id="cmds"></div>
</div>
<script>
'use strict';
/* =======================================================
   8192分の1の勇者 ── 戦闘RPG版（勝率を実測で約1/8192に調整）
   ターン制戦闘(攻撃/必殺/防御/ポーション/逃走)。道中の選択(訓練/武器/防具/弱点/薬)で
   有利・不利が積み重なる。死は戦闘でHPが尽きた時=複数ターンの結果（即死2択は廃止）。
   ボスの勝率はモンテカルロ実測で平均的な準備＝およそ1/8192に調整。
   ======================================================= */

// ===== balance constants (モンテカルロで調整) =====
const BAL={
  goblin:{name:'ゴブリン',emoji:'👺',hp:42,atk:9,def:1,crit:0.05,xp:1},
  orc:{name:'オーク',emoji:'👹',hp:78,atk:16,def:3,crit:0.08,xp:1},
  boss:{name:'魔王 ザ・プロバビリティ',emoji:'😈',hp:272,atk:34,def:7,crit:0.16}, // モンテカルロ調整: 最適ビルドで約1/8192
  weakMult:1.12,   // 弱点判明時の与ダメ倍率（控えめに）
  potionHeal:30,
  bossDodge:0.10   // 勇者が魔王の一撃を見切る確率(運要素)
};
const CLASSES=[
 {id:'warrior',name:'戦士',emoji:'⚔️',hp:56,atk:15,def:5,crit:0.12,pot:1,desc:'高HP・高防御。打たれ強く安定。'},
 {id:'mage',name:'魔法使い',emoji:'🔮',hp:46,atk:16,def:3,crit:0.16,pot:1,desc:'火力寄りだが脆い。一発に賭ける。'},
 {id:'thief',name:'盗賊',emoji:'🗡️',hp:48,atk:14,def:4,crit:0.20,pot:1,desc:'会心率が高い。逃走も得意。'},
 {id:'priest',name:'僧侶',emoji:'✨',hp:52,atk:13,def:5,crit:0.12,pot:2,desc:'ポーション多め。粘り強く戦える。'}
];

// ===== combat math (DOM/シミュ共用) =====
function rnd(a,b){ return a+Math.random()*(b-a); }
function buildPlayer(spec){
  const c=CLASSES.find(x=>x.id===spec.cls)||CLASSES[0];
  let maxhp=c.hp, atk=c.atk, def=c.def, crit=c.crit, pot=c.pot;
  const lv=spec.level||1;
  maxhp+=8*(lv-1); atk+=2*(lv-1);
  if(spec.weapon) atk+=3;
  if(spec.armor){ def+=2; maxhp+=10; }
  pot+=(spec.potions||0);
  return {cls:c, lv:lv, maxhp:maxhp, hp:maxhp, atk:atk, def:def, crit:crit, pot:pot, weak:!!spec.weak, defending:false};
}
function playerDamage(p,e,kind){
  let base=Math.max(1, p.atk - e.def);
  let mult=1, critChance=p.crit;
  if(kind==='power'){ base*=1.7; critChance+=0.10; } // 必殺：高威力・会心率UP・ただし当たれば
  let roll=base*rnd(0.82,1.18);
  const crit=Math.random()<critChance; if(crit) roll*=2;
  if(e.boss && p.weak) roll*=BAL.weakMult;
  // 必殺は外しやすい
  let miss=false; if(kind==='power' && Math.random()<0.22){ miss=true; roll=0; }
  return {dmg:Math.round(roll), crit:crit&&!miss, miss};
}
function enemyDamage(p,e){
  if(e.boss && Math.random()<BAL.bossDodge){} // (回避は与ダメ側ではなく被ダメ側で処理)
  let base=Math.max(1, e.atk - p.def);
  let roll=base*rnd(0.85,1.18);
  const crit=Math.random()<(e.crit||0); if(crit) roll*=1.8;
  if(p.defending) roll*=0.5;
  return {dmg:Math.round(roll), crit};
}

// ===== headless simulation (バランス調整用) =====
function simFight(p, espec){
  const e=Object.assign({},espec); e.boss=espec.boss; e.maxhp=e.hp;
  p=Object.assign({},p); p.hp=p.maxhp; p.defending=false;
  let turns=0;
  while(turns++<300){
    // player: 低HPかつ薬あれば回復、ボス戦は基本攻撃(時々必殺)
    if(p.hp < p.maxhp*0.33 && p.pot>0){ p.hp=Math.min(p.maxhp,p.hp+BAL.potionHeal); p.pot--; }
    else {
      const kind = (Math.random()<0.4)?'power':'atk';
      const r=playerDamage(p,e,kind); e.hp-=r.dmg;
    }
    if(e.hp<=0) return true;
    // enemy
    if(!(e.boss && Math.random()<BAL.bossDodge)){
      // (ボスのターンはそのまま攻撃。dodgeは"勇者が見切る"=被ダメ無効として使用)
    }
    let skip=false;
    if(e.boss && Math.random()<0.0){ } // placeholder
    const ed=enemyDamage(p,e); p.hp-=ed.dmg; p.defending=false;
    if(p.hp<=0) return false;
  }
  return false;
}
// 勇者がボスの一撃を「見切る」回避(被ダメ無効)。simとDOM双方で適用するためenemyTurnでも使う
function bossWhiff(e){ const d=(typeof window!=='undefined'&&window.__dodgeOv!=null)?window.__dodgeOv:BAL.bossDodge; return e.boss && Math.random()<d; }

function simulateRun(spec, n){
  let wins=0;
  for(let i=0;i<n;i++){
    const p=buildPlayer(spec);
    // ボス戦のみ勝敗を測る（道中は勝てる前提）
    if(simBossFight(p)) wins++;
  }
  return wins;
}
function simBossFight(p){
  const e=Object.assign({boss:true},BAL.boss,(typeof window!=='undefined'&&window.__bo)||{}); e.maxhp=e.hp;
  p=Object.assign({},p); p.hp=p.maxhp; p.defending=false;
  let turns=0;
  while(turns++<400){
    if(p.hp < p.maxhp*0.33 && p.pot>0){ p.hp=Math.min(p.maxhp,p.hp+BAL.potionHeal); p.pot--; }
    else { const kind=(Math.random()<0.45)?'power':'atk'; const r=playerDamage(p,e,kind); e.hp-=r.dmg; }
    if(e.hp<=0) return true;
    if(!bossWhiff(e)){ const ed=enemyDamage(p,e); p.hp-=ed.dmg; } p.defending=false;
    if(p.hp<=0) return false;
  }
  return false;
}
window.__simBoss=function(spec,n){ return simulateRun(spec,n); };

// ===== state =====
let p=null, spec=null, jIdx=0, busy=false, bt=null, lw={arr:[],idx:0,done:null};
let attempts=+(localStorage.getItem('h8_attempts')||0);
let clears=+(localStorage.getItem('h8_clears')||0);
let bestLv=+(localStorage.getItem('h8_bestlv')||0);

// ===== journey =====
const JOURNEY=[
 {type:'class'},
 {type:'story',loc:'始まりの村',emoji:'🏘️',lines:[
   {who:'ギルド長',text:'「魔王を倒せる勇者は8192年に一度…倒せる確率は<b>8192分の1</b>と言われる」'},
   {who:'ギルド長',text:'「だが、その確率は道中の備えで動く。よく戦い、よく選べ」'}
 ]},
 {type:'battle',enemy:'goblin',loc:'平原',flee:true,intro:[{who:'',text:'平原でゴブリンが襲ってきた。'}]},
 {type:'choice',loc:'分かれ道',emoji:'🪧',prompt:'先を急ぐ？　それとも寄り道で力をつける？',options:[
   {label:'訓練して力をつける',sub:'Lv+1（有利）',apply:{level:1},res:[{who:'',text:'魔物と打ち合い、腕を上げた。<b>レベルが上がった</b>。'}]},
   {label:'先を急ぐ',sub:'そのまま（不利）',apply:{},res:[{who:'',text:'時間を惜しみ、足早に進んだ。'}]}
 ]},
 {type:'choice',loc:'鍛冶屋',emoji:'⚒️',prompt:'鍛冶屋。装備を一つだけ整えられる。',options:[
   {label:'鋭い剣を買う',sub:'攻撃+7（有利）',apply:{weapon:1},res:[{who:'',text:'よく斬れる剣を手に入れた。<b>攻撃が上がった</b>。'}]},
   {label:'頑丈な鎧を買う',sub:'防御+3 HP+14（有利）',apply:{armor:1},res:[{who:'',text:'頑丈な鎧を身につけた。<b>守りが固くなった</b>。'}]}
 ]},
 {type:'battle',enemy:'orc',loc:'山道',flee:true,intro:[{who:'',text:'山道で、巨漢のオークが立ち塞がる。'}]},
 {type:'choice',loc:'岐路',emoji:'🔮',prompt:'城へ向かう前に、できることは一つ。',options:[
   {label:'魔王の弱点を調べる',sub:'与ダメ大UP（有利）',apply:{weak:1},res:[{who:'',text:'古文書から、魔王の核の弱点を掴んだ。<b>与えるダメージが上がる</b>。'}]},
   {label:'回復薬を蓄える',sub:'ポーション+2（有利）',apply:{potions:2},res:[{who:'',text:'回復薬を買い込んだ。<b>ポーションが増えた</b>。'}]}
 ]},
 {type:'story',loc:'魔王城',emoji:'🏰',lines:[
   {who:'',text:'魔王城の最奥。空気が、ざわめく。'},
   {who:'',text:'勇者は傷を癒やし、<b>HPを全回復</b>して扉を開けた。'}
 ]},
 {type:'boss',enemy:'boss',loc:'玉座の間',intro:[
   {who:'魔王',text:'「ここまで来たか。だが——勝率は8192分の1。運に祈れ」'}
 ]}
];

// ===== dom =====
const $=id=>document.getElementById(id);
const stage=$('stage'),cmds=$('cmds');
function fmt(n){ return n.toLocaleString('en-US'); }
function renderHud(){
  if(!p){ $('hcls').textContent='—';$('hlv').textContent='Lv1';$('hpnum').textContent='—';$('hpbar').style.width='100%';$('gear').textContent='—'; return; }
  $('hcls').textContent=p.cls.emoji+' '+p.cls.name; $('hlv').textContent='Lv'+p.lv;
  $('hpnum').textContent=Math.max(0,p.hp)+' / '+p.maxhp; $('hpbar').style.width=Math.max(0,p.hp/p.maxhp*100)+'%';
  let g='⚔'+p.atk+'　🛡'+p.def+'　会心'+Math.round(p.crit*100)+'%　🧪'+p.pot;
  if(p.weak) g+='　<b>弱点◎</b>';
  $('gear').innerHTML=g;
}
function setCmds(items,c){ cmds.className='cmds'+(c?(' '+c):''); cmds.innerHTML=''; items.forEach(it=>{ const b=document.createElement('button'); b.className='cmd'+(it.primary?' primary':''); b.innerHTML=it.html; if(it.dis)b.disabled=true; if(!it.dis) b.onclick=()=>{ initAudio(); if(AC&&AC.state==='suspended')AC.resume(); it.fn(); }; cmds.appendChild(b); }); }
function artHtml(f){ return (f.art?'<img class="art" src="'+f.art+'" alt="" onerror="this.remove()">':'')+'<div class="artfb">'+(f.emoji||'⚔️')+'</div><div class="grad"></div>'; }
function lineHtml(l){ return (l.who?'<span class="who">'+l.who+'</span>':'')+l.text; }
function shell(f){ stage.innerHTML='<div class="scene" id="scene">'+artHtml(f)+'<div class="acttag">'+(f.loc||'')+'</div></div><div class="msg" id="msg"></div>'; }
function setMsg(h){ const m=$('msg'); if(m){ m.innerHTML=h; m.classList.remove('fade'); void m.offsetWidth; m.classList.add('fade'); } }
function walk(lines,onDone){ lw={arr:lines||[],idx:0,done:onDone}; showLW(); }
function showLW(){ const m=$('msg'); if(!m){if(lw.done)lw.done();return;} if(!lw.arr.length){if(lw.done)lw.done();return;}
  m.innerHTML=lineHtml(lw.arr[lw.idx]); m.classList.remove('fade'); void m.offsetWidth; m.classList.add('fade');
  if(lw.idx<lw.arr.length-1){ m.classList.add('tapnext'); m.insertAdjacentHTML('beforeend','<span class="next-ind">▼ タップ</span>'); m.onclick=()=>{sfxBlip();m.onclick=null;lw.idx++;showLW();}; setCmds([{html:'▼ つぎへ',fn:()=>{sfxBlip();lw.idx++;showLW();}}],'one'); }
  else { m.classList.remove('tapnext'); m.onclick=null; if(lw.done)lw.done(); }
}

// ===== audio =====
let AC=null,master=null,muted=!!localStorage.getItem('h8_mute');
function initAudio(){ if(AC)return; try{AC=new(window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=muted?0:0.4;master.connect(AC.destination);}catch(e){AC=null;} }
function tone(f,d,t,v,sl){ if(!AC)return; const t0=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(); o.type=t||'sine'; o.frequency.setValueAtTime(f,t0); if(sl)o.frequency.exponentialRampToValueAtTime(Math.max(20,sl),t0+d); g.gain.setValueAtTime(v||0.2,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+d); o.connect(g);g.connect(master);o.start(t0);o.stop(t0+d+0.05); }
function sfxBlip(){ tone(620,0.04,'square',0.05); }
function sfxHit(){ tone(180,0.1,'sawtooth',0.16,90); }
function sfxCrit(){ tone(300,0.12,'square',0.18,120); setTimeout(()=>tone(600,0.1,'square',0.12),60); }
function sfxHurt(){ tone(140,0.16,'square',0.16,70); }
function sfxHeal(){ tone(640,0.1,'sine',0.13); setTimeout(()=>tone(900,0.12,'sine',0.11),70); }
function sfxLevel(){ [523,659,880].forEach((f,i)=>setTimeout(()=>tone(f,0.13,'square',0.12),i*70)); }
function sfxFail(){ tone(200,0.4,'sawtooth',0.22,50); tone(90,0.6,'sine',0.22,40); }
function sfxWin(){ [523,659,784,1046,1318,1568].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'triangle',0.15),i*110)); }
function toggleMute(){ muted=!muted; localStorage.setItem('h8_mute',muted?'1':''); if(master)master.gain.value=muted?0:0.4; $('mute').textContent=muted?'🔇':'🔊'; }

// ===== flow =====
function showTitle(){
  p=null;spec=null;jIdx=0;busy=false;bt=null; stage.classList.remove('scroll'); renderHud();
  stage.innerHTML='<div class="scene" id="scene">'+artHtml({emoji:'🗡️',art:'art/title.png'})+'</div><div class="msg" id="msg"></div>';
  $('scene').insertAdjacentHTML('beforeend','<div style="position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;gap:6px">'
    +'<div class="title-h">8192分の1の</div><div class="title-num">勇者</div>'
    +'<div class="title-sub" style="color:#e7ebff">戦って、選んで、備えろ。<br>それでも魔王に勝てる確率は——<b style="color:#ffd23f">およそ8192分の1</b>。</div></div>');
  $('msg').innerHTML='<div style="text-align:center"><div class="stat-row" style="justify-content:center">'
    +'<div class="stat"><div class="k">最高到達Lv</div><div class="v gold">'+bestLv+'</div></div>'
    +'<div class="stat"><div class="k">挑戦回数</div><div class="v">'+fmt(attempts)+'</div></div>'
    +'<div class="stat"><div class="k">魔王討伐</div><div class="v">'+fmt(clears)+'</div></div></div></div>';
  setCmds([{html:'⚔ 冒険を始める',primary:true,fn:startRun}],'one');
}
function startRun(){ attempts++; localStorage.setItem('h8_attempts',attempts); p=null;spec={cls:'warrior',level:1};jIdx=0;busy=false; stage.classList.remove('scroll'); runNode(); }
function runNode(){ busy=false; if(jIdx>=JOURNEY.length)return; const f=JOURNEY[jIdx]; renderHud();
  if(f.type==='class')return enterClass();
  if(f.type==='story')return enterStory(f);
  if(f.type==='choice')return enterChoice(f);
  return enterBattle(f);
}
function nextNode(){ jIdx++; runNode(); }
function enterClass(){
  stage.innerHTML='<div class="scene" id="scene" style="min-height:80px">'+artHtml({emoji:'⚔️'})+'<div class="acttag">職業を選べ</div></div><div class="msg" id="msg" style="overflow-y:auto"></div>';
  $('msg').innerHTML='<div style="display:flex;flex-direction:column;gap:7px">'
    +CLASSES.map((c,i)=>'<div class="clscard" data-i="'+i+'"><div class="ch">'+c.emoji+' '+c.name+'</div><div class="cd">'+c.desc+'　HP'+c.hp+'/攻'+c.atk+'/防'+c.def+'/会心'+Math.round(c.crit*100)+'%/🧪'+c.pot+'</div></div>').join('')+'</div>';
  [...document.querySelectorAll('.clscard')].forEach(el=>el.onclick=()=>{ initAudio(); if(AC&&AC.state==='suspended')AC.resume(); spec.cls=CLASSES[+el.getAttribute('data-i')].id; p=buildPlayer(spec); renderHud(); sfxBlip(); nextNode(); });
  setCmds([{html:'↑ 職業をタップ',dis:true,fn:()=>{}}],'one');
}
function enterStory(f){ shell(f); if(f.loc==='魔王城'&&p){ p.hp=p.maxhp; renderHud(); } walk(f.lines, ()=> setCmds([{html:'▶ 進む',primary:true,fn:nextNode}],'one')); }
function enterChoice(f){
  shell(f); $('msg').innerHTML='<b>'+f.loc+'</b>　'+f.prompt;
  setCmds(f.options.map(o=>({html:o.label+'<span class="sub">'+o.sub+'</span>',fn:()=>{
    sfxBlip(); Object.assign(spec,mergeSpec(spec,o.apply)); p=buildPlayer(spec); p.hp=p.maxhp; renderHud();
    walk(o.res, ()=> setCmds([{html:'▶ 進む',primary:true,fn:nextNode}],'one'));
  }})));
}
function mergeSpec(s,a){ const r={}; for(const k in a){ if(k==='level')r.level=(s.level||1)+a.level; else if(k==='potions')r.potions=(s.potions||0)+a.potions; else r[k]=a[k]; } return r; }

// ===== battle =====
function enterBattle(f){
  const base=BAL[f.enemy]; bt={f:f, boss:f.type==='boss', enemy:Object.assign({boss:f.type==='boss'},base)}; bt.enemy.max=bt.enemy.hp;
  shell({loc:f.loc, emoji:base.emoji});
  walk(f.intro||[{who:'',text:base.name+'が現れた！'}], ()=>{ renderEnemy(); menu(); });
}
function renderEnemy(){ const e=bt.enemy;
  $('scene').innerHTML='<div class="acttag">'+bt.f.loc+'</div><div class="ebadge">'+(bt.boss?'★ 魔王':'戦闘')+'</div>'
    +'<div class="efoe'+(bt.boss?' boss':'')+'"><div class="em" id="efoe">'+e.emoji+'</div><div class="ehp"><div class="bar hp"><i id="ehpbar" style="width:'+(e.hp/e.max*100)+'%"></i></div></div><div class="en" id="ennum">'+e.name+'　❤'+Math.max(0,e.hp)+'/'+e.max+'</div></div><div class="hit" id="hit"></div>';
}
function menu(){ if(!$('efoe'))renderEnemy(); busy=false;
  setMsg('<b>'+bt.enemy.name+'</b>　どうする？');
  const items=[{html:'攻撃<span class="sub">安定</span>',fn:()=>act('atk')},{html:'必殺<span class="sub">高威力/外しやすい</span>',fn:()=>act('power')},{html:'防御<span class="sub">次の被害半減</span>',fn:()=>act('guard')}];
  if(p.pot>0) items.push({html:'ポーション<span class="sub">🧪'+p.pot+' HP+'+BAL.potionHeal+'</span>',fn:()=>act('pot')});
  if(bt.f.flee) items.push({html:'逃げる<span class="sub">戦闘回避</span>',fn:()=>act('flee')});
  setCmds(items);
}
function flash(t,cls){ const h=$('hit'); if(h){ h.textContent=t; h.style.color=cls==='crit'?'#ff7':(cls==='heal'?'#7fffa8':'#fff'); h.className='hit go'; setTimeout(()=>{if($('hit'))$('hit').className='hit';},560); } }
function updEnemy(){ const e=bt.enemy; if($('ehpbar'))$('ehpbar').style.width=Math.max(0,e.hp/e.max*100)+'%'; if($('ennum'))$('ennum').textContent=e.name+'　❤'+Math.max(0,e.hp)+'/'+e.max; }
function act(kind){
  if(busy)return; busy=true; const e=bt.enemy;
  if(kind==='flee'){ const ch=Math.min(0.85,0.4+(p.cls.id==='thief'?0.3:0)+0.0); if(Math.random()<ch){ setMsg('<span class="ok">うまく逃げ切った！</span>'); setCmds([{html:'▶ 進む',primary:true,fn:()=>{busy=false;nextNode();}}],'one'); return; } else { setMsg('<span class="ng">逃げられない！</span>'); setTimeout(enemyTurn,600); return; } }
  if(kind==='pot'){ p.pot--; p.hp=Math.min(p.maxhp,p.hp+BAL.potionHeal); renderHud(); sfxHeal(); flash('+'+BAL.potionHeal,'heal'); setMsg('<span class="ok">ポーションでHP回復！</span>'); setTimeout(enemyTurn,650); return; }
  if(kind==='guard'){ p.defending=true; sfxBlip(); setMsg('身を固めた。次の被害を半減する。'); setTimeout(enemyTurn,500); return; }
  // attack / power
  const r=playerDamage(p,e,kind);
  if(r.miss){ sfxBlip(); flash('MISS',''); setMsg('<span class="ng">必殺は外れた…！</span>'); }
  else { e.hp-=r.dmg; if(r.crit)sfxCrit();else sfxHit(); flash((r.crit?'会心 -':'-')+r.dmg, r.crit?'crit':''); setMsg((r.crit?'<span class="crit">会心の一撃！</span> ':'')+'<span class="dmg">'+r.dmg+'のダメージ！</span>'); }
  updEnemy();
  setTimeout(()=>{ if(e.hp<=0){ winBattle(); } else { enemyTurn(); } }, 680);
}
function enemyTurn(){
  const e=bt.enemy;
  if(bossWhiff(e)){ sfxBlip(); flash('見切り','heal'); setMsg('<span class="ok">魔王の攻撃を見切った！</span> 反撃の隙！'); p.defending=false; setTimeout(()=>{busy=false;menu();},760); return; }
  const ed=enemyDamage(p,e); p.hp-=ed.dmg; p.defending=false; renderHud(); if(ed.crit)sfxCrit();else sfxHurt();
  const sc=$('scene'); if(sc){sc.classList.add('shake');setTimeout(()=>sc.classList.remove('shake'),300);}
  setMsg('<span class="ng">'+e.name+'の攻撃！</span> '+(ed.crit?'<span class="crit">会心！</span> ':'')+'<span class="dmg">'+ed.dmg+'のダメージ。</span>');
  setTimeout(()=>{ if(p.hp<=0){ loseBattle(); } else { busy=false; menu(); } }, 780);
}
function winBattle(){
  busy=false; const e=bt.enemy;
  if(bt.boss){ return winGame(); }
  if(p.lv>bestLv){bestLv=p.lv;localStorage.setItem('h8_bestlv',bestLv);}
  spec.level=(spec.level||1)+1; p=buildPlayer(spec); p.hp=p.maxhp; renderHud(); sfxLevel();
  setMsg('<span class="ok">'+e.name+'を倒した！</span> <span class="crit">レベルアップ！ Lv'+p.lv+'</span> HP全回復。');
  setCmds([{html:'▶ 進む',primary:true,fn:nextNode}],'one');
}
function loseBattle(){
  busy=false; sfxFail();
  if(p.lv>bestLv){bestLv=p.lv;localStorage.setItem('h8_bestlv',bestLv);}
  const boss=bt.boss, loc=bt.f.loc, name=bt.enemy.name;
  setMsg('<span class="ng">勇者は倒れた…</span>');
  setTimeout(()=>{
    stage.classList.add('scroll');
    const title=boss?'魔王に、届かず':(name+'に敗れる');
    const text=boss?'激闘の末、勇者は魔王に届かなかった。あと一歩——だが、その一歩が8192分の1。装備と戦い方を見直し、もう一度。'
                   :(loc+'で'+name+'に敗れた。レベルと装備を整え直そう。');
    stage.innerHTML='<div class="center fade"><div class="ending-tag">GAME OVER</div><div style="font-size:46px">💀</div>'
      +'<div style="font-size:20px;font-weight:900;color:#ff5c7a">'+title+'</div><div class="title-sub">'+text+'</div>'
      +'<div class="stat-row"><div class="stat"><div class="k">職業/Lv</div><div class="v">'+p.cls.emoji+' Lv'+p.lv+'</div></div>'
      +'<div class="stat"><div class="k">挑戦回数</div><div class="v gold">'+fmt(attempts)+'</div></div></div>'
      +(boss?'<div style="font-size:12px;color:#9aa3d6;margin-top:6px">魔王の勝率はおよそ1/8192。準備を尽くしても、最後は運が要る。</div>':'')+'</div>';
    setCmds([{html:'⚔ もう一度（'+fmt(attempts+1)+'回目）',primary:true,fn:startRun},{html:'タイトルへ',fn:showTitle}]);
  },650);
}
function winGame(){
  clears++; localStorage.setItem('h8_clears',clears); sfxWin();
  stage.classList.add('scroll');
  stage.innerHTML='<div class="center fade"><div class="ending-tag" style="color:#ffd23f">TRUE END ― 8192分の1の勇者</div>'
    +'<div style="font-size:54px">👑</div><div class="title-h">魔王、討伐！</div>'
    +'<div class="title-sub">幾度の死線を越え、最後の一撃が魔王の核を撃ち砕いた。確率にして約1/8192——準備と、わずかな幸運の果てに掴んだ勝利。お前は、伝説になった。</div>'
    +'<div class="stat-row"><div class="stat"><div class="k">職業/Lv</div><div class="v">'+p.cls.emoji+' Lv'+p.lv+'</div></div>'
    +'<div class="stat"><div class="k">クリア時の挑戦</div><div class="v gold">'+fmt(attempts)+'回目</div></div>'
    +'<div class="stat"><div class="k">通算討伐</div><div class="v">'+fmt(clears)+'</div></div></div>'
    +'<div style="font-size:13px;color:#ffd23f;font-weight:800;margin-top:6px">🎉 '+fmt(attempts)+' 回目の挑戦で、8192分の1を掴んだ！</div></div>';
  const share='「8192分の1の勇者」で魔王討伐！🎉 '+attempts+'回目の挑戦、約1/8192を勝ち抜いた。あなたは何回で倒せる？ #8192分の1の勇者 #やまむー';
  setCmds([{html:'もう一度挑む',primary:true,fn:startRun},{html:'𝕏 で自慢する',fn:()=>{window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(share),'_blank','noopener');}}]);
}

// ===== init =====
document.getElementById('mute').textContent=muted?'🔇':'🔊';
document.getElementById('mute').onclick=()=>{ initAudio(); toggleMute(); };
showTitle();
</script>
</body>
</html>
