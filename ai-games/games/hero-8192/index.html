<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>8192分の1の勇者</title>
<style>
  :root{--bg:#0a0a1a;--panel:#10122b;--panel2:#171a3a;--ink:#eef1ff;--sub:#9aa3d6;--line:#3a3f78;--gold:#ffd23f;--good:#46e8a0;--bad:#ff5c7a;--mag:#b06bff}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%,#1a1c45 0%,var(--bg) 60%);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","M PLUS Rounded 1c",system-ui,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;overflow:hidden}
  #app{max-width:540px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;padding:12px;gap:10px}
  .hud{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:14px;padding:9px 14px;box-shadow:0 6px 0 rgba(0,0,0,.35)}

  .hud-label{font-size:11px;color:var(--sub);letter-spacing:.06em}
  .hud-prob{font-size:15px;font-weight:900;color:var(--bad)}

  .pip.on{background:linear-gradient(180deg,var(--gold),#e0a800)} .pip.now{background:var(--mag)} .pip.gate{outline:1px solid #5a3a3a}
  .pip-cap{font-size:11px;color:var(--sub);text-align:center;margin-top:5px;font-weight:700}
  .stage{flex:1;position:relative;display:flex;flex-direction:column;background:linear-gradient(180deg,#0e1030,#0a0b22);border:2px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 0 rgba(0,0,0,.35)}
  .stage.scroll{overflow-y:auto}
  .scene{flex:1;position:relative;min-height:120px;background:radial-gradient(80% 60% at 50% 30%,rgba(176,107,255,.16),transparent 70%)}
  .artfb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:76px}
  .art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .scene .grad{position:absolute;left:0;right:0;bottom:0;height:44%;z-index:2;background:linear-gradient(180deg,transparent,rgba(7,8,21,.92))}
  .badge{position:absolute;top:10px;right:12px;z-index:3;background:rgba(0,0,0,.55);border:1.5px solid var(--gold);color:var(--gold);font-weight:900;font-size:12px;padding:5px 10px;border-radius:999px}
  .badge.qte{border-color:var(--bad);color:var(--bad)} .badge.talk{border-color:var(--mag);color:#dcc6ff}
  .acttag{position:absolute;top:10px;left:12px;z-index:3;background:rgba(0,0,0,.5);border:1.5px solid var(--mag);color:#dcc6ff;font-weight:800;font-size:11px;padding:5px 10px;border-radius:999px}
  .msg{background:#070815;border-top:2px solid var(--line);padding:13px 16px;min-height:104px;font-size:15px;line-height:1.75;position:relative}
  .msg .who{display:block;font-size:12px;color:var(--mag);font-weight:900;margin-bottom:4px;letter-spacing:.04em}
  .msg b{color:var(--gold)} .msg .ok{color:var(--good);font-weight:900} .msg .ng{color:var(--bad);font-weight:900}
  .msg.tapnext{cursor:pointer} .msg .next-ind{position:absolute;right:12px;bottom:8px;font-size:12px;color:var(--mag);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.3}}
  .cmds{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .cmds.one{grid-template-columns:1fr} .cmds.talk{grid-template-columns:1fr}
  button.cmd{font-family:inherit;font-size:15px;font-weight:800;color:var(--ink);background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:13px;padding:13px 12px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s,border-color .12s;-webkit-tap-highlight-color:transparent;text-align:left}
  .cmds.one button.cmd,.cmds:not(.talk) button.cmd[data-c]{text-align:center}
  button.cmd:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.4)}
  button.cmd:hover{border-color:var(--mag)} button.cmd.primary{background:linear-gradient(180deg,#3a2d00,#241c00);border-color:var(--gold);color:var(--gold);text-align:center}
  button.cmd.talkopt{border-color:#4a4f8a} button.cmd[disabled]{opacity:.5;pointer-events:none}
  .timer{height:0;overflow:hidden;transition:height .18s;position:relative;border-radius:9px}
  .timer.on{height:22px;background:#0c0e22;border:2px solid var(--bad)}
  .timer-bar{position:absolute;left:0;top:0;bottom:0;width:100%;background:linear-gradient(90deg,var(--good),var(--gold));opacity:.85;border-radius:7px;transition:width .1s linear}
  .timer-bar.warn{background:linear-gradient(90deg,var(--bad),#ff9a3c)}
  .timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#0a0a1a}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;text-align:center;padding:18px}
  .title-h{font-size:26px;font-weight:900;line-height:1.25;background:linear-gradient(135deg,var(--gold),var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent}
  .title-num{font-size:46px;font-weight:900;color:var(--gold);text-shadow:0 0 22px rgba(255,210,63,.45)}
  .title-sub{font-size:13px;color:var(--sub);line-height:1.8;max-width:380px}
  .stat-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px}
  .stat{background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:7px 12px;min-width:84px}
  .stat .k{font-size:10px;color:var(--sub)} .stat .v{font-size:16px;font-weight:900;color:var(--ink)} .stat .v.gold{color:var(--gold)}
  .ending-tag{font-size:12px;font-weight:900;letter-spacing:.12em;color:var(--mag)}
  .flowwrap{padding:10px 12px 4px}
  .flowhead{font-size:12px;font-weight:900;color:var(--mag);text-align:center;margin-bottom:9px;letter-spacing:.05em}
  .flow{position:relative;padding-left:4px}
  .flow::before{content:'';position:absolute;left:21px;top:18px;bottom:18px;width:2px;background:var(--line);z-index:0}
  .fnode{position:relative;z-index:1;display:flex;gap:10px;align-items:flex-start;padding:4px 4px}
  .ficon{width:32px;height:32px;flex:none;display:flex;align-items:center;justify-content:center;font-size:17px;background:#13152f;border:2px solid var(--line);border-radius:9px}
  .fnode.ok .ficon{border-color:var(--good)} .fnode.die .ficon{border-color:var(--bad);background:#2a0e16} .fnode.goal .ficon{border-color:var(--gold);background:#2a2400}
  .fbody{flex:1;font-size:12px;line-height:1.4;padding-top:1px}
  .fbody .ft{font-weight:800;color:#cfd4ff} .fbody .fc{color:var(--gold);font-weight:800}
  .fnote{display:block;font-size:11px;margin-top:1px;color:var(--sub)} .fnote.win{color:var(--good)} .fnote.die{color:var(--bad)}
  .mute{position:fixed;top:8px;right:10px;background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;z-index:5}
  .fade{animation:fade .3s ease} @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<button class="mute" id="mute">🔊</button>
<div id="app">
  <div class="hud" id="hud">
    <div class="hud-top"><span class="hud-label">ルナとの絆</span><span class="hud-prob" id="prob">♡♡♡♡♡</span></div>
    <div class="pips" id="pips"></div>
    <div class="pip-cap" id="pipcap">プロローグ</div>
  </div>
  <div class="stage" id="stage"><div class="scene" id="scene"></div><div class="msg" id="msg"></div></div>
  <div class="timer" id="timer"><div class="timer-bar" id="timerBar"></div><span class="timer-num" id="timerNum"></span></div>
  <div class="cmds" id="cmds"></div>
</div>
<script>

/* =======================================================

   ・魔王の理：選んだ瞬間まで結末は定まらない＝誰にも先は視えない（ルナにも）。
   ・ルナは「8191人の"想い"」だが記憶は持たず、試練は毎回変わる → 答えは誰も知らない。
   ・type: story(会話のみ) / talk(結末に無関係な会話選択・絆増減) / gate(4択2正解=運命の関門)
   ・全gate正解で真エンド。stance/絆で真エンドの結末が分岐。外した関門ごとにBAD END。
   ======================================================= */
const QTE_TIME=9.0, CORRECT_PER=2;

// ---------- audio ----------
let AC=null,master=null,muted=!!localStorage.getItem('h8_mute');
function initAudio(){ if(AC)return; try{AC=new(window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=muted?0:0.4;master.connect(AC.destination);}catch(e){AC=null;} }
function tone(f,d,t,v,sl){ if(!AC)return; const t0=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(); o.type=t||'sine'; o.frequency.setValueAtTime(f,t0); if(sl)o.frequency.exponentialRampToValueAtTime(Math.max(20,sl),t0+d); g.gain.setValueAtTime(v||0.2,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+d); o.connect(g);g.connect(master);o.start(t0);o.stop(t0+d+0.05); }
function sfxBlip(){ tone(620,0.04,'square',0.05); }
function sfxPick(){ tone(420,0.06,'square',0.10,520); }
function sfxTalk(){ tone(540,0.06,'sine',0.09); setTimeout(()=>tone(720,0.07,'sine',0.08),60); }
function sfxStep(){ tone(440,0.07,'sine',0.10); }
function sfxTick(){ tone(900,0.03,'square',0.05); }
function sfxFail(){ tone(200,0.4,'sawtooth',0.22,50); tone(90,0.6,'sine',0.22,40); }
function sfxWin(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',0.16),i*120)); }
function toggleMute(){ muted=!muted; localStorage.setItem('h8_mute',muted?'1':''); if(master)master.gain.value=muted?0:0.4; document.getElementById('mute').textContent=muted?'🔇':'🔊'; }

// ====================== STORY ======================
const SCENES=[

   {who:'',text:'その理のもとでは、<b>選んだ瞬間まで、どんな結末も定まらない</b>。——だから、誰にも先は視えない。'},

 ],opts:['正面から斬る','木に登る','火を投げる','背を見せ逃げる'],fT:'牙にかかりて',fX:'その一手は、致命的だった。群れが旅の終わりを告げる。'},

    +buildFlow(-1);
  const share='「8192分の1の勇者」で真エンドに到達！🎉 '+attempts+'回目の挑戦で確率を覆した。あなたは何回で辿り着ける？ #8192分の1の勇者 #やまむー';
  setCmds([{html:'もう一度挑む',primary:true,fn:startRun},{html:'𝕏 で自慢する',fn:()=>{ window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(share),'_blank','noopener'); }}]);
}

// ---------- init ----------
buildPips();
document.getElementById('mute').textContent=muted?'🔇':'🔊';
document.getElementById('mute').onclick=()=>{ initAudio(); toggleMute(); };
showTitle();
</script>
