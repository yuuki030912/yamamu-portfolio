<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>8192分の1の勇者</title>
<style>
  :root{--bg:#0a0a1a;--panel:#10122b;--panel2:#171a3a;--ink:#eef1ff;--sub:#9aa3d6;--line:#3a3f78;--gold:#ffd23f;--good:#46e8a0;--bad:#ff5c7a;--mag:#b06bff}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%,#1a1c45 0%,var(--bg) 60%);color:var(--ink);font-family:"Hiragino Maru Gothic ProN","M PLUS Rounded 1c",system-ui,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;overflow:hidden}
  #app{max-width:540px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;padding:12px;gap:10px}
  .hud{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:14px;padding:9px 14px;box-shadow:0 6px 0 rgba(0,0,0,.35)}
  .hud-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .hud-label{font-size:11px;color:var(--sub);letter-spacing:.06em}
  .hud-prob{font-size:18px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums}
  .pips{display:flex;gap:2px;margin-top:8px}
  .pip{flex:1;height:5px;border-radius:2px;background:#23264f;transition:background .3s}
  .pip.on{background:linear-gradient(180deg,var(--gold),#e0a800)} .pip.now{background:var(--mag)}
  .pip-cap{font-size:11px;color:var(--sub);text-align:center;margin-top:5px;font-weight:700}
  .stage{flex:1;position:relative;display:flex;flex-direction:column;background:linear-gradient(180deg,#0e1030,#0a0b22);border:2px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 0 rgba(0,0,0,.35)}
  .stage.scroll{overflow-y:auto}
  .scene{flex:1;position:relative;min-height:130px;background:radial-gradient(80% 60% at 50% 30%,rgba(176,107,255,.16),transparent 70%)}
  .artfb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px}
  .art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .scene .grad{position:absolute;left:0;right:0;bottom:0;height:42%;z-index:2;background:linear-gradient(180deg,transparent,rgba(7,8,21,.9))}
  .badge{position:absolute;top:10px;right:12px;z-index:3;background:rgba(0,0,0,.55);border:1.5px solid var(--gold);color:var(--gold);font-weight:900;font-size:12px;padding:5px 10px;border-radius:999px}
  .badge.qte{border-color:var(--bad);color:var(--bad)}
  .acttag{position:absolute;top:10px;left:12px;z-index:3;background:rgba(0,0,0,.5);border:1.5px solid var(--mag);color:#dcc6ff;font-weight:800;font-size:11px;padding:5px 10px;border-radius:999px}
  .msg{background:#070815;border-top:2px solid var(--line);padding:13px 16px;min-height:96px;font-size:15px;line-height:1.7;position:relative}
  .msg .who{display:block;font-size:12px;color:var(--mag);font-weight:900;margin-bottom:4px;letter-spacing:.04em}
  .msg b{color:var(--gold)} .msg .ok{color:var(--good);font-weight:900} .msg .ng{color:var(--bad);font-weight:900}
  .msg.tapnext{cursor:pointer}
  .msg .next-ind{position:absolute;right:12px;bottom:8px;font-size:12px;color:var(--mag);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.3}}
  .cmds{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .cmds.one{grid-template-columns:1fr}
  button.cmd{font-family:inherit;font-size:15px;font-weight:800;color:var(--ink);background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--line);border-radius:13px;padding:14px 10px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s,border-color .12s;-webkit-tap-highlight-color:transparent}
  button.cmd:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.4)}
  button.cmd:hover{border-color:var(--mag)} button.cmd.primary{background:linear-gradient(180deg,#3a2d00,#241c00);border-color:var(--gold);color:var(--gold)}
  button.cmd[disabled]{opacity:.5;pointer-events:none}
  .timer{height:0;overflow:hidden;transition:height .18s;position:relative;border-radius:9px}
  .timer.on{height:22px;background:#0c0e22;border:2px solid var(--bad)}
  .timer-bar{position:absolute;left:0;top:0;bottom:0;width:100%;background:linear-gradient(90deg,var(--good),var(--gold));opacity:.85;border-radius:7px;transition:width .1s linear}
  .timer-bar.warn{background:linear-gradient(90deg,var(--bad),#ff9a3c)}
  .timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#0a0a1a}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;text-align:center;padding:18px}
  .title-h{font-size:27px;font-weight:900;line-height:1.2;background:linear-gradient(135deg,var(--gold),var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent}
  .title-num{font-size:48px;font-weight:900;color:var(--gold);text-shadow:0 0 22px rgba(255,210,63,.45)}
  .title-sub{font-size:13px;color:var(--sub);line-height:1.75;max-width:370px}
  .stat-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:2px}
  .stat{background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:7px 12px;min-width:88px}
  .stat .k{font-size:10px;color:var(--sub)} .stat .v{font-size:17px;font-weight:900;color:var(--ink)} .stat .v.gold{color:var(--gold)}
  .ending-tag{font-size:12px;font-weight:900;letter-spacing:.1em;color:var(--mag)}
  .flowwrap{padding:10px 12px 4px}
  .flowhead{font-size:12px;font-weight:900;color:var(--mag);text-align:center;margin-bottom:9px;letter-spacing:.05em}
  .flow{position:relative;padding-left:4px}
  .flow::before{content:'';position:absolute;left:21px;top:18px;bottom:18px;width:2px;background:var(--line);z-index:0}
  .fnode{position:relative;z-index:1;display:flex;gap:10px;align-items:flex-start;padding:4px 4px}
  .ficon{width:32px;height:32px;flex:none;display:flex;align-items:center;justify-content:center;font-size:17px;background:#13152f;border:2px solid var(--line);border-radius:9px}
  .fnode.ok .ficon{border-color:var(--good)} .fnode.die .ficon{border-color:var(--bad);background:#2a0e16} .fnode.goal .ficon{border-color:var(--gold);background:#2a2400}
  .fbody{flex:1;font-size:12px;line-height:1.4;padding-top:1px}
  .fbody .ft{font-weight:800;color:#cfd4ff} .fbody .fc{color:var(--gold);font-weight:800}
  .fnote{display:block;font-size:11px;margin-top:1px;color:var(--sub)} .fnote.win{color:var(--good)} .fnote.die{color:var(--bad)}
  .mute{position:fixed;top:8px;right:10px;background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;z-index:5}
  .fade{animation:fade .3s ease} @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<button class="mute" id="mute">🔊</button>
<div id="app">
  <div class="hud" id="hud">
    <div class="hud-top"><span class="hud-label">運命の物語</span><span class="hud-prob" id="prob">真エンドは 1/8,192 の奇跡</span></div>
    <div class="pips" id="pips"></div>
    <div class="pip-cap" id="pipcap">プロローグ</div>
  </div>
  <div class="stage" id="stage"><div class="scene" id="scene"></div><div class="msg" id="msg"></div></div>
  <div class="timer" id="timer"><div class="timer-bar" id="timerBar"></div><span class="timer-num" id="timerNum"></span></div>
  <div class="cmds" id="cmds"></div>
</div>
<script>
'use strict';
/* =======================================================
   8192分の1の勇者 ── 物語重視版（ノベル＋分岐＋多重エンド）
   会話はタップで読み進める。道中に物語の山場を挿入。
   選択は「4択・当たり2つ(=1/2)」。全ての関門を当てて初めて真エンド(=超レア=8192の難しさ)。
   外した場所ごとに別エンディング。最後に運命のフローチャート。
   伏線→どんでん返し：魔王=最初の勇者 / ルナ=8191の想い。
   ======================================================= */
const QTE_TIME=9.0, CORRECT_PER=2;

// ---------- audio ----------
let AC=null,master=null,muted=!!localStorage.getItem('h8_mute');
function initAudio(){ if(AC)return; try{AC=new(window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=muted?0:0.4;master.connect(AC.destination);}catch(e){AC=null;} }
function tone(f,d,t,v,sl){ if(!AC)return; const t0=AC.currentTime,o=AC.createOscillator(),g=AC.createGain(); o.type=t||'sine'; o.frequency.setValueAtTime(f,t0); if(sl)o.frequency.exponentialRampToValueAtTime(Math.max(20,sl),t0+d); g.gain.setValueAtTime(v||0.2,t0); g.gain.exponentialRampToValueAtTime(0.0001,t0+d); o.connect(g);g.connect(master);o.start(t0);o.stop(t0+d+0.05); }
function sfxBlip(){ tone(620,0.04,'square',0.05); }
function sfxPick(){ tone(420,0.06,'square',0.10,520); }
function sfxStep(){ tone(440,0.07,'sine',0.10); }
function sfxTick(){ tone(900,0.03,'square',0.05); }
function sfxFail(){ tone(200,0.4,'sawtooth',0.22,50); tone(90,0.6,'sine',0.22,40); }
function sfxWin(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',0.16),i*120)); }
function toggleMute(){ muted=!muted; localStorage.setItem('h8_mute',muted?'1':''); if(master)master.gain.value=muted?0:0.4; document.getElementById('mute').textContent=muted?'🔇':'🔊'; }

// ---------- story ----------
// type:'story'=会話のみ(関門なし) / 'gate'=4択2正解の関門
// lines:[{who,text}] をタップで送る。gateは opts(4) と fT/fX(外した時の結末)。
const SCENES=[
 {type:'story',chapter:'プロローグ',emoji:'🌙',art:'art/p.png',lines:[
   {who:'',text:'8192年に一度、世界の理（ことわり）が緩み、魔王が目を覚ます。'},
   {who:'',text:'魔王の名は——<b>ザ・プロバビリティ</b>。あらゆる結末を「運次第」に書き換える、確率の化身。'},
   {who:'妖精ルナ',text:'「魔王を倒せる勇者が現れる確率は、<b>8192分の1</b>。…でも、あなたなら」'},
   {who:'妖精ルナ',text:'「私はルナ。あなたの旅に、最後まで付き添う。——さあ、運命を始めよう」'}
 ]},
 {type:'gate',chapter:'第一章：旅立ち',emoji:'🌲',art:'art/s1.png',lines:[
   {who:'',text:'村を出てすぐ、森が四つに分かれていた。'},
   {who:'妖精ルナ',text:'「二つは出口へ、二つは行き止まり。…勘を、信じて」'}
 ],opts:['木漏れ日の道','苔むした道','霧の道','獣道'],fT:'森の迷い子',fX:'選んだ道は行き止まり。勇者は森を彷徨い、二度と陽の下へ戻らなかった。'},
 {type:'gate',chapter:'第一章：旅立ち',emoji:'🐺',art:'art/s2.png',timed:true,lines:[
   {who:'',text:'狼の群れ。低い唸りが、四方から近づく。'},
   {who:'妖精ルナ',text:'「来る…！一瞬で決めて！」'}
 ],opts:['正面から斬る','木に登る','火を焚く','背を見せ逃げる'],fT:'牙にかかりて',fX:'選択は致命的だった。群れが旅の終わりを告げる。'},
 {type:'story',chapter:'第二章：語り部',emoji:'🧙',art:'art/old.png',lines:[
   {who:'老兵',text:'「魔王に挑んだ勇者は、お前で…何人目だったかのう」'},
   {who:'老兵',text:'「知っておるか。<b>魔王はかつて、最初の勇者だった</b>という伝説を」'},
   {who:'老兵',text:'「誰にも救えなかった男が、絶望の果てに"確率"そのものになった、と…ただの噂じゃがな」'},
   {who:'妖精ルナ',text:'「…っ」（ルナが、何か言いかけて口をつぐんだ）'}
 ]},
 {type:'gate',chapter:'第二章：試練の地',emoji:'💎',art:'art/s3.png',lines:[
   {who:'',text:'洞窟の壁に、四色の鉱脈が脈打つように光る。'},
   {who:'妖精ルナ',text:'「綺麗…でも半分は魔石の罠。触れれば石になる」'}
 ],opts:['青の鉱石','赤の鉱石','緑の鉱石','金の鉱石'],fT:'偽りの輝き',fX:'それは魔石だった。石化の呪いが、勇者を静かな彫像に変えた。'},
 {type:'gate',chapter:'第二章：試練の地',emoji:'⛲',art:'art/s4.png',lines:[
   {who:'',text:'底の見えない地底湖。対岸に、出口の光が滲む。'}
 ],opts:['岩を伝う','泳いで渡る','氷の上を行く','蔓を伝う'],fT:'湖の底に',fX:'冷たい水が勇者を引き込んだ。光は、もう届かない。'},
 {type:'gate',chapter:'第三章：賭けの夜',emoji:'🃏',art:'art/s5.png',lines:[
   {who:'賭博師',text:'「橋を渡りたくば賭けろ。四枚のうち、"運命の札"は二枚だ」'},
   {who:'妖精ルナ',text:'「この男…魔王の気配がする。気をつけて」'}
 ],opts:['太陽の札','月の札','星の札','嵐の札'],fT:'橋からの転落',fX:'番人は嗤った。「運が無かったな」。橋は音もなく崩れ落ちた。'},
 {type:'story',chapter:'第三章：ルナの告白',emoji:'🧚',art:'art/luna.png',lines:[
   {who:'妖精ルナ',text:'「ねえ。…そろそろ、話しておくね」'},
   {who:'妖精ルナ',text:'「私は妖精じゃない。<b>魔王に挑んで散った、8191人の勇者たちの想い</b>——その集まりなの」'},
   {who:'妖精ルナ',text:'「みんな、あと一歩だった。だから今度こそ、あなたに勝ってほしい」'},
   {who:'妖精ルナ',text:'「8192分の1。…その"1"に、なって」'}
 ]},
 {type:'gate',chapter:'第四章：魔王城',emoji:'🎲',art:'art/s6.png',timed:true,lines:[
   {who:'賭博師',text:'「最後の余興だ。四つの賽、当たりは二つ。今すぐ選べ」'}
 ],opts:['一の賽','二の賽','三の賽','四の賽'],fT:'賽の目に泣く',fX:'賽は無情に転がった。城を前に、勇者の旅は途切れた。'},
 {type:'gate',chapter:'第四章：魔王城',emoji:'🏰',art:'art/s7.png',lines:[
   {who:'',text:'玉座へ続く扉は、四つ。'},
   {who:'妖精ルナ',text:'「本物は二つ。残りは…牢獄に繋がってる」'}
 ],opts:['鉄の扉','金の扉','銀の扉','黒曜の扉'],fT:'扉の向こうの牢',fX:'扉の先は地下牢。勇者は鎖に繋がれ、声も届かなくなった。'},
 {type:'gate',chapter:'第四章：魔王城',emoji:'🔥',art:'art/s8.png',lines:[
   {who:'',text:'玉座の間へ続く、四筋の炎の回廊。'},
   {who:'妖精ルナ',text:'「安全なのは二筋だけ。…信じて選んで」'}
 ],opts:['蒼炎の道','紅炎の道','白炎の道','黒炎の道'],fT:'炎に焼かれて',fX:'炎が勇者を捉えた。玉座は、もう目の前だったのに。'},
 {type:'story',chapter:'最終章：玉座',emoji:'👤',art:'art/throne.png',lines:[
   {who:'魔王',text:'「よく来た。8192分の1を、くぐり抜けてきたか」'},
   {who:'魔王',text:'「教えてやろう。私はかつて——<b>最初の勇者</b>だった」'},
   {who:'魔王',text:'「誰も私を救わなかった。だから私は、すべてを"運"に委ねた。努力も、想いも、無意味だと証明するために」'},
   {who:'妖精ルナ',text:'「…ううん。みんな、あなたを諦めてなかった。私が——その証拠だよ」'},
   {who:'魔王',text:'「黙れ。…さあ、最後の賭けだ。我が"核"を、見抜けるか！」'}
 ]},
 {type:'gate',chapter:'最終決戦',emoji:'👹',art:'art/s9.png',timed:true,boss:true,lines:[
   {who:'魔王',text:'「四つのうち、真の核は二つ。当ててみせろ、勇者！」'},
   {who:'妖精ルナ',text:'「あなたなら、できる。私たち8191人が、背中を押す！」'}
 ],opts:['頭上の王冠','胸の核','右手の杖','足元の影'],fT:'核を逸れて',fX:'刃は核を逸れた。魔王の哄笑が響く。8192分の1は、今回も微笑まなかった。'}
];
const N=SCENES.length;
const GATES=SCENES.reduce((a,s)=>a+(s.type==='gate'?1:0),0);

// ---------- state ----------
let depth=0,lineIdx=0,runStart=0,busy=false,choices=[],correctSet=[];
let timerId=null,timeLeft=0;
let attempts=+(localStorage.getItem('h8_attempts')||0);
let clears=+(localStorage.getItem('h8_clears')||0);
let bestMiss=localStorage.getItem('h8_bestmiss')!==null?+localStorage.getItem('h8_bestmiss'):99;

// ---------- dom ----------
const $=id=>document.getElementById(id);
const stage=$('stage'),cmds=$('cmds'),pipsEl=$('pips'),pipcap=$('pipcap'),timerEl=$('timer'),timerBar=$('timerBar'),timerNum=$('timerNum');
function fmt(n){ return n.toLocaleString('en-US'); }
function ri(n){ return Math.floor(Math.random()*n); }
function pickSet(n,k){ const idx=[...Array(n).keys()]; for(let i=n-1;i>0;i--){const j=ri(i+1);const t=idx[i];idx[i]=idx[j];idx[j]=t;} return idx.slice(0,k).sort((a,b)=>a-b); }
function buildPips(){ pipsEl.innerHTML=''; for(let i=0;i<N;i++){const d=document.createElement('div');d.className='pip';pipsEl.appendChild(d);} }
function renderHud(){ const f=SCENES[depth]; pipcap.textContent=f?f.chapter:''; const ps=pipsEl.children; for(let i=0;i<ps.length;i++) ps[i].className='pip'+(i<depth?' on':(i===depth?' now':'')); }
function setCmds(items,cls){ cmds.className='cmds'+(cls?(' '+cls):''); cmds.innerHTML=''; items.forEach(it=>{ const b=document.createElement('button'); b.className='cmd'+(it.primary?' primary':''); b.innerHTML=it.html; if(it.dis)b.disabled=true; b.onclick=()=>{ initAudio(); if(AC&&AC.state==='suspended')AC.resume(); it.fn(); }; cmds.appendChild(b); }); }
function startTimer(onExpire){ clearTimer(); timeLeft=QTE_TIME; timerEl.classList.add('on'); updateTimerUI(); timerId=setInterval(()=>{ timeLeft-=0.1; if(timeLeft<=3.05 && Math.abs(timeLeft%1)<0.06) sfxTick(); if(timeLeft<=0){ clearTimer(); onExpire(); } else updateTimerUI(); },100); }
function clearTimer(){ if(timerId){clearInterval(timerId);timerId=null;} timerEl.classList.remove('on'); }
function updateTimerUI(){ const r=Math.max(0,timeLeft/QTE_TIME); timerBar.style.width=(r*100)+'%'; timerBar.className='timer-bar'+(timeLeft<=3?' warn':''); timerNum.textContent='⏱ '+Math.ceil(Math.max(0,timeLeft))+'秒'; }
function sceneArt(f){ return '<div class="artfb">'+(f.emoji||'⚔️')+'</div>'+(f.art?'<img class="art" src="'+f.art+'" alt="" onerror="this.remove()">':'')+'<div class="grad"></div>'; }
function lineHtml(l){ return (l.who?'<span class="who">'+l.who+'</span>':'')+l.text; }

// ---------- screens ----------
function showTitle(){
  clearTimer(); depth=0;busy=false;choices=[]; stage.classList.remove('scroll'); renderHud(); pipcap.textContent='プロローグ';
  const missTxt = bestMiss>=99?'まだ無し':(bestMiss===0?'真エンド到達👑':('真エンドまであと'+bestMiss+'択'));
  stage.innerHTML='<div class="scene" id="scene">'+sceneArt({emoji:'🌙',art:'art/title.png'})+'</div><div class="msg" id="msg"></div>';
  $('scene').insertAdjacentHTML('beforeend','<div style="position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;gap:6px">'
    +'<div class="title-h">8192分の1の</div><div class="title-num">勇者</div>'
    +'<div class="title-sub" style="color:#e7ebff">妖精ルナと往く、運命に抗う物語。<br>関門を選び抜き、<b style="color:#ffd23f">真エンド＝8192分の1の奇跡</b>へ。</div></div>');
  $('msg').innerHTML='<div style="text-align:center"><div class="stat-row" style="justify-content:center">'
    +'<div class="stat"><div class="k">ベスト</div><div class="v gold">'+missTxt+'</div></div>'
    +'<div class="stat"><div class="k">挑戦回数</div><div class="v">'+fmt(attempts)+'</div></div>'
    +'<div class="stat"><div class="k">真エンド</div><div class="v">'+fmt(clears)+'</div></div></div></div>';
  setCmds([{html:'⚔ 物語を始める',primary:true,fn:startRun}],'one');
}
function startRun(){
  attempts++; localStorage.setItem('h8_attempts',attempts);
  depth=0;busy=false;choices=[];runStart=Date.now(); stage.classList.remove('scroll');
  correctSet=SCENES.map(sc=> sc.type==='gate'?pickSet(sc.opts.length,CORRECT_PER):null);
  renderHud(); sfxStep(); enterScene();
}
function enterScene(){
  busy=false; lineIdx=0;
  const f=SCENES[depth];
  stage.innerHTML='<div class="scene" id="scene">'+sceneArt(f)
    +'<div class="acttag">'+f.chapter+'</div>'
    +'<div class="badge'+(f.timed?' qte':'')+'">'+(f.timed?'⏱ 制限時間':(f.type==='gate'?'運命の選択':'物語'))+'</div>'
    +'</div><div class="msg" id="msg"></div>';
  showLine();
}
function showLine(){
  const f=SCENES[depth];
  const m=$('msg');
  m.innerHTML=lineHtml(f.lines[lineIdx]);
  m.classList.remove('fade'); void m.offsetWidth; m.classList.add('fade');
  const last = lineIdx>=f.lines.length-1;
  if(!last){
    m.classList.add('tapnext'); m.insertAdjacentHTML('beforeend','<span class="next-ind">▼ タップ</span>');
    m.onclick=()=>{ sfxBlip(); lineIdx++; m.onclick=null; showLine(); };
    setCmds([{html:'▼ つぎへ',fn:()=>{ sfxBlip(); lineIdx++; showLine(); }}],'one');
  } else {
    m.classList.remove('tapnext'); m.onclick=null;
    presentChoices(f);
  }
}
function presentChoices(f){
  if(f.type==='story'){
    const isLast = depth>=N-1;
    setCmds([{html:isLast?'…':'▶ 進む',primary:true,fn:()=>advance()}],'one');
    return;
  }
  // gate
  setCmds(f.opts.map((o,i)=>({html:o,fn:()=>choose(i)})));
  if(f.timed){ startTimer(()=>{ const i=ri(f.opts.length); $('msg').innerHTML='<span class="ng">時間切れ！</span> 勇者は迷い、とっさに動いた——'; setTimeout(()=>choose(i,true),450); }); }
}
function advance(){ depth++; if(depth>=N){ finish(); return; } sfxStep(); enterScene(); }
function choose(idx,timeout){
  if(busy) return; busy=true; clearTimer(); sfxPick();
  const f=SCENES[depth], set=correctSet[depth], correct=set.indexOf(idx)>=0;
  choices.push({i:depth, chosen:f.opts[idx], correctLabels:set.map(k=>f.opts[k]), correct:correct});
  setCmds(f.opts.map(()=>({html:'…',dis:true,fn:()=>{}})));
  if(!timeout) $('msg').innerHTML='「'+f.opts[idx]+'」——勇者は、道を選んだ。';
  setTimeout(()=>{ depth++; if(depth>=N){ finish(); return; } sfxStep(); enterScene(); }, timeout?600:680);
}
function finish(){
  let firstWrong=-1, miss=0;
  for(const c of choices){ if(!c.correct){ miss++; if(firstWrong<0) firstWrong=SCENES.indexOf(SCENES[c.i]); } }
  // firstWrong as scene index of first wrong gate
  firstWrong=-1;
  for(const c of choices){ if(!c.correct){ firstWrong=c.i; break; } }
  if(miss<bestMiss){ bestMiss=miss; localStorage.setItem('h8_bestmiss',bestMiss); }
  if(firstWrong<0) win(); else lose(firstWrong);
}

// ---------- flowchart ----------
function buildFlow(firstWrong){
  let h='<div class="flowwrap"><div class="flowhead">― 運命のフローチャート ―</div><div class="flow">';
  choices.forEach(c=>{
    let cls,note;
    if(c.correct){ cls='ok'; note='<span class="fnote win">✓ 当たりの道だった</span>'; }
    else if(c.i===firstWrong){ cls='die'; note='<span class="fnote die">✗ ここで運命が分かれた（当たりは「'+c.correctLabels.join('」「')+'」）</span>'; }
    else { cls='die'; note='<span class="fnote die">✗ ハズレ（当たりは「'+c.correctLabels.join('」「')+'」）</span>'; }
    h+='<div class="fnode '+cls+'"><div class="ficon">'+SCENES[c.i].emoji+'</div><div class="fbody">'
      +'<span class="ft">'+SCENES[c.i].chapter+'</span> <span class="fc">▶ '+c.chosen+'</span>'+note+'</div></div>';
  });
  const reached=firstWrong<0;
  h+='<div class="fnode '+(reached?'goal':'die')+'"><div class="ficon">'+(reached?'👑':'👹')+'</div><div class="fbody">'
    +'<span class="ft">'+(reached?'魔王 ザ・プロバビリティ 討伐':'魔王 ザ・プロバビリティ')+'</span>'
    +'<span class="fnote '+(reached?'win':'die')+'">'+(reached?'8192分の1の奇跡に到達！':'未討伐')+'</span></div></div>';
  return h+'</div></div>';
}
function lose(firstWrong){
  busy=false; sfxFail();
  const end=SCENES[firstWrong];
  const miss=choices.filter(c=>!c.correct).length;
  $('msg').innerHTML='<span class="ng">物語は、終わった。</span> 真実を確かめよう——';
  setTimeout(()=>{
    stage.classList.add('scroll');
    stage.innerHTML='<div class="center fade" style="padding-bottom:2px">'
      +'<div class="ending-tag">BAD END</div>'
      +'<div style="font-size:48px">💀</div>'
      +'<div style="font-size:20px;font-weight:900;color:#ff5c7a">'+end.fT+'</div>'
      +'<div class="title-sub">'+end.fX+'<br>運命が分かれたのは <b>「'+end.chapter+'」</b>。あと <b>'+miss+'</b> 択、当たりを選べていれば。</div>'
      +'<div class="stat-row">'
      +'<div class="stat"><div class="k">挑戦回数</div><div class="v gold">'+fmt(attempts)+'</div></div>'
      +'<div class="stat"><div class="k">惜しさ</div><div class="v">あと'+miss+'択</div></div></div>'
      +'<div style="font-size:13px;color:#b06bff;font-weight:700;margin-top:6px">ルナ「…まだ。まだ、終わってない。もう一度、運命を」</div></div>'
      +buildFlow(firstWrong);
    setCmds([{html:'⚔ もう一度（'+fmt(attempts+1)+'回目）',primary:true,fn:startRun},{html:'タイトルへ',fn:showTitle}]);
  },650);
}
function win(){
  busy=false; clears++; localStorage.setItem('h8_clears',clears); sfxWin();
  const secs=Math.max(1,Math.round((Date.now()-runStart)/1000)),mm=Math.floor(secs/60),ss=secs%60;
  stage.classList.add('scroll');
  stage.innerHTML='<div class="center fade" style="padding-bottom:2px">'
    +'<div class="ending-tag" style="color:#ffd23f">TRUE END ― 確率を覆した者</div>'
    +'<div style="font-size:54px">👑</div><div class="title-h">運命に、勝った。</div>'
    +'<div class="title-sub">核を撃ち抜かれた魔王は、最初の勇者の顔で微笑んだ。「…そうか。誰かが、最後まで信じてくれたのか」<br>ルナを形作っていた8191の光が、勇者にそっと溶けていく。「ありがとう。あなたが、8192分の1だよ」<br>世界から理不尽な"運次第"が消え、努力と想いが報われる朝が訪れた。</div>'
    +'<div class="stat-row">'
    +'<div class="stat"><div class="k">クリア時の挑戦</div><div class="v gold">'+fmt(attempts)+'回目</div></div>'
    +'<div class="stat"><div class="k">所要</div><div class="v">'+mm+'分'+ss+'秒</div></div>'
    +'<div class="stat"><div class="k">真エンド到達</div><div class="v">'+fmt(clears)+'</div></div></div>'
    +'<div style="font-size:13px;color:#ffd23f;font-weight:800;margin-top:6px">🎉 累計 '+fmt(attempts)+' 回目で、この物語を引き当てた。</div></div>'
    +buildFlow(-1);
  const share='「8192分の1の勇者」で真エンドに到達！🎉 '+attempts+'回目の挑戦で確率を覆した。あなたは何回で辿り着ける？ #8192分の1の勇者 #やまむー';
  setCmds([{html:'もう一度挑む',primary:true,fn:startRun},{html:'𝕏 で自慢する',fn:()=>{ window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(share),'_blank','noopener'); }}]);
}

// ---------- init ----------
buildPips();
document.getElementById('mute').textContent=muted?'🔇':'🔊';
document.getElementById('mute').onclick=()=>{ initAudio(); toggleMute(); };
showTitle();
</script>
