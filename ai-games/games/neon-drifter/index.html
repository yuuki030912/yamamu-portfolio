<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON DRIFTER — ネオン・サバイバー</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { width:100%; height:100%; background:#05060f; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { display:block; image-rendering:auto; box-shadow:0 0 60px rgba(80,180,255,0.15); touch-action:none; }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#dff3ff; text-align:center; pointer-events:none; z-index:10; }
  .panel { pointer-events:auto; background:rgba(8,12,28,0.92); border:1px solid rgba(90,180,255,0.35);
    border-radius:16px; padding:32px 40px; max-width:560px; box-shadow:0 0 40px rgba(60,160,255,0.25), inset 0 0 40px rgba(40,120,255,0.06); }
  h1 { font-size:54px; letter-spacing:6px; font-weight:800;
    background:linear-gradient(90deg,#5ad1ff,#b98bff,#ff6ad5); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 30px rgba(120,180,255,0.4); margin-bottom:6px; }
  .sub { color:#8fb8d8; letter-spacing:2px; font-size:15px; margin-bottom:22px; }
  .keyrow { color:#cfe7ff; font-size:15px; line-height:1.9; margin:14px 0; }
  .key { display:inline-block; background:rgba(90,180,255,0.16); border:1px solid rgba(120,200,255,0.4);
    border-radius:6px; padding:1px 9px; margin:0 2px; font-weight:700; font-size:13px; }
  .btn { pointer-events:auto; cursor:pointer; margin-top:18px; display:inline-block; padding:14px 44px;
    font-size:20px; font-weight:800; letter-spacing:3px; color:#04101e; border:none; border-radius:12px;
    background:linear-gradient(90deg,#5ad1ff,#8aa9ff); box-shadow:0 0 30px rgba(90,180,255,0.6); transition:transform .08s, box-shadow .2s; }
  .btn:hover { transform:translateY(-2px) scale(1.03); box-shadow:0 0 46px rgba(120,200,255,0.9); }
  .btn:active { transform:translateY(1px) scale(0.99); }
  .cards { display:flex; gap:18px; margin-top:10px; }
  .card { pointer-events:auto; cursor:pointer; width:178px; background:rgba(10,16,36,0.96);
    border:1px solid rgba(120,200,255,0.3); border-radius:14px; padding:20px 16px; transition:transform .1s, border-color .15s, box-shadow .15s; }
  .card:hover { transform:translateY(-6px); border-color:#7ad0ff; box-shadow:0 0 34px rgba(110,200,255,0.55); }
  .card .ic { font-size:40px; margin-bottom:8px; }
  .card .nm { font-size:18px; font-weight:800; color:#eaf6ff; letter-spacing:1px; }
  .card .ds { font-size:13px; color:#9bc3e0; margin-top:8px; line-height:1.5; }
  .card .lv { font-size:11px; color:#ffd36a; margin-top:8px; letter-spacing:1px; font-weight:700; }
  .small { font-size:13px; color:#7fa6c8; margin-top:18px; line-height:1.6; }
  .statline { font-size:17px; color:#bfe0ff; margin:6px 0; }
  .big { font-size:40px; font-weight:800; color:#fff; letter-spacing:2px; margin:4px 0 10px; }
  .gold { color:#ffd36a; }
  .red { color:#ff6a8a; }
  #muteBtn { position:absolute; top:12px; right:14px; z-index:20; pointer-events:auto; cursor:pointer;
    background:rgba(10,16,36,0.7); border:1px solid rgba(120,200,255,0.3); color:#bfe0ff; border-radius:8px;
    padding:6px 12px; font-size:13px; }
  .hidden { display:none !important; }
  #titleScreen, #overScreen { background:
    radial-gradient(ellipse at center, rgba(5,6,15,0.45) 0%, rgba(5,6,15,0.82) 70%, rgba(5,6,15,0.95) 100%),
    url('assets/title.png') center/cover no-repeat; }
  .flash { animation:fadein .25s ease; }
  @keyframes fadein { from{opacity:0; transform:scale(0.96);} to{opacity:1; transform:scale(1);} }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<button id="muteBtn">♪ ON</button>

<!-- TITLE -->
<div class="overlay" id="titleScreen">
  <div class="panel flash">
    <h1>NEON DRIFTER</h1>
    <div class="sub">無限ラウンド・サバイバー / 何ラウンド耐えられる？</div>
    <div class="keyrow">
      移動 <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> / <span class="key">← ↑ ↓ →</span> / マウス
      回避ダッシュ <span class="key">Space</span>（無敵）<br>
      攻撃は<b>全自動</b>。敵を倒し<span class="gold">経験値</span>でレベルアップ → 毎回3つの強化から選択。<br>
      連続キルで<span class="gold">コンボ倍率</span>↑　落ちる<span class="red">♥回復・✸ボム・✪マグネット</span>を拾え。
    </div>
    <button class="btn" id="startBtn">▶ START</button>
    <div class="small">ラウンド4ごとにボス出現。倒すと次ラウンドへ。<br>敵は<span class="red">ラウンドごとに強化</span>される。何ラウンド耐えられる？</div>
  </div>
</div>

<!-- LEVEL UP -->
<div class="overlay hidden" id="levelScreen">
  <div class="panel flash">
    <div class="big">LEVEL UP! <span class="gold" id="luLevel">2</span></div>
    <div class="sub">強化を1つ選べ</div>
    <div class="cards" id="cardRow"></div>
  </div>
</div>

<!-- ROUND CLEAR -->
<div class="overlay hidden" id="roundScreen">
  <div class="panel flash">
    <div class="big gold" id="roundTitle">ROUND 1 CLEAR!</div>
    <div class="statline">次ラウンドへ — 強化を選べ</div>
    <div class="cards" id="roundCardRow"></div>
    <div class="small" id="roundNextInfo"></div>
  </div>
</div>

<!-- GAME OVER -->
<div class="overlay hidden" id="overScreen">
  <div class="panel flash">
    <div class="big" id="overTitle">GAME OVER</div>
    <div class="statline">到達ラウンド <span class="gold" id="overRound">1</span></div>
    <div class="statline">生存時間 <span class="gold" id="overTime">0:00</span></div>
    <div class="statline">撃破数 <span class="gold" id="overKills">0</span></div>
    <div class="statline">スコア <span class="gold" id="overScore">0</span></div>
    <div class="statline" id="overBest"></div>
    <button class="btn" id="retryBtn">↻ RETRY</button>
  </div>
</div>

<script>
// ====================== NEON DRIFTER ======================
// 単一ファイル・依存ゼロのトップダウン・サバイバー
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
function resize(){
  const maxW = Math.min(window.innerWidth, 1100);
  const maxH = Math.min(window.innerHeight, 760);
  W = maxW; H = maxH;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize); resize();

// ---------- Audio (WebAudio synth, swappable with ElevenLabs assets) ----------
const AudioSys = (()=>{
  let actx=null, master=null, musicGain=null, sfxGain=null, muted=false;
  let musicTimer=null, step=0;
  const sfxBuffers={}; // optional: filled by loadSample()
  function init(){
    if(actx) return;
    actx = new (window.AudioContext||window.webkitAudioContext)();
    master = actx.createGain(); master.gain.value=0.9; master.connect(actx.destination);
    musicGain = actx.createGain(); musicGain.gain.value=0.32; musicGain.connect(master);
    sfxGain = actx.createGain(); sfxGain.gain.value=0.55; sfxGain.connect(master);
  }
  function resume(){ if(actx && actx.state==='suspended') actx.resume(); }
  // simple synth tone
  function tone(freq,dur,type='sine',gain=0.4,glideTo=null,dest=sfxGain){
    if(!actx||muted) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq, actx.currentTime);
    if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, actx.currentTime+dur);
    g.gain.setValueAtTime(gain, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    o.connect(g); g.connect(dest||sfxGain); o.start(); o.stop(actx.currentTime+dur+0.02);
  }
  function noise(dur,gain=0.3){
    if(!actx||muted) return;
    const n=actx.createBufferSource();
    const buf=actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    n.buffer=buf;
    const g=actx.createGain(); g.gain.value=gain;
    const f=actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=900;
    n.connect(f); f.connect(g); g.connect(sfxGain); n.start();
  }
  // SFX
  const sfx={
    shoot(){ tone(880,0.08,'square',0.12,1400); },
    hit(){ tone(220,0.07,'sawtooth',0.16,120); },
    kill(){ tone(180,0.12,'triangle',0.22,60); noise(0.12,0.12); },
    bigkill(){ if(!playSample('explosion',0.7)){ tone(120,0.3,'sawtooth',0.4,40); noise(0.4,0.35); } },
    xp(){ tone(1200,0.06,'sine',0.13,1800); },
    levelup(){ if(!playSample('levelup',0.65)){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'triangle',0.25),i*70)); } },
    hurt(){ tone(160,0.18,'sawtooth',0.3,70); noise(0.18,0.25); },
    boss(){ if(!playSample('boss_warning',0.8)){ tone(80,0.6,'sawtooth',0.4,40); noise(0.5,0.3); } },
    win(){ if(!playSample('win_fanfare',0.8)){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'triangle',0.3),i*120)); } },
    pulse(){ tone(440,0.18,'sine',0.1,180); },
    pick(){ tone(700,0.08,'square',0.15,1000); },
    dash(){ if(!playSample('dash',0.5)){ tone(600,0.16,'sine',0.18,1200); noise(0.1,0.08); } },
    powerup(){ if(!playSample('powerup',0.6)){ [660,880,1100].forEach((f,i)=>setTimeout(()=>tone(f,0.1,'triangle',0.2),i*45)); } },
    bomb(){ if(!playSample('bomb',0.85)){ tone(70,0.5,'sawtooth',0.5,30); noise(0.5,0.4); } },
  };
  // procedural synthwave music
  const bassSeq=[55,55,82.4,73.4]; // A,A,E,D-ish
  const arp=[220,277,330,440,330,277];
  let intensity=0;
  function setIntensity(v){ intensity=v; }
  function startMusic(){
    if(!actx||musicTimer) return;
    step=0;
    const tick=()=>{
      if(muted){ musicTimer=setTimeout(tick,150); return; }
      const bi=Math.floor(step/4)%bassSeq.length;
      // bass
      tone(bassSeq[bi],0.22,'square',0.16,null,musicGain);
      // kick
      if(step%2===0) tone(120,0.12,'sine',0.25,40,musicGain);
      // hat
      if(step%2===1) noise(0.03,0.04);
      // arp (denser with intensity)
      if(intensity>0.15 && step%1===0) tone(arp[step%arp.length]*(step%8<4?1:1.5),0.16,'triangle',0.07+0.06*intensity,null,musicGain);
      if(intensity>0.55 && step%2===0) tone(arp[(step+2)%arp.length]*2,0.12,'sawtooth',0.05,null,musicGain);
      step++;
      musicTimer=setTimeout(tick,150 - intensity*22); // tempo rises with intensity
    };
    tick();
  }
  function stopMusic(){ if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; } }
  function toggleMute(){ muted=!muted; if(master&&actx) master.gain.setTargetAtTime(muted?0.0001:0.9, actx.currentTime, 0.05); return muted; }
  function isMuted(){ return muted; }
  // ---- ElevenLabs sample playback ----
  let useSamples=false, samplesReady=false;
  async function loadSample(name,url){
    try{ init(); const r=await fetch(url); const ab=await r.arrayBuffer();
      sfxBuffers[name]=await actx.decodeAudioData(ab); return true; }catch(e){ return false; }
  }
  async function loadAll(){
    init();
    const names={bgm:'assets/bgm.mp3', bgm_boss:'assets/bgm_boss.mp3', levelup:'assets/levelup.mp3',
      explosion:'assets/explosion.mp3', boss_warning:'assets/boss_warning.mp3',
      dash:'assets/dash.mp3', powerup:'assets/powerup.mp3', bomb:'assets/bomb.mp3', win_fanfare:'assets/win_fanfare.mp3'};
    const res=await Promise.all(Object.entries(names).map(([n,u])=>loadSample(n,u)));
    samplesReady = res.filter(Boolean).length>=3 && !!sfxBuffers.bgm;
    useSamples = samplesReady;
    return samplesReady;
  }
  function playSample(name,gain=0.6){
    if(!actx||muted||!sfxBuffers[name]) return false;
    const s=actx.createBufferSource(); s.buffer=sfxBuffers[name];
    const g=actx.createGain(); g.gain.value=gain; s.connect(g); g.connect(sfxGain); s.start(); return true;
  }
  // looping BGM track with crossfade
  let curTrack=null, curSrc=null, curGain=null;
  function startBGM(name){
    if(!actx || !sfxBuffers[name]) return false;
    if(curTrack===name && curSrc) return true;
    const old=curSrc, oldGain=curGain;
    const s=actx.createBufferSource(); s.buffer=sfxBuffers[name]; s.loop=true;
    const g=actx.createGain(); g.gain.setValueAtTime(0.0001,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(muted?0.0001:0.5, actx.currentTime+1.2);
    s.connect(g); g.connect(musicGain); s.start();
    curSrc=s; curGain=g; curTrack=name;
    if(old){ try{ oldGain.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+1.0);
      old.stop(actx.currentTime+1.1); }catch(e){} }
    return true;
  }
  function stopBGM(){ if(curSrc){ try{ curGain.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+0.4); curSrc.stop(actx.currentTime+0.5);}catch(e){} curSrc=null; curTrack=null; } }
  return {init,resume,sfx,startMusic,stopMusic,setIntensity,toggleMute,isMuted,loadSample,playSample,
    loadAll,startBGM,stopBGM, hasSamples:()=>useSamples, curTrack:()=>curTrack};
})();

// ---------- Input ----------
const keys={};
window.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true; if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault(); });
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
let mouse={x:0,y:0,active:false,down:false};
cv.addEventListener('mousemove',e=>{ const r=cv.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; });
cv.addEventListener('mousedown',e=>{ mouse.down=true; mouse.active=true; });
cv.addEventListener('mouseup',()=>{ mouse.down=false; });
cv.addEventListener('contextmenu',e=>{ e.preventDefault(); mouse.dashReq=true; });
let _lastTap=0;
cv.addEventListener('touchstart',e=>{ const now=performance.now(); if(now-_lastTap<280){ mouse.dashReq=true; } _lastTap=now; },{passive:true});
// touch
cv.addEventListener('touchstart',e=>{ mouse.active=true; mouse.down=true; const r=cv.getBoundingClientRect(); const t=e.touches[0]; mouse.x=t.clientX-r.left; mouse.y=t.clientY-r.top; e.preventDefault(); },{passive:false});
cv.addEventListener('touchmove',e=>{ const r=cv.getBoundingClientRect(); const t=e.touches[0]; mouse.x=t.clientX-r.left; mouse.y=t.clientY-r.top; e.preventDefault(); },{passive:false});
cv.addEventListener('touchend',e=>{ mouse.down=false; e.preventDefault(); },{passive:false});

// ---------- Utils ----------
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist2=(a,b)=>{const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy;};
const TAU=Math.PI*2;

// ---------- Game State ----------
let G;
function newGame(){
  G={
    state:'play', // play | levelup | over | win
    time:0, kills:0, score:0,
    player:{ x:W/2, y:H/2, r:13, hp:100, maxhp:100, speed:215, ix:0, iy:0, fx:1, fy:0,
      level:1, xp:0, xpNext:5, invuln:0, flash:0,
      dashCd:0, dashTime:0, dashDirX:1, dashDirY:0, trail:[], dashMax:1.4 },
    weapons:{ // levels per weapon
      shot:{lvl:1, cd:0, rate:0.42, dmg:14, count:1, speed:520, pierce:0},
      orbit:{lvl:0, angle:0, count:0, dmg:10, radius:62},
      pulse:{lvl:0, cd:0, rate:2.6, dmg:18, radius:95},
    },
    stats:{ pickup:78, magnet:0, regen:0, regenAcc:0, dmgMul:1, moveMul:1 },
    enemies:[], bullets:[], gems:[], parts:[], floaters:[], shocks:[], powerups:[], enemyShots:[],
    spawnAcc:0, shake:0, shakeX:0, shakeY:0,
    bossSpawned:false, boss:null, bossEnraged:false, win:false, grdOff:0,
    flashScreen:0, combo:0, comboTimer:0, comboBest:0, banner:null,
    timeScale:1, slowmo:0, hitstop:0,
    // ---- Round system ----
    round:1, roundTime:0, roundDur:55, // seconds per normal round
    isBossRound:false, bossKilled:false,
    roundClearing:false, // waiting for player to pick upgrade
    totalRounds:0,       // highest round reached
    cycle:0,             // how many full 4-round cycles completed (boss every 4 rounds)
    nextSwarm:22,
    stars: Array.from({length:90},()=>({x:rand(0,W),y:rand(0,H),z:rand(0.2,1)})),
  };
}

// ---------- Enemy types ----------
const ETYPES={
  grunt:{ r:12, hp:20, speed:62, dmg:8, xp:1, color:'#ff5d7a', score:10 },
  fast: { r:9,  hp:12, speed:118, dmg:6, xp:1, color:'#ffd24a', score:14 },
  tank: { r:20, hp:70, speed:40, dmg:16, xp:3, color:'#7c5dff', score:30 },
  spit: { r:13, hp:30, speed:50, dmg:0, xp:2, color:'#4ad6c0', score:24, ranged:true },
  split:{ r:16, hp:36, speed:70, dmg:10, xp:2, color:'#ff9a3c', score:28, splitter:true },
  mini: { r:7,  hp:8,  speed:140,dmg:5, xp:1, color:'#ffc46b', score:6 },
  elite:{ r:24, hp:140,speed:58, dmg:20, xp:8, color:'#c46bff', score:120, elite:true },
};
function spawnEnemy(){
  const t=G.time;
  // weighted pick scaling with time
  const roll=Math.random();
  const r=G.round, cy=G.cycle;
  let type='grunt';
  if(r>=2 && roll<0.22+cy*0.03) type='fast';
  if(r>=3 && roll>0.72-cy*0.04) type='tank';
  if(r>=4 && roll>0.38 && roll<0.50) type='split';
  if(r>=5 && roll>0.55 && roll<0.63) type='spit';
  if(r>=6 && roll>0.63 && roll<0.67+cy*0.02) type='elite';
  const base=ETYPES[type];
  // edge spawn
  const side=Math.floor(rand(0,4)); let x,y;
  if(side===0){x=rand(0,W);y=-30;} else if(side===1){x=W+30;y=rand(0,H);}
  else if(side===2){x=rand(0,W);y=H+30;} else {x=-30;y=rand(0,H);}
  const hpScale=1 + G.round*0.18 + G.cycle*0.35; // grows with round & cycle
  G.enemies.push({ type, x,y, r:base.r, hp:base.hp*hpScale, maxhp:base.hp*hpScale,
    speed:base.speed, dmg:base.dmg, xp:base.xp, color:base.color, score:base.score,
    flash:0, ranged:!!base.ranged, splitter:!!base.splitter, elite:!!base.elite, shootcd:rand(1,3), kx:0,ky:0 });
}
function spawnMini(x,y){
  const base=ETYPES.mini;
  G.enemies.push({ type:'mini', x,y, r:base.r, hp:base.hp, maxhp:base.hp, speed:base.speed,
    dmg:base.dmg, xp:base.xp, color:base.color, score:base.score, flash:0, kx:rand(-40,40),ky:rand(-40,40) });
}
function spawnBoss(){
  G.bossSpawned=true; G.isBossRound=true;
  AudioSys.sfx.boss();
  if(AudioSys.hasSamples()) setTimeout(()=>AudioSys.startBGM('bgm_boss'), 900);
  const bossHp = 2600 + G.cycle*1200 + G.round*80;
  const bossSpd = 46 + G.cycle*6;
  const b={ type:'boss', x:W/2, y:-80, r:48+G.cycle*4, hp:bossHp, maxhp:bossHp, speed:bossSpd, dmg:24+G.cycle*4,
    xp:60+G.cycle*20, color:'#ff4d9d', score:1000+G.cycle*500, flash:0, boss:true, ringcd:0, kx:0,ky:0 };
  G.enemies.push(b); G.boss=b;
  addFloater(W/2, H/2-40, 'WARNING — BOSS', '#ff5d7a', 30, 2.2);
  G.flashScreen=0.6;
}

// ---------- Particles / FX ----------
function burst(x,y,color,n,spd){
  for(let i=0;i<n;i++){ const a=rand(0,TAU),s=rand(spd*0.3,spd);
    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(0.3,0.7),max:0.7,color,r:rand(1.5,3.5)}); }
}
function addFloater(x,y,text,color,size,life){ G.floaters.push({x,y,text,color,size:size||14,life:life||0.8,max:life||0.8}); }
function shock(x,y,r,color){ G.shocks.push({x,y,r:0,maxr:r,color,life:0.35,max:0.35}); }
function addShake(v){ G.shake=Math.min(G.shake+v, 22); }

// ---------- Upgrade pool ----------
function upgradePool(){
  const w=G.weapons, s=G.stats;
  const pool=[];
  // weapon: shot
  if(w.shot.lvl<8) pool.push({id:'shot', ic:'✦', nm:'ツインショット', ds:'弾を強化し本数+1', lv:'Lv'+w.shot.lvl+'→'+(w.shot.lvl+1),
    apply:()=>{ w.shot.lvl++; w.shot.count++; w.shot.dmg+=4; w.shot.rate=Math.max(0.16,w.shot.rate*0.9);
      if(w.shot.lvl>=8 && !w.shot.evolved){ w.shot.evolved=true; G.banner={text:'⚡ WEAPON EVOLVED',life:1.6,max:1.6,color:'#9be8ff'}; } }});
  // orbit
  pool.push({id:'orbit', ic:'◓', nm:'オービット', ds:w.orbit.lvl===0?'周囲を回る光球を展開':'光球+1・威力UP', lv:'Lv'+w.orbit.lvl+'→'+(w.orbit.lvl+1),
    apply:()=>{ w.orbit.lvl++; w.orbit.count++; w.orbit.dmg+=5; w.orbit.radius+=4; }});
  // pulse
  pool.push({id:'pulse', ic:'◎', nm:'ノヴァパルス', ds:w.pulse.lvl===0?'周期的な衝撃波を放つ':'範囲と威力を強化', lv:'Lv'+w.pulse.lvl+'→'+(w.pulse.lvl+1),
    apply:()=>{ w.pulse.lvl++; w.pulse.dmg+=8; w.pulse.radius+=22; w.pulse.rate=Math.max(1.1,w.pulse.rate*0.86); }});
  // stats
  pool.push({id:'spd', ic:'»', nm:'スピードブースト', ds:'移動速度+12%', lv:'+',
    apply:()=>{ s.moveMul*=1.12; }});
  pool.push({id:'hp', ic:'♥', nm:'ライフコア', ds:'最大HP+25・全回復', lv:'+',
    apply:()=>{ G.player.maxhp+=25; G.player.hp=G.player.maxhp; }});
  pool.push({id:'reg', ic:'✚', nm:'リジェネ', ds:'毎秒HP回復+1.2', lv:'+',
    apply:()=>{ s.regen+=1.2; }});
  pool.push({id:'mag', ic:'✪', nm:'マグネット', ds:'経験値の吸引範囲を拡大', lv:'+',
    apply:()=>{ s.pickup+=42; s.magnet+=1; }});
  pool.push({id:'pow', ic:'★', nm:'パワーアンプ', ds:'全ダメージ+15%', lv:'+',
    apply:()=>{ s.dmgMul*=1.15; }});
  // pick 3 distinct
  const picks=[]; const copy=pool.slice();
  while(picks.length<3 && copy.length){ picks.push(copy.splice(Math.floor(Math.random()*copy.length),1)[0]); }
  return picks;
}

// ---------- Level up flow ----------
function doLevelUp(){

// ---------- Weapons fire ----------
function fireWeapons(dt){
  const p=G.player, w=G.weapons;
  // SHOT: target nearest enemy
  w.shot.cd-=dt;
  if(w.shot.cd<=0 && G.enemies.length){
    w.shot.cd=w.shot.rate;
    let near=null,nd=1e9;
    for(const e of G.enemies){ const d=dist2(e,p); if(d<nd){nd=d;near=e;} }
    if(near){
      const baseA=Math.atan2(near.y-p.y, near.x-p.x);
      const n=w.shot.count;
      const dirs = w.shot.evolved ? [baseA, baseA+Math.PI] : [baseA]; // evolved: also fire backward
      for(const dA of dirs){ for(let i=0;i<n;i++){
        const spread=(i-(n-1)/2)*0.16;
        const a=dA+spread;
        G.bullets.push({x:p.x,y:p.y,vx:Math.cos(a)*w.shot.speed,vy:Math.sin(a)*w.shot.speed,
          r:5,dmg:w.shot.dmg*G.stats.dmgMul,life:1.4,pierce:w.shot.pierce,hit:new Set()});
      } }
      AudioSys.sfx.shoot();
    }
  }
  // PULSE
  if(w.pulse.lvl>0){
    w.pulse.cd-=dt;
    if(w.pulse.cd<=0){
      w.pulse.cd=w.pulse.rate;
      const R=w.pulse.radius;
      shock(p.x,p.y,R,'#5ad1ff'); AudioSys.sfx.pulse();
      for(const e of G.enemies){ if(dist2(e,p)<(R+e.r)*(R+e.r)){ damageEnemy(e, w.pulse.dmg*G.stats.dmgMul, p); } }
    }
  }
}
function damageEnemy(e,dmg,from){
  e.hp-=dmg; e.flash=0.12;
  addFloater(e.x+rand(-6,6), e.y-e.r-4, Math.round(dmg), e.boss?'#fff':'#ffe08a', e.boss?16:13, 0.6);
  if(from){ const a=Math.atan2(e.y-from.y,e.x-from.x); const kb=e.boss?6:(e.type==='tank'?10:26); e.kx+=Math.cos(a)*kb; e.ky+=Math.sin(a)*kb; }
  AudioSys.sfx.hit();
  if(e.hp<=0) killEnemy(e);
}
function killEnemy(e){
  e.dead=true; G.kills++;
  // combo
  G.combo++; G.comboTimer=2.6; if(G.combo>G.comboBest)G.comboBest=G.combo;
  const mult=1+Math.min(G.combo,30)*0.1;
  G.score+=Math.round(e.score*mult);
  if(G.combo>0 && G.combo%10===0){ G.banner={text:G.combo+' COMBO!',life:1.1,max:1.1,color:'#ffd36a'}; }
  burst(e.x,e.y,e.color,e.boss?40:(e.elite?22:10),e.boss?260:(e.elite?220:170));
  addShake(e.boss?16:(e.elite?7:2.5));
  if(e.boss||e.elite) AudioSys.sfx.bigkill(); else AudioSys.sfx.kill();
  // splitter spawns minis
  if(e.splitter){ for(let i=0;i<2;i++) spawnMini(e.x+rand(-10,10),e.y+rand(-10,10)); }
  // drop xp gems
  const drops=e.boss?24:(e.xp);
  for(let i=0;i<drops;i++){ G.gems.push({x:e.x+rand(-e.r,e.r),y:e.y+rand(-e.r,e.r),vx:rand(-60,60),vy:rand(-60,60),r:4,val:1,life:18}); }
  // powerup drops
  if(e.boss){ dropPowerup(e.x-30,e.y,'heart'); dropPowerup(e.x+30,e.y,'bomb');
    G.hitstop=0.12; G.slowmo=1.4; G.timeScale=0.18; G.flashScreen=0.8;
    G.bossKilled=true; }
  else if(e.elite){ G.hitstop=0.05; dropPowerup(e.x,e.y, Math.random()<0.5?'heart':'bomb'); }
  else if(Math.random()<0.018){ dropPowerup(e.x,e.y, ['heart','bomb','magnet'][Math.floor(rand(0,3))]); }
}
function dropPowerup(x,y,kind){ G.powerups.push({x,y,kind,r:13,life:14,bob:rand(0,TAU)}); }

function triggerRoundClear(){
  G.roundClearing=true; G.state='roundclear';
  AudioSys.sfx.win(); AudioSys.stopBGM(); AudioSys.stopMusic();
  const isBoss=(G.round%4===0);
  document.getElementById('roundTitle').textContent=
    (isBoss?'★ BOSS CLEARED! ★':'ROUND '+G.round+' CLEAR!');
  const nextRound=G.round+1;
  const nextIsBoss=(nextRound%4===0);
  document.getElementById('roundNextInfo').innerHTML=
    '次: ラウンド '+nextRound+(nextIsBoss?' <span style="color:#ff6a8a">⚠ BOSS ROUND</span>':'');
  // show upgrade cards
  const row=document.getElementById('roundCardRow'); row.innerHTML='';
  const picks=upgradePool();
  picks.forEach(pck=>{
    const el=document.createElement('div'); el.className='card';
    el.innerHTML=`<div class="ic">${pck.ic}</div><div class="nm">${pck.nm}</div><div class="ds">${pck.ds}</div><div class="lv">${pck.lv}</div>`;
    el.onclick=()=>{ AudioSys.sfx.pick(); pck.apply(); startNextRound(); };
    row.appendChild(el);
  });

}

function startNextRound(){
  document.getElementById('roundScreen').classList.add('hidden');
  G.round++;
  if(G.round%4===1 && G.round>1) G.cycle++; // new cycle after every boss
  G.roundTime=0; G.roundDur=Math.max(35, 55-G.round*1.5); // rounds get shorter over time
  G.spawnAcc=0; G.nextSwarm=rand(12,20);
  G.enemies=[]; G.bullets=[]; G.enemyShots=[]; G.powerups=[];
  G.bossSpawned=false; G.bossKilled=false; G.bossEnraged=false; G.boss=null; G.isBossRound=false;
  G.roundClearing=false; G.state='play';
  G.player.invuln=1.5; // brief grace period
  G.combo=0; G.comboTimer=0;
  const isBoss=(G.round%4===0);
  G.banner={text:'ROUND '+G.round+(isBoss?' — BOSS INCOMING!':''),life:2.2,max:2.2,color:isBoss?'#ff6a8a':'#9be8ff'};
  if(AudioSys.hasSamples()) AudioSys.startBGM(isBoss?'bgm_boss':'bgm');
  else AudioSys.startMusic();
}
function useBomb(){
  AudioSys.sfx.bomb(); addShake(18); G.flashScreen=0.7; shock(G.player.x,G.player.y,Math.max(W,H),'#ffd36a');
  for(const e of G.enemies){ if(e.boss){ damageEnemy(e,400,G.player); } else { e.hp=0; killEnemy(e); } }
  G.enemyShots=[];
}

// ---------- Update ----------
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  if(G && G.state==='play'){
    // hit-stop: brief full freeze for impact
    if(G.hitstop>0){ G.hitstop-=dt; }
    else {
      // slow-motion easing (boss kill climax)
      if(G.slowmo>0){ G.slowmo-=dt; G.timeScale += (0.25-G.timeScale)*Math.min(1,dt*8); }
      else { G.timeScale += (1-G.timeScale)*Math.min(1,dt*4); }
      update(dt*G.timeScale);
    }
  }
  render();
  requestAnimationFrame(loop);
}
function update(dt){
  G.time+=dt;
  const p=G.player;
  // intensity for music
  AudioSys.setIntensity(clamp(G.time/140 + G.enemies.length/60,0,1));

  // ---- movement ----
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my-=1;
  if(keys['s']||keys['arrowdown'])my+=1;
  if(keys['a']||keys['arrowleft'])mx-=1;
  if(keys['d']||keys['arrowright'])mx+=1;
  if(mx===0&&my===0&&mouse.down){ // mouse steering
    const dx=mouse.x-p.x, dy=mouse.y-p.y, d=Math.hypot(dx,dy);
    if(d>6){ mx=dx/d; my=dy/d; }
  }
  const moving = !(mx===0&&my===0);
  const ml=Math.hypot(mx,my)||1; mx/=ml; my/=ml;
  if(moving){ p.fx=mx; p.fy=my; } // last facing
  // dash
  p.dashCd-=dt;
  const wantDash = keys[' ']||keys['shift']||mouse.dashReq;
  if(wantDash && p.dashCd<=0 && p.dashTime<=0){
    p.dashTime=0.16; p.dashCd=p.dashMax; p.invuln=Math.max(p.invuln,0.28);
    p.dashDirX = moving?mx:p.fx; p.dashDirY = moving?my:p.fy;
    AudioSys.sfx.dash(); burst(p.x,p.y,'#9fe8ff',8,180);
  }
  mouse.dashReq=false;
  let sp=p.speed*G.stats.moveMul;
  if(p.dashTime>0){ p.dashTime-=dt; sp=p.speed*5.2;
    p.x=clamp(p.x+p.dashDirX*sp*dt, p.r, W-p.r);
    p.y=clamp(p.y+p.dashDirY*sp*dt, p.r, H-p.r);
    p.trail.push({x:p.x,y:p.y,life:0.3});
  } else {
    p.x=clamp(p.x+mx*sp*dt, p.r, W-p.r);
    p.y=clamp(p.y+my*sp*dt, p.r, H-p.r);
  }
  for(const t of p.trail)t.life-=dt; p.trail=p.trail.filter(t=>t.life>0);
  p.ix=mx; p.iy=my;
  if(p.invuln>0)p.invuln-=dt;
  if(p.flash>0)p.flash-=dt;
  // combo decay
  if(G.comboTimer>0){ G.comboTimer-=dt; if(G.comboTimer<=0)G.combo=0; }
  if(G.banner){ G.banner.life-=dt; if(G.banner.life<=0)G.banner=null; }
  // starfield drift
  for(const s of G.stars){ s.y+=(8+s.z*20)*dt; if(s.y>H){s.y=0;s.x=rand(0,W);} }
  // regen
  if(G.stats.regen>0 && p.hp<p.maxhp){ G.stats.regenAcc+=G.stats.regen*dt; if(G.stats.regenAcc>=1){ const h=Math.floor(G.stats.regenAcc); p.hp=Math.min(p.maxhp,p.hp+h); G.stats.regenAcc-=h; } }

  // ---- Round progression ----
  G.roundTime+=dt;
  const isBoss = (G.round % 4 === 0); // every 4th round is boss round
  if(!isBoss){
    // Normal round: spawn enemies, advance time
    G.spawnAcc+=dt;
    const baseRate=clamp(0.82 - G.round*0.028 - G.cycle*0.06, 0.14, 0.82);
    while(G.spawnAcc>baseRate){ G.spawnAcc-=baseRate; if(G.enemies.length<260) spawnEnemy(); }
    // Swarm event
    if(G.roundTime>=G.nextSwarm && G.nextSwarm<G.roundDur-8){
      G.nextSwarm=G.roundDur; // only once per round
      G.banner={text:'⚠ SWARM INCOMING',life:1.4,max:1.4,color:'#ffb04a'};
      AudioSys.sfx.boss();
      const n=10+G.round*2+G.cycle*3, cx=p.x, cy=p.y, R=Math.max(W,H)*0.58;
      const hpsc=1+G.round*0.18+G.cycle*0.35;
      for(let i=0;i<n;i++){ const a=i*TAU/n+rand(-0.1,0.1);
        const ex=clamp(cx+Math.cos(a)*R,-20,W+20),ey=clamp(cy+Math.sin(a)*R,-20,H+20);
        const base=ETYPES.fast; G.enemies.push({type:'fast',x:ex,y:ey,r:base.r,hp:base.hp*hpsc,maxhp:base.hp*hpsc,
          speed:base.speed*(1.1+G.round*0.04),dmg:base.dmg,xp:base.xp,color:'#ffb04a',score:base.score,flash:0,kx:0,ky:0}); }
    }
    // Round time up → clear
    if(G.roundTime>=G.roundDur && !G.roundClearing){ triggerRoundClear(); }
  } else {
    // Boss round: spawn boss if not yet, wait for kill
    if(!G.bossSpawned){ spawnBoss(); }
    if(G.bossKilled && !G.roundClearing){ triggerRoundClear(); }
  }

  // ---- weapons ----
  fireWeapons(dt);
  // orbit weapon
  const w=G.weapons;
  if(w.orbit.count>0){
    w.orbit.angle+=dt*2.6;
    for(let i=0;i<w.orbit.count;i++){
      const a=w.orbit.angle + i*TAU/w.orbit.count;
      const ox=p.x+Math.cos(a)*w.orbit.radius, oy=p.y+Math.sin(a)*w.orbit.radius;
      for(const e of G.enemies){ if(dist2(e,{x:ox,y:oy})<(e.r+9)*(e.r+9)){
        if(!e._orbCd||e._orbCd<=0){ damageEnemy(e, w.orbit.dmg*G.stats.dmgMul, p); e._orbCd=0.25; } } }
    }
  }
  for(const e of G.enemies){ if(e._orbCd>0)e._orbCd-=dt; }

  // ---- bullets ----
  for(const b of G.bullets){
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    for(const e of G.enemies){
      if(e.dead||b.hit.has(e)) continue;
      if(dist2(b,e)<(b.r+e.r)*(b.r+e.r)){
        damageEnemy(e,b.dmg,b); b.hit.add(e);
        burst(b.x,b.y,'#bfe6ff',3,120);
        if(b.pierce>0){ b.pierce--; } else { b.life=0; break; }
      }
    }
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20) b.life=0;
  }
  G.bullets=G.bullets.filter(b=>b.life>0);

  // ---- enemies ----
  for(const e of G.enemies){
    if(e.dead) continue;
    // separation-ish + chase
    const dx=p.x-e.x, dy=p.y-e.y, d=Math.hypot(dx,dy)||1;
    let tx=dx/d, ty=dy/d;
    e.x+=tx*e.speed*dt + e.kx*dt; e.y+=ty*e.speed*dt + e.ky*dt;
    e.kx*=0.86; e.ky*=0.86;
    if(e.flash>0)e.flash-=dt;
    // ranged spit
    if(e.ranged){ e.shootcd-=dt; if(e.shootcd<=0 && d<420){ e.shootcd=rand(2.2,3.4);
      const a=Math.atan2(dy,dx); G.bullets2=G.bullets2||[];
      G.enemyShots=G.enemyShots||[];
      G.enemyShots.push({x:e.x,y:e.y,vx:Math.cos(a)*220,vy:Math.sin(a)*220,r:6,dmg:10,life:3}); } }
    // boss attacks (2 phases)
    if(e.boss){
      if(!G.bossEnraged && e.hp < e.maxhp*0.5){ G.bossEnraged=true; e.speed*=1.7; e.color='#ff2d6d';
        G.banner={text:'BOSS ENRAGED!',life:1.6,max:1.6,color:'#ff4d6d'}; G.flashScreen=0.6; addShake(16); AudioSys.sfx.boss(); }
      e.ringcd-=dt;
      if(e.ringcd<=0){ e.ringcd=G.bossEnraged?1.5:2.4;
        const n=G.bossEnraged?26:18, spd=G.bossEnraged?210:170;
        for(let i=0;i<n;i++){ const a=i*TAU/n + G.time*(G.bossEnraged?1.3:1); G.enemyShots.push({x:e.x,y:e.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:7,dmg:12,life:4}); }
        shock(e.x,e.y,90,e.color);
      }
      // enraged: aimed burst
      if(G.bossEnraged){ e.aimcd=(e.aimcd||0)-dt; if(e.aimcd<=0){ e.aimcd=0.9;
        const a=Math.atan2(p.y-e.y,p.x-e.x); for(let k=-1;k<=1;k++){ const aa=a+k*0.18;
          G.enemyShots.push({x:e.x,y:e.y,vx:Math.cos(aa)*300,vy:Math.sin(aa)*300,r:6,dmg:14,life:3,color:'#ff6a3c'}); } } }
    }
    // contact damage
    if(dist2(e,p)<(e.r+p.r)*(e.r+p.r) && p.invuln<=0){
      p.hp-=e.dmg; p.invuln=0.7; p.flash=0.25; addShake(6); G.flashScreen=Math.max(G.flashScreen,0.35);
      AudioSys.sfx.hurt();
      const a=Math.atan2(p.y-e.y,p.x-e.x); p.x+=Math.cos(a)*14; p.y+=Math.sin(a)*14;
      if(p.hp<=0){ gameOver(false); return; }
    }
  }
  G.enemies=G.enemies.filter(e=>!e.dead);

  // ---- enemy shots ----
  if(G.enemyShots){
    for(const s of G.enemyShots){ s.x+=s.vx*dt; s.y+=s.vy*dt; s.life-=dt;
      if(dist2(s,p)<(s.r+p.r)*(s.r+p.r) && p.invuln<=0){ p.hp-=s.dmg; p.invuln=0.6; p.flash=0.25; addShake(5); G.flashScreen=Math.max(G.flashScreen,0.3); AudioSys.sfx.hurt(); s.life=0; if(p.hp<=0){gameOver(false);return;} }
    }
    G.enemyShots=G.enemyShots.filter(s=>s.life>0 && s.x>-30&&s.x<W+30&&s.y>-30&&s.y<H+30);
  }

  // ---- gems ----
  const pr=G.stats.pickup;
  for(const g of G.gems){
    g.life-=dt;
    const dx=p.x-g.x, dy=p.y-g.y, d=Math.hypot(dx,dy)||1;
    if(d<pr){ const pull=clamp((pr-d)/pr,0,1)*620 + 60; g.x+=dx/d*pull*dt; g.y+=dy/d*pull*dt; }
    else { g.x+=g.vx*dt; g.y+=g.vy*dt; g.vx*=0.9; g.vy*=0.9; }
    if(d<p.r+6){ g.dead=true; gainXP(g.val); }
  }
  G.gems=G.gems.filter(g=>!g.dead && g.life>0);

  // ---- powerups ----
  for(const pu of G.powerups){
    pu.life-=dt; pu.bob+=dt*4;
    if(dist2(pu,p)<(p.r+pu.r+4)*(p.r+pu.r+4)){
      pu.dead=true; AudioSys.sfx.powerup();
      if(pu.kind==='heart'){ p.hp=Math.min(p.maxhp,p.hp+30); addFloater(p.x,p.y-20,'+30 HP','#ff6a8a',16,1); }
      else if(pu.kind==='bomb'){ addFloater(p.x,p.y-20,'BOMB!','#ffd36a',18,1); useBomb(); }
      else if(pu.kind==='magnet'){ addFloater(p.x,p.y-20,'MAGNET','#7CFFB2',16,1); for(const g of G.gems){ const dx=p.x-g.x,dy=p.y-g.y,d=Math.hypot(dx,dy)||1; g.vx=dx/d*900; g.vy=dy/d*900; } G.stats._magnetBoost=1.2; }
    }
  }
  G.powerups=G.powerups.filter(pu=>!pu.dead && pu.life>0);

  // ---- fx ----
  for(const pt of G.parts){ pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vx*=0.92; pt.vy*=0.92; pt.life-=dt; }
  G.parts=G.parts.filter(p=>p.life>0);
  for(const f of G.floaters){ f.y-=24*dt; f.life-=dt; }
  G.floaters=G.floaters.filter(f=>f.life>0);
  for(const s of G.shocks){ s.r+=(s.maxr-s.r)*Math.min(1,dt*14); s.life-=dt; }
  G.shocks=G.shocks.filter(s=>s.life>0);
  // shake decay
  G.shake*=0.86; G.shakeX=rand(-1,1)*G.shake; G.shakeY=rand(-1,1)*G.shake;
  if(G.flashScreen>0)G.flashScreen-=dt*1.6;

  // win check
  if(G.win){ gameOver(true); }
}
function gainXP(v){
  const p=G.player; p.xp+=v; AudioSys.sfx.xp();
  while(p.xp>=p.xpNext){
    p.xp-=p.xpNext; p.level++;
    p.xpNext=Math.floor(5 + p.level*p.level*1.15 + p.level*3);
    doLevelUp();
  }
}
function gameOver(win){
  if(G.state==='over'||G.state==='win') return;
  G.state='over';
  AudioSys.stopMusic(); AudioSys.stopBGM();
  const bestScore=Math.max(G.score, +(localStorage.getItem('nd_best')||0));
  const bestRound=Math.max(G.round, +(localStorage.getItem('nd_best_round')||0));
  localStorage.setItem('nd_best', bestScore);
  localStorage.setItem('nd_best_round', bestRound);
  document.getElementById('overTitle').textContent='GAME OVER';
  document.getElementById('overTitle').className='big red';
  document.getElementById('overRound').textContent='R'+G.round+(G.round===bestRound?' 🏆':'');
  const m=Math.floor(G.time/60), s=Math.floor(G.time%60);
  document.getElementById('overTime').textContent=m+':'+String(s).padStart(2,'0');
  document.getElementById('overKills').textContent=G.kills;
  document.getElementById('overScore').textContent=G.score.toLocaleString();
  document.getElementById('overBest').innerHTML='ベスト: R'+bestRound+' / スコア <span class="gold">'+bestScore.toLocaleString()+'</span>';
  document.getElementById('overScreen').classList.remove('hidden');
}

// ---------- Render ----------
function render(){
  ctx.save();
  ctx.clearRect(0,0,W,H);
  // background grid
  ctx.fillStyle='#05060f'; ctx.fillRect(0,0,W,H);
  ctx.save();
  if(G) ctx.translate(G.shakeX,G.shakeY);
  drawGrid();
  if(!G){ ctx.restore(); ctx.restore(); return; }

  // shocks (under)
  for(const s of G.shocks){ ctx.globalAlpha=s.life/s.max*0.6; ctx.strokeStyle=s.color; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.stroke(); }
  ctx.globalAlpha=1;

  // gems
  for(const g of G.gems){ ctx.fillStyle='#7CFFB2'; ctx.shadowColor='#7CFFB2'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(g.x,g.y-5); ctx.lineTo(g.x+4,g.y); ctx.lineTo(g.x,g.y+5); ctx.lineTo(g.x-4,g.y); ctx.closePath(); ctx.fill(); }
  ctx.shadowBlur=0;

  // enemy shots
  if(G.enemyShots) for(const s of G.enemyShots){ ctx.fillStyle='#ff7ad0'; ctx.shadowColor='#ff4d9d'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fill(); }
  ctx.shadowBlur=0;

  // enemies
  for(const e of G.enemies){
    const col=e.flash>0?'#ffffff':e.color;
    ctx.shadowColor=e.color; ctx.shadowBlur=e.boss?28:12;
    ctx.fillStyle=col;
    if(e.boss){ drawDiamond(e.x,e.y,e.r); }
    else if(e.elite){ ctx.shadowBlur=22; drawStar(e.x,e.y,e.r,5); }
    else if(e.type==='tank'){ ctx.fillRect(e.x-e.r,e.y-e.r,e.r*2,e.r*2); }
    else if(e.type==='split'){ drawPoly(e.x,e.y,e.r,6); }
    else if(e.type==='fast'||e.type==='mini'){ drawTri(e.x,e.y,e.r); }
    else { ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,TAU); ctx.fill(); }
    ctx.shadowBlur=0;
    // hp bar for big
    if((e.boss||e.type==='tank') && e.hp<e.maxhp){ const wbar=e.boss?100:e.r*2;
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(e.x-wbar/2,e.y-e.r-9,wbar,4);
      ctx.fillStyle=e.boss?'#ff4d9d':'#ff8a8a'; ctx.fillRect(e.x-wbar/2,e.y-e.r-9,wbar*(e.hp/e.maxhp),4); }
  }

  // orbit weapon
  const w=G.weapons, p=G.player;
  if(w.orbit.count>0){ for(let i=0;i<w.orbit.count;i++){ const a=w.orbit.angle+i*TAU/w.orbit.count;
    const ox=p.x+Math.cos(a)*w.orbit.radius, oy=p.y+Math.sin(a)*w.orbit.radius;
    ctx.fillStyle='#9be8ff'; ctx.shadowColor='#5ad1ff'; ctx.shadowBlur=16;
    ctx.beginPath(); ctx.arc(ox,oy,8,0,TAU); ctx.fill(); } ctx.shadowBlur=0; }

  // powerups
  for(const pu of G.powerups){ const yy=pu.y+Math.sin(pu.bob)*3; const blink=pu.life<3 && Math.floor(pu.life*8)%2===0;
    if(blink) continue;
    const c = pu.kind==='heart'?'#ff5d7a':pu.kind==='bomb'?'#ffd36a':'#7CFFB2';
    ctx.shadowColor=c; ctx.shadowBlur=16; ctx.fillStyle='rgba(8,12,28,0.85)';
    ctx.beginPath(); ctx.arc(pu.x,yy,pu.r,0,TAU); ctx.fill();
    ctx.strokeStyle=c; ctx.lineWidth=2; ctx.stroke();
    ctx.shadowBlur=0; ctx.fillStyle=c; ctx.font='800 16px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(pu.kind==='heart'?'♥':pu.kind==='bomb'?'✸':'✪', pu.x, yy+1);
    ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  }
  ctx.shadowBlur=0;

  // bullets
  for(const b of G.bullets){ ctx.fillStyle='#dff3ff'; ctx.shadowColor='#5ad1ff'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,TAU); ctx.fill();
    ctx.globalAlpha=0.4; ctx.beginPath(); ctx.arc(b.x-b.vx*0.012,b.y-b.vy*0.012,b.r*0.7,0,TAU); ctx.fill(); ctx.globalAlpha=1; }
  ctx.shadowBlur=0;

  // player
  drawPlayer();

  // particles
  for(const pt of G.parts){ ctx.globalAlpha=clamp(pt.life/pt.max,0,1); ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,TAU); ctx.fill(); }
  ctx.globalAlpha=1;

  // floaters
  for(const f of G.floaters){ ctx.globalAlpha=clamp(f.life/f.max,0,1); ctx.fillStyle=f.color;
    ctx.font='800 '+f.size+'px Segoe UI'; ctx.textAlign='center';
    ctx.shadowColor='#000'; ctx.shadowBlur=4; ctx.fillText(f.text,f.x,f.y); ctx.shadowBlur=0; }
  ctx.globalAlpha=1; ctx.textAlign='left';

  ctx.restore(); // shake

  // slow-motion tint (boss-kill climax)
  if(G.timeScale<0.85){ ctx.fillStyle='rgba(90,140,255,'+clamp((0.85-G.timeScale)*0.25,0,0.18)+')'; ctx.fillRect(0,0,W,H); }
  // screen flash (damage)
  if(G.flashScreen>0){ ctx.fillStyle='rgba(255,60,100,'+clamp(G.flashScreen*0.5,0,0.5)+')'; ctx.fillRect(0,0,W,H); }
  // low-HP adrenaline vignette (pulsing red border)
  const hpr=G.player.hp/G.player.maxhp;
  if(hpr<0.3 && G.player.hp>0){ const pulse=0.35+0.25*Math.sin(G.time*8);
    const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.62);
    vg.addColorStop(0,'rgba(255,40,70,0)'); vg.addColorStop(1,'rgba(255,30,60,'+(pulse*(0.3-hpr)/0.3).toFixed(3)+')');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H); }

  drawHUD();
  ctx.restore();
}
const bgImg=new Image(); let bgReady=false;
bgImg.onload=()=>{ bgReady=true; }; bgImg.src='assets/title.png';
function drawGrid(){
  const t=G?G.time:0;
  // AI-generated synthwave backdrop (dimmed, cover-fit)
  if(bgReady){ const ir=bgImg.width/bgImg.height, cr=W/H; let dw,dh,dx,dy;
    if(ir>cr){ dh=H; dw=H*ir; } else { dw=W; dh=W/ir; }
    dx=(W-dw)/2; dy=(H-dh)/2;
    ctx.globalAlpha=0.22; ctx.drawImage(bgImg,dx,dy,dw,dh); ctx.globalAlpha=1;
    ctx.fillStyle='rgba(5,6,15,0.35)'; ctx.fillRect(0,0,W,H);
  }
  // starfield
  if(G&&G.stars){ for(const s of G.stars){ ctx.globalAlpha=0.15+s.z*0.5; ctx.fillStyle= s.z>0.7?'#9fd8ff':'#5878b8';
    ctx.fillRect(s.x,s.y,s.z*2,s.z*2); } ctx.globalAlpha=1; }
  const off=(t*22)% 44;
  ctx.strokeStyle='rgba(60,120,220,0.10)'; ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=-44+ (off%44); x<W; x+=44){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
  for(let y=-44+ (off%44); y<H; y+=44){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
  ctx.stroke();
  // vignette glow center
  const g=ctx.createRadialGradient(W/2,H/2,40,W/2,H/2,Math.max(W,H)*0.7);
  g.addColorStop(0,'rgba(30,60,140,0.06)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
function drawPlayer(){
  const p=G.player;
  // dash afterimages
  for(const t of p.trail){ ctx.globalAlpha=t.life/0.3*0.5; ctx.fillStyle='#5ad1ff';
    ctx.beginPath(); ctx.arc(t.x,t.y,8,0,TAU); ctx.fill(); }
  ctx.globalAlpha=1;
  const blink = p.invuln>0 && (Math.floor(p.invuln*20)%2===0);
  ctx.save();
  ctx.translate(p.x,p.y);
  const ang=Math.atan2(p.iy,p.ix);
  if(p.ix||p.iy) ctx.rotate(ang);
  ctx.shadowColor='#5ad1ff'; ctx.shadowBlur=20;
  ctx.fillStyle=p.flash>0?'#fff':(blink?'#9fd8ff':'#5ad1ff');
  // ship triangle
  ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-11,9); ctx.lineTo(-6,0); ctx.lineTo(-11,-9); ctx.closePath(); ctx.fill();
  ctx.restore();
  // core
  ctx.shadowBlur=0;
  ctx.fillStyle='#eaf9ff'; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,TAU); ctx.fill();
  // pickup radius faint
  ctx.globalAlpha=0.06; ctx.strokeStyle='#7CFFB2'; ctx.beginPath(); ctx.arc(p.x,p.y,G.stats.pickup,0,TAU); ctx.stroke(); ctx.globalAlpha=1;
}
function drawDiamond(x,y,r){ ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r,y); ctx.lineTo(x,y+r); ctx.lineTo(x-r,y); ctx.closePath(); ctx.fill(); }
function drawTri(x,y,r){ ctx.beginPath(); ctx.moveTo(x,y-r); ctx.lineTo(x+r*0.9,y+r*0.7); ctx.lineTo(x-r*0.9,y+r*0.7); ctx.closePath(); ctx.fill(); }
function drawPoly(x,y,r,n){ ctx.beginPath(); for(let i=0;i<n;i++){ const a=-Math.PI/2+i*TAU/n; const px=x+Math.cos(a)*r, py=y+Math.sin(a)*r; i?ctx.lineTo(px,py):ctx.moveTo(px,py);} ctx.closePath(); ctx.fill(); }
function drawStar(x,y,r,n){ ctx.beginPath(); for(let i=0;i<n*2;i++){ const rr=i%2?r*0.45:r; const a=-Math.PI/2+i*Math.PI/n; const px=x+Math.cos(a)*rr, py=y+Math.sin(a)*rr; i?ctx.lineTo(px,py):ctx.moveTo(px,py);} ctx.closePath(); ctx.fill(); }

function drawHUD(){
  const p=G.player;
  // top bar bg
  // HP bar
  const bw=Math.min(W-180,320);
  ctx.fillStyle='rgba(8,14,30,0.7)'; roundRect(16,14,bw,22,6); ctx.fill();
  ctx.fillStyle='#ff5d7a'; const hpw=(bw-4)*clamp(p.hp/p.maxhp,0,1); roundRect(18,16,hpw,18,5); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='700 13px Segoe UI'; ctx.textAlign='left';
  ctx.fillText('HP '+Math.max(0,Math.ceil(p.hp))+' / '+p.maxhp, 24, 30);
  // XP bar (under)
  ctx.fillStyle='rgba(8,14,30,0.7)'; roundRect(16,42,bw,12,4); ctx.fill();
  ctx.fillStyle='#7CFFB2'; const xpw=(bw-4)*clamp(p.xp/p.xpNext,0,1); roundRect(18,44,xpw,8,3); ctx.fill();
  ctx.fillStyle='#bfe0ff'; ctx.font='700 12px Segoe UI'; ctx.fillText('LV '+p.level, 16, 70);
  // Round info center
  const isBossR=(G.round%4===0);
  const timeLeft=Math.max(0, G.roundDur-G.roundTime);
  ctx.textAlign='center'; ctx.fillStyle='#eaf6ff'; ctx.font='800 22px Segoe UI';
  ctx.fillText('ROUND '+G.round, W/2, 32);
  ctx.font='600 12px Segoe UI';
  if(isBossR){ ctx.fillStyle=G.bossSpawned?'#ff6a8a':'#ffb04a';
    ctx.fillText(G.bossSpawned?'BOSS':'BOSS INCOMING', W/2, 50); }
  else { ctx.fillStyle='#7fa6c8';
    const rs=Math.floor(timeLeft%60); const rm=Math.floor(timeLeft/60);
    ctx.fillText(rm>0?rm+'m'+rs+'s':rs+'s残り', W/2, 50); }
  // round progress bar
  if(!isBossR){ const rw=160, rx=W/2-rw/2;
    ctx.fillStyle='rgba(8,14,30,0.6)'; roundRect(rx,54,rw,5,3); ctx.fill();
    ctx.fillStyle='#5ad1ff'; roundRect(rx,54,rw*clamp(G.roundTime/G.roundDur,0,1),5,3); ctx.fill(); }
  // score / kills right
  ctx.textAlign='right'; ctx.fillStyle='#ffd36a'; ctx.font='800 20px Segoe UI';
  ctx.fillText(G.score.toLocaleString(), W-16, 32);
  ctx.fillStyle='#9bc3e0'; ctx.font='600 12px Segoe UI';
  ctx.fillText('KILLS '+G.kills, W-16, 50);
  // combo
  if(G.combo>1){ const a=clamp(G.comboTimer/2.6,0.3,1); ctx.globalAlpha=a;
    const sz=18+Math.min(G.combo,30)*0.7; ctx.fillStyle='#ffd36a'; ctx.font='800 '+sz+'px Segoe UI';
    ctx.fillText('x'+G.combo, W-16, 76); ctx.globalAlpha=1;
    ctx.fillStyle='#7fa6c8'; ctx.font='600 10px Segoe UI'; ctx.fillText('COMBO', W-16, 90); }
  ctx.textAlign='left';
  // dash indicator (bottom-left)
  const p2=G.player; const ready=p2.dashCd<=0;
  ctx.fillStyle=ready?'#5ad1ff':'rgba(90,130,180,0.4)'; ctx.font='700 12px Segoe UI';
  ctx.fillText(ready?'⮕ DASH READY [Space]':'⮕ dash '+Math.max(0,p2.dashCd).toFixed(1)+'s', 16, H-16);
  // center banner
  if(G.banner){ const b=G.banner; const a=clamp(b.life/b.max,0,1); ctx.globalAlpha=a;
    ctx.textAlign='center'; ctx.fillStyle=b.color; ctx.font='800 '+(34+(1-a)*16)+'px Segoe UI';
    ctx.shadowColor=b.color; ctx.shadowBlur=20; ctx.fillText(b.text, W/2, H*0.32); ctx.shadowBlur=0;
    ctx.globalAlpha=1; ctx.textAlign='left'; }
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ---------- Boot ----------
let _audioLoaded=false;
function startGame(){
  AudioSys.init(); AudioSys.resume();
  newGame();
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  document.getElementById('levelScreen').classList.add('hidden');
  document.getElementById('roundScreen').classList.add('hidden');
  // Prefer ElevenLabs BGM; fall back to procedural synth music.
  if(_audioLoaded){ if(!AudioSys.startBGM('bgm')) AudioSys.startMusic(); }
  else {
    AudioSys.startMusic(); // instant procedural start, no wait
    AudioSys.loadAll().then(ok=>{ _audioLoaded=ok; if(ok){ AudioSys.stopMusic();
      AudioSys.startBGM(G.bossSpawned?'bgm_boss':'bgm'); } });
  }
}
document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=()=>{ startGame(); };
document.getElementById('muteBtn').onclick=function(){ AudioSys.init(); const m=AudioSys.toggleMute(); this.textContent=m?'♪ OFF':'♪ ON'; };

requestAnimationFrame(loop);
</script>
